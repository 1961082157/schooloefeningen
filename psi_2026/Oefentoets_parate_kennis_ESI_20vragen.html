<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oefentoets Parate Kennis ESI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blauw: #003082;
    --blauw-licht: #1a4fad;
    --blauw-heel-licht: #e8eef8;
    --oranje: #e8650a;
    --oranje-licht: #fdf0e6;
    --groen: #1a7a3c;
    --groen-licht: #e6f4ec;
    --rood: #c0392b;
    --rood-licht: #fcecea;
    --grijs: #f4f5f7;
    --grijs-rand: #dde1e9;
    --tekst: #1a1f2e;
    --tekst-zacht: #5a6172;
    --wit: #ffffff;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(160deg, #001a52 0%, #003082 40%, #0044b8 100%);
    min-height: 100vh;
    color: var(--tekst);
    padding: 0 0 60px;
  }

  header {
    background: rgba(0,0,0,0.25);
    border-bottom: 2px solid rgba(232,101,10,0.6);
    padding: 22px 32px 18px;
    display: flex; align-items: center; gap: 20px;
  }
  .logo-badge {
    width: 50px; height: 50px; background: var(--oranje); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 20px; font-weight: 700; color: white; letter-spacing: -1px;
  }
  header h1 { font-family: 'Source Serif 4', serif; font-size: 20px; font-weight: 600; color: white; line-height: 1.2; }
  header p  { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 2px; }

  .container { max-width: 760px; margin: 0 auto; padding: 28px 16px 0; }

  /* ── SCOREBORD ── */
  #scorebord {
    background: var(--wit); border-radius: 14px;
    padding: 14px 18px; margin-bottom: 22px;
    border: 1.5px solid var(--grijs-rand);
  }
  .score-rij {
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 11px; flex-wrap: wrap;
  }
  .score-pill {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 12px; border-radius: 20px;
    font-size: 13px; font-weight: 600; flex-shrink: 0;
  }
  .pill-goed { background: var(--groen-licht); color: var(--groen); }
  .pill-fout { background: var(--rood-licht);  color: var(--rood); }
  .pill-rest { background: var(--blauw-heel-licht); color: var(--blauw); }
  .pill-pct  { background: #fff7e0; color: #7a5000; border: 1px solid #f0d060; margin-left: auto; font-size: 14px; font-weight: 700; }
  .score-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot-goed { background: var(--groen); }
  .dot-fout { background: var(--rood); }
  .dot-rest { background: var(--blauw); }

  .voortgang-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--tekst-zacht); margin-bottom: 5px; }
  .voortgang-balk   { height: 10px; background: var(--grijs); border-radius: 5px; overflow: hidden; display: flex; }
  .fill-goed { height: 100%; background: var(--groen); transition: width 0.35s ease; }
  .fill-fout { height: 100%; background: var(--rood);  transition: width 0.35s ease; }

  /* ── VRAAGKAART ── */
  .vraag-kaart {
    background: var(--wit); border-radius: 14px;
    border: 1.5px solid var(--grijs-rand); margin-bottom: 24px; overflow: hidden;
  }
  .vraag-hoofd {
    background: var(--blauw-heel-licht);
    border-bottom: 1.5px solid var(--grijs-rand); padding: 18px 22px;
  }
  .vraag-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .vraag-nummer {
    background: var(--blauw); color: white;
    font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px;
  }
  .meerdere-badge {
    background: var(--oranje-licht); color: var(--oranje);
    border: 1px solid rgba(232,101,10,0.3);
    font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px;
  }
  .casus {
    font-size: 13.5px; color: var(--tekst-zacht); line-height: 1.6;
    margin-bottom: 12px; padding: 11px 14px;
    background: rgba(0,48,130,0.05);
    border-left: 3px solid var(--blauw); border-radius: 0 8px 8px 0;
    font-style: italic;
  }
  .vraag-tekst { font-family: 'Source Serif 4', serif; font-size: 15px; line-height: 1.65; color: var(--tekst); }

  .vraag-lichaam { padding: 18px 22px 4px; }

  /* ── OPTIES ── */
  .antwoord-optie {
    display: flex; align-items: flex-start; gap: 11px;
    padding: 11px 14px; border: 1.5px solid var(--grijs-rand);
    border-radius: 10px; margin-bottom: 9px;
    cursor: pointer; transition: border-color 0.15s, background 0.15s;
    user-select: none;
  }
  .antwoord-optie:hover:not(.disabled) { border-color: var(--blauw-licht); background: var(--blauw-heel-licht); }
  .antwoord-optie.geselecteerd:not(.disabled) { border-color: var(--blauw); background: var(--blauw-heel-licht); }
  .antwoord-optie.correct { border-color: var(--groen); background: var(--groen-licht); animation: flashGoed 0.3s ease; }
  .antwoord-optie.fout    { border-color: var(--rood);  background: var(--rood-licht);  animation: flashFout 0.32s ease; }
  .antwoord-optie.gemist  { border-color: var(--groen); background: var(--groen-licht); opacity: 0.72; }
  .antwoord-optie.disabled { cursor: default; }

  @keyframes flashGoed { 0%{transform:scale(1)} 50%{transform:scale(1.013)} 100%{transform:scale(1)} }
  @keyframes flashFout { 0%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} 100%{transform:translateX(0)} }

  .optie-box {
    width: 22px; height: 22px; border: 2px solid var(--grijs-rand);
    border-radius: 50%; flex-shrink: 0; margin-top: 1px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; font-size: 13px; font-weight: 700;
  }
  .meerdere-check .optie-box { border-radius: 5px; }

  .antwoord-optie.geselecteerd:not(.disabled) .optie-box { background: var(--blauw); border-color: var(--blauw); color: white; }
  .antwoord-optie.correct .optie-box { background: var(--groen); border-color: var(--groen); color: white; }
  .antwoord-optie.fout    .optie-box { background: var(--rood);  border-color: var(--rood);  color: white; }
  .antwoord-optie.gemist  .optie-box { background: var(--groen); border-color: var(--groen); color: white; }

  .optie-tekst { font-size: 14px; line-height: 1.5; color: var(--tekst); padding-top: 2px; }

  /* ── FEEDBACK ── */
  .feedback-banner {
    margin: 4px 22px 0; padding: 13px 16px; border-radius: 10px;
    font-size: 13.5px; line-height: 1.65; display: none;
  }
  .feedback-banner.zichtbaar { display: block; }
  .feedback-banner.goed-banner { background: var(--groen-licht); border: 1.5px solid #a8d8b8; color: #0f4a24; }
  .feedback-banner.fout-banner { background: #fff8f0; border: 1.5px solid #f0c890; color: #5a3200; }
  .feedback-kop { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; font-weight: 700; }

  /* ── VOET ── */
  .vraag-voet { padding: 14px 22px 18px; display: flex; gap: 10px; flex-wrap: wrap; }

  .btn {
    padding: 9px 20px; border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: 13.5px; font-weight: 600;
    cursor: pointer; border: none; transition: all 0.15s;
  }
  .btn-primair { background: var(--blauw); color: white; }
  .btn-primair:hover { background: var(--blauw-licht); }
  .btn-oranje { background: var(--oranje); color: white; }
  .btn-oranje:hover { opacity: 0.88; }

  /* ── EINDSCHERM ── */
  #einde-scherm {
    background: var(--wit); border-radius: 14px;
    border: 1.5px solid var(--grijs-rand); padding: 40px 28px;
    text-align: center; display: none;
  }
  #einde-scherm h2 { font-family: 'Source Serif 4', serif; font-size: 24px; color: var(--blauw); margin-bottom: 6px; }
  .eindcijfer { font-size: 58px; font-weight: 700; color: var(--blauw); line-height: 1; margin: 14px 0 3px; }
  .einde-pct  { font-size: 20px; font-weight: 600; color: var(--oranje); margin-bottom: 6px; }
  .einde-stats { display: flex; justify-content: center; gap: 28px; margin: 18px 0 24px; }
  .einde-stats .item { text-align: center; }
  .einde-stats .item .num { font-size: 22px; font-weight: 700; }
  .einde-stats .item .lbl { font-size: 11px; color: var(--tekst-zacht); text-transform: uppercase; letter-spacing: 0.4px; }
  .einde-stats .item.g .num { color: var(--groen); }
  .einde-stats .item.f .num { color: var(--rood); }
  .einde-balk { height: 12px; background: var(--grijs); border-radius: 6px; overflow: hidden; margin: 0 auto 26px; max-width: 340px; display: flex; }
</style>
</head>
<body>

<header>
  <div class="logo-badge">ESI</div>
  <div>
    <h1>Oefentoets Parate Kennis</h1>
    <p>Opsporingsbevoegdheden &amp; Strafrecht — willekeurige volgorde</p>
  </div>
</header>

<div class="container">
  <div id="scorebord">
    <div class="score-rij">
      <div class="score-pill pill-goed"><span class="score-dot dot-goed"></span><span id="s-goed">0</span>&nbsp;goed</div>
      <div class="score-pill pill-fout"><span class="score-dot dot-fout"></span><span id="s-fout">0</span>&nbsp;fout</div>
      <div class="score-pill pill-rest"><span class="score-dot dot-rest"></span><span id="s-rest">20</span>&nbsp;resterend</div>
      <div class="score-pill pill-pct" id="s-pct">— % correct</div>
    </div>
    <div>
      <div class="voortgang-labels">
        <span id="vl-links">Vraag 1 van 20</span>
        <span id="vl-rechts">0% gedaan</span>
      </div>
      <div class="voortgang-balk">
        <div class="fill-goed" id="fill-goed" style="width:0%"></div>
        <div class="fill-fout" id="fill-fout" style="width:0%"></div>
      </div>
    </div>
  </div>

  <div id="vragen-container"></div>

  <div id="einde-scherm">
    <h2>Toets afgerond!</h2>
    <div class="eindcijfer" id="e-cijfer">—</div>
    <div class="einde-pct" id="e-pct">—%</div>
    <p style="color:var(--tekst-zacht);font-size:13px;margin-bottom:16px;">van de vragen correct beantwoord</p>
    <div class="einde-balk">
      <div class="fill-goed" id="e-fill-goed" style="width:0%"></div>
      <div class="fill-fout" id="e-fill-fout" style="width:0%"></div>
    </div>
    <div class="einde-stats">
      <div class="item g"><div class="num" id="e-goed">0</div><div class="lbl">Goed</div></div>
      <div class="item f"><div class="num" id="e-fout">0</div><div class="lbl">Fout</div></div>
    </div>
    <button class="btn btn-primair" onclick="herstart(false)">Opnieuw — alle vragen</button><br>
    <button class="btn btn-oranje" id="herhaal-knop" onclick="herstart(true)" style="margin-top:10px;display:none"></button>
  </div>
</div>

<script>
const alleVragen = [
  {
    casus:"Twee opsporingsambtenaren krijgen een melding dat een boer in zijn schuur ernstig gevallen is en hulp nodig heeft. Als de opsporingsambtenaren ter plaatse komen en de schuur in willen, merken zij dat de deur op slot zit. Zij zien door het raam dat de boer bloedend op de grond ligt.",
    vraag:"Zijn de opsporingsambtenaren bevoegd de schuur ter hulpverlening te betreden?",
    meerdere:false,
    antwoorden:[
      {tekst:"Ja, zij mogen de schuur betreden op grond van art. 7 Politiewet.",correct:true},
      {tekst:"Ja, zij mogen de schuur betreden op grond van art. 3 Politiewet.",correct:false},
      {tekst:"Nee, zij mogen de schuur niet betreden omdat de deur op slot zit.",correct:false},
      {tekst:"Nee, zij hebben een bevel van de hovj nodig om de schuur te betreden.",correct:false}
    ],
    uitleg:"Art. 7 lid 2 Politiewet geeft de ambtenaar van de politie toegang tot elke plaats voor zover het voor het verlenen van hulp aan hen die het behoeven nodig is."
  },
  {
    casus:"Tijdens hun surveillance worden opsporingsambtenaren aangesproken door een vrouw. De vrouw vertelt dat zij gisteren in het openbaar is beledigd door haar ex-vriend. Dit is gefilmd door een omstander. De vrouw toont de beelden en vertelt dat haar ex-vriend bij een café om de hoek zit. De opsporingsambtenaren zien bij het café een man die aan het signalement voldoet. Ze willen de man aanhouden voor belediging (in dit geval geen VH-misdrijf).",
    vraag:"Zijn de opsporingsambtenaren bevoegd de man buiten heterdaad aan te houden voor belediging?",
    meerdere:false,
    antwoorden:[
      {tekst:"Nee, de bevoegdheid tot aanhouding buiten heterdaad komt toe aan de hovj.",correct:false},
      {tekst:"Nee, aanhouden buiten heterdaad voor dit feit is nu niet mogelijk.",correct:true},
      {tekst:"Ja, iedereen is bevoegd een verdachte van een strafbaar feit aan te houden.",correct:false},
      {tekst:"Ja, nadat de ovj een bevel tot aanhouding buiten heterdaad heeft gegeven.",correct:false}
    ],
    uitleg:"In deze casus gaat het om een aanhouding buiten heterdaad (art. 54 Sv). De ovj kan een bevel geven bij een misdrijf waarvoor voorlopige hechtenis is toegelaten. Belediging (art. 266 Sr.) is geen VH-misdrijf (art. 67 lid 1 Sv)."
  },
  {
    casus:"Wanneer een verdachte zijn auto wil instappen, wordt hij staande gehouden op verdenking van heling. De verdachte zegt geen identiteitsbewijs bij zich te hebben en weigert zijn persoonsgegevens op te geven. Na onderzoek aan de kleding blijkt hij inderdaad geen identiteitsbewijs bij zich te dragen. De opsporingsambtenaar wil het dashboardkastje van de auto onderzoeken. De identiteit kan niet op andere wijze worden vastgesteld.",
    vraag:"Is de opsporingsambtenaar bevoegd het dashboardkastje van de auto te onderzoeken voor de vaststelling van de identiteit van de verdachte?",
    meerdere:false,
    antwoorden:[
      {tekst:"Ja, er is sprake van een verdachte van een misdrijf en het onderzoek is noodzakelijk voor de vaststelling van zijn identiteit.",correct:false},
      {tekst:"Ja, de verdachte is staande gehouden en het onderzoek is noodzakelijk voor de vaststelling van zijn identiteit.",correct:true},
      {tekst:"Nee, de verdachte is staande gehouden en mag daarom alleen aan de kleding worden onderzocht.",correct:false},
      {tekst:"Nee, alleen voorwerpen die de verdachte bij zich draagt mogen onderzocht worden.",correct:false}
    ],
    uitleg:"Art. 55b lid 1 Sv: een opsporingsambtenaar is bevoegd een staande gehouden verdachte aan zijn kleding te onderzoeken, alsmede voorwerpen die hij bij zich draagt of met zich voert. Een auto die de verdachte 'met zich voert' valt hieronder."
  },
  {
    casus:"Een verdachte wordt een paar dagen na het derde verhoor voor de vierde keer verhoord over éénzelfde strafbaar feit. De verdachte is een veelpleger. De opsporingsambtenaar geeft de verdachte geen cautie.",
    vraag:"Had de opsporingsambtenaar voor aanvang van het vierde verhoor de cautie moeten geven?",
    meerdere:false,
    antwoorden:[
      {tekst:"Ja, de verdachte moet bij elke vorm van contact met een opsporingsambtenaar de cautie worden meegedeeld.",correct:false},
      {tekst:"Ja, de verdachte moet voor ieder verhoor over een strafbaar feit de cautie worden meegedeeld.",correct:true},
      {tekst:"Nee, de verdachte moet alleen voor het eerste verhoor over een strafbaar feit de cautie worden meegedeeld.",correct:false},
      {tekst:"Nee, omdat de verdachte veelpleger is, mag aangenomen worden dat hij bekend is met zijn rechten.",correct:false}
    ],
    uitleg:"Aan de verdachte moet voor ieder verhoor medegedeeld worden dat hij niet verplicht is tot antwoorden (art. 29 lid 2 Sv). Onder verhoor wordt verstaan: alle vragen die een opsporingsambtenaar aan een verdachte stelt over diens betrokkenheid bij een strafbaar feit."
  },
  {
    casus:"Een man wordt verdacht van het plegen van openlijke geweldpleging (art. 67 lid 1 Sv-misdrijf). Hij wordt uitgenodigd op het politiebureau voor een verhoor. De opsporingsambtenaar controleert de identiteit aan de hand van zijn paspoort. Over de identiteit bestaat geen twijfel.",
    vraag:"Is de opsporingsambtenaar in dit geval verplicht ook foto's en vingerafdrukken te nemen van deze verdachte?",
    meerdere:false,
    antwoorden:[
      {tekst:"Ja, want de verdachte wordt verhoord wegens een art. 67 lid 1 Sv-misdrijf.",correct:true},
      {tekst:"Ja, want bij elk verdachtenverhoor dienen foto's en vingerafdrukken genomen te worden.",correct:false},
      {tekst:"Nee, want de verdachte is nog niet aangehouden voor een strafbaar feit.",correct:false},
      {tekst:"Nee, want over de identiteit van de verdachte bestaat geen twijfel.",correct:false}
    ],
    uitleg:"Op grond van art. 55c lid 2 Sv nemen opsporingsambtenaren van een verdachte die wordt verhoord wegens een art. 67 lid 1 Sv-misdrijf foto's en vingerafdrukken. Het woord 'nemen' houdt een verplichting in — geen vrijblijvende bevoegdheid."
  },
  {
    casus:"Een vrouw meldt bij de politie dat haar ex-man haar woning is binnengedrongen via een openstaand raam. Ze heeft meerdere keren gezegd dat hij moet vertrekken. Hij wil niet luisteren en blijft roepen dat hij haar terug wil. De ex-man is eerder veroordeeld voor diefstal.",
    vraag:"Pleegt de man een strafbaar feit?",
    meerdere:false,
    antwoorden:[
      {tekst:"Ja, poging tot diefstal (art. 45 jo. art. 310 Sr).",correct:false},
      {tekst:"Ja, huisvredebreuk (art. 138 Sr).",correct:true},
      {tekst:"Ja, bedreiging (art. 285 Sr).",correct:false},
      {tekst:"Nee, de man pleegt geen strafbaar feit.",correct:false}
    ],
    uitleg:"De man is tegen de wil van de vrouw ('wederrechtelijk') haar woning binnengedrongen door inklimming. Hij maakt zich daardoor schuldig aan huisvredebreuk (art. 138 Sr)."
  },
  {
    casus:"Situatie 1: Een man slaat met een hamer op een autoruit om de tas op de achterbank te stelen.\n\nSituatie 2: Een vrouw zoekt via Google naar manieren hoe ze iemand met vergif kan doden.",
    vraag:"In welke situatie(s) is sprake van 'een begin van uitvoering' zoals vereist voor een poging tot misdrijf?",
    meerdere:false,
    antwoorden:[
      {tekst:"Alleen in situatie 1.",correct:true},
      {tekst:"Alleen in situatie 2.",correct:false},
      {tekst:"In situatie 1 en 2.",correct:false},
      {tekst:"In geen van beide situaties.",correct:false}
    ],
    uitleg:"Een poging tot misdrijf is strafbaar als de dader begonnen is met het uitvoeren van dat misdrijf (art. 45 lid 1 Sr). Met een hamer op een autoruit slaan is een begin van uitvoering van diefstal door middel van braak. Het zoeken naar informatie over vergif is geen begin van uitvoering."
  },
  {
    casus:null,
    vraag:"Wie is bevoegd tot het geven van een (schriftelijke) machtiging volgens de Algemene wet op het binnentreden?",
    meerdere:true,
    antwoorden:[
      {tekst:"De hovj",correct:true},
      {tekst:"De ovj",correct:true},
      {tekst:"De r-c",correct:false},
      {tekst:"De opsporingsambtenaar",correct:false}
    ],
    uitleg:"In art. 3 Awbi staat wie bevoegd is tot het geven van de schriftelijke machtiging. Naast de hovj en de ovj kan ook een advocaat-generaal bij ressortsparket dit doen. Bij binnentreden om andere redenen dan strafvordering is de burgemeester bevoegd (art. 3 Awbi lid 2)."
  },
  {
    casus:null,
    vraag:"Politiegegevens kunnen worden verwerkt met het oog op de uitvoering van de dagelijkse politietaak gedurende een periode van …",
    meerdere:false,
    antwoorden:[
      {tekst:"Één jaar na de datum van de eerste verwerking.",correct:true},
      {tekst:"Twee jaar na de datum van de eerste verwerking.",correct:false},
      {tekst:"Vijf jaar na de datum van de eerste verwerking.",correct:false}
    ],
    uitleg:"Art. 8 lid 1 WPG: politiegegevens kunnen worden verwerkt met het oog op de uitvoering van de dagelijkse politietaak gedurende een periode van één jaar na de datum van de eerste verwerking."
  },
  {
    casus:"Op een industrieterrein wordt de laatste weken veel ingebroken. Opsporingsambtenaar Anouschka ziet 's avonds een vrouw lopen door dit gebied. Anouschka vordert inzage van het identiteitsbewijs van de vrouw. De vrouw weigert en zegt dat zij niet hoeft mee te werken aan haar eigen veroordeling.",
    vraag:"Welke van de onderstaande antwoorden is waar?",
    meerdere:false,
    antwoorden:[
      {tekst:"Het niet voldoen aan de vordering tot inzage van een identiteitsbewijs door de vrouw levert een strafbaar feit op.",correct:true},
      {tekst:"Het niet voldoen aan de vordering tot inzage van een identiteitsbewijs door de vrouw levert geen strafbaar feit op.",correct:false},
      {tekst:"De vrouw moet voor het voldoen aan de vordering eerst met een advocaat gesproken hebben.",correct:false}
    ],
    uitleg:"Een politieambtenaar aangesteld voor de uitvoering van de politietaak is bevoegd inzage te vorderen van een identiteitsbewijs (art. 1 WID). Het niet voldoen aan de vordering is strafbaar op grond van art. 447e Sr."
  },
  {
    casus:"Bij het politiebureau meldt zich een vrouw die slachtoffer is geworden van zware mishandeling door haar man (art. 67 lid 1 Sv-misdrijf). Ze verklaart dat de man zich heeft verstopt in de woning van zijn ouders. Twee opsporingsambtenaren gaan naar deze woning en willen deze zonder toestemming doorzoeken ter aanhouding.",

// ── State ──
let volgorde = [], huidigIndex = 0, aantalGoed = 0, aantalFout = 0, fouteVragen = [];

function schudden(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function herstart(alleenFoute) {
  document.getElementById('einde-scherm').style.display = 'none';
  document.getElementById('vragen-container').innerHTML = '';
  aantalGoed = 0; aantalFout = 0; huidigIndex = 0;
  if (alleenFoute && fouteVragen.length > 0) {
    volgorde = schudden([...fouteVragen]);
    fouteVragen = [];
  } else {
    fouteVragen = [];
    volgorde = schudden([...Array(alleVragen.length).keys()]);
  }
  updateScore();
  toonVraag();
}

function updateScore() {
  const totaal    = volgorde.length;
  const behandeld = aantalGoed + aantalFout;          // alleen beantwoorde vragen
  const resterend = totaal - behandeld;
  document.getElementById('s-goed').textContent = aantalGoed;
  document.getElementById('s-fout').textContent = aantalFout;
  document.getElementById('s-rest').textContent = resterend;
  // percentage correct = goed / beantwoord (niet goed / gepresenteerd)
  const pctCorrect = behandeld > 0 ? Math.round(aantalGoed / behandeld * 100) : null;
  document.getElementById('s-pct').textContent = pctCorrect !== null ? pctCorrect + '% correct' : '— % correct';
  // voortgangslabel: hoeveel % van de toets is afgerond
  const pctGedaan = totaal > 0 ? Math.round(behandeld / totaal * 100) : 0;
  document.getElementById('vl-links').textContent = behandeld < totaal
    ? 'Vraag ' + (huidigIndex + 1) + ' van ' + totaal
    : 'Klaar!';
  document.getElementById('vl-rechts').textContent = pctGedaan + '% gedaan';
  // balk: groen = goed/totaal, rood = fout/totaal
  document.getElementById('fill-goed').style.width = (aantalGoed / totaal * 100) + '%';
  document.getElementById('fill-fout').style.width = (aantalFout / totaal * 100) + '%';
}

function toonVraag() {
  if (huidigIndex >= volgorde.length) { toonEinde(); return; }
  const vi = volgorde[huidigIndex];
  const v  = alleVragen[vi];
  const gemend = schudden(v.antwoorden.map((a, i) => ({ ...a, oi: i })));

  const container = document.getElementById('vragen-container');
  container.innerHTML = '';
  const kaart = document.createElement('div');
  kaart.className = 'vraag-kaart';

  let casusTekst = '';
  if (v.casus) {
    casusTekst = v.casus.split('\n\n')
      .map(r => `<div class="casus">${r.replace(/\n/g, '<br>')}</div>`)
      .join('');
  }
  const mBadge = v.meerdere
    ? `<span class="meerdere-badge">⚠️ Meerdere antwoorden mogelijk</span>` : '';

  kaart.innerHTML = `
    <div class="vraag-hoofd">
      <div class="vraag-meta">
        <span class="vraag-nummer">Vraag ${huidigIndex + 1} / ${volgorde.length}</span>${mBadge}
      </div>
      ${casusTekst}
      <div class="vraag-tekst">${v.vraag}</div>
    </div>
    <div class="vraag-lichaam" id="opties-${vi}"></div>
    <div class="feedback-banner" id="feedback-${vi}"></div>
    <div class="vraag-voet" id="voet-${vi}">
      <button class="btn btn-primair" id="controleer-btn-${vi}"
        onclick="controleer(${vi}, ${JSON.stringify(gemend).replace(/"/g, '&quot;')})">
        Controleer antwoord
      </button>
    </div>`;

  const optiesEl = kaart.querySelector(`#opties-${vi}`);
  gemend.forEach((ant, idx) => {
    const div = document.createElement('div');
    div.className = 'antwoord-optie' + (v.meerdere ? ' meerdere-check' : '');
    div.dataset.idx = idx;
    div.onclick = () => wisselSelectie(div, vi, v.meerdere);
    div.innerHTML = `<div class="optie-box" id="box-${vi}-${idx}"></div>
                     <div class="optie-tekst">${ant.tekst}</div>`;
    optiesEl.appendChild(div);
  });

  container.appendChild(kaart);
  kaart.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// Selectie wisselen — werkt ALLEEN zolang de vraag nog niet beantwoord is
function wisselSelectie(div, vi, meerdere) {
  if (div.classList.contains('disabled')) return;

  if (!meerdere) {
    // deselect alle andere, selecteer deze
    document.querySelectorAll(`#opties-${vi} .antwoord-optie`).forEach(d => {
      d.classList.remove('geselecteerd');
      d.querySelector('.optie-box').innerHTML = '';
    });
    div.classList.add('geselecteerd');
    div.querySelector('.optie-box').innerHTML = '●';
  } else {
    div.classList.toggle('geselecteerd');
    div.querySelector('.optie-box').innerHTML =
      div.classList.contains('geselecteerd') ? '✓' : '';
  }
}

// Eén controleer-functie voor zowel enkelvoudig als meerdere
function controleer(vi, gemend) {
  const v = alleVragen[vi];
  const alleOpties = [...document.querySelectorAll(`#opties-${vi} .antwoord-optie`)];
  const geselecteerd = alleOpties.filter(d => d.classList.contains('geselecteerd'));

  if (geselecteerd.length === 0) {
    alert('Selecteer eerst een antwoord.');
    return;
  }

  // Vergrendel alle opties — niemand kan meer klikken
  alleOpties.forEach(d => d.classList.add('disabled'));

  const gesIdxs = geselecteerd.map(d => parseInt(d.dataset.idx));
  let isGoed = true;

  alleOpties.forEach((div, idx) => {
    const ant = gemend[idx];
    const wasGes = gesIdxs.includes(idx);
    const box = div.querySelector('.optie-box');
    div.classList.remove('geselecteerd');

    if (wasGes && ant.correct)       { div.classList.add('correct'); box.innerHTML = '✓'; }
    else if (wasGes && !ant.correct) { div.classList.add('fout');    box.innerHTML = '✗'; isGoed = false; }
    else if (!wasGes && ant.correct) { div.classList.add('gemist');  box.innerHTML = '✓'; isGoed = false; }
    else                             { box.innerHTML = ''; }
  });

  // Verberg controleer-knop, toon feedback + volgende-knop
  const voet = document.getElementById(`voet-${vi}`);
  voet.innerHTML = '';

  const banner = document.getElementById(`feedback-${vi}`);
  banner.className = 'feedback-banner zichtbaar ' + (isGoed ? 'goed-banner' : 'fout-banner');
  banner.innerHTML = `<div class="feedback-kop">${isGoed ? '✓ Correct!' : '✗ Niet correct — zie toelichting'}</div>${v.uitleg}`;

  const volgendeBtn = document.createElement('button');
  volgendeBtn.className = 'btn btn-primair';
  volgendeBtn.textContent = huidigIndex + 1 < volgorde.length ? 'Volgende vraag →' : 'Bekijk resultaat';
  volgendeBtn.onclick = () => { huidigIndex++; toonVraag(); };
  voet.appendChild(volgendeBtn);

  // Score bijwerken NA het tonen van feedback
  if (isGoed) { aantalGoed++; } else { aantalFout++; fouteVragen.push(vi); }
  updateScore();

  banner.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function toonEinde() {
  document.getElementById('vragen-container').innerHTML = '';
  const einde = document.getElementById('einde-scherm');
  einde.style.display = 'block';
  const totaal = volgorde.length;
  const pct = totaal > 0 ? Math.round(aantalGoed / totaal * 100) : 0;
  document.getElementById('e-cijfer').textContent = aantalGoed + '/' + totaal;
  document.getElementById('e-pct').textContent = pct + '%';
  document.getElementById('e-goed').textContent = aantalGoed;
  document.getElementById('e-fout').textContent = aantalFout;
  document.getElementById('e-fill-goed').style.width = (aantalGoed / totaal * 100) + '%';
  document.getElementById('e-fill-fout').style.width = (aantalFout / totaal * 100) + '%';
  const hBtn = document.getElementById('herhaal-knop');
  if (fouteVragen.length > 0) {
    hBtn.style.display = 'inline-block';
    hBtn.textContent = 'Herhaal ' + fouteVragen.length + ' foute vraag' + (fouteVragen.length > 1 ? 'en' : '');
  } else {
    hBtn.style.display = 'none';
  }
  updateScore();
  einde.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

herstart(false);
</script>
