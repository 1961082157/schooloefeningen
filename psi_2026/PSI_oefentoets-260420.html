<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kennistoets — Politieopleiding Staatsrecht</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #191c27;
    --surface2: #21253a;
    --border: rgba(255,255,255,0.07);
    --accent: #4f8ef7;
    --accent2: #7c5af6;
    --gold: #f0b429;
    --text: #e8eaf0;
    --muted: #8890a8;
    --correct: #2dce89;
    --wrong: #f5365c;
    --correct-bg: rgba(45,206,137,0.1);
    --wrong-bg: rgba(245,54,92,0.1);
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HERO ── */
  .hero {
    background: linear-gradient(135deg, #0d1324 0%, #111628 50%, #12101f 100%);
    border-bottom: 1px solid var(--border);
    padding: 60px 24px 48px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(79,142,247,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 18px;
  }
  .hero h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(28px, 5vw, 52px);
    line-height: 1.1;
    margin-bottom: 12px;
    background: linear-gradient(135deg, #fff 30%, #a0b4e8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero p {
    color: var(--muted);
    font-size: 16px;
    max-width: 500px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* ── CHAPTER NAV ── */
  .chapter-nav {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    padding: 28px 24px 0;
    max-width: 900px;
    margin: 0 auto;
  }
  .chapter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .chapter-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .chapter-btn.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-color: transparent;
    color: #fff;
  }
  .chapter-btn .status-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--gold);
    margin-left: 6px;
    vertical-align: middle;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .chapter-btn.done .status-dot { opacity: 1; }

  /* ── MAIN LAYOUT ── */
  .main {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  /* ── CHAPTER SECTION ── */
  .chapter-section { display: none; }
  .chapter-section.visible { display: block; }

  .chapter-header {
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .chapter-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .chapter-title {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    color: #fff;
    margin-bottom: 8px;
  }
  .chapter-meta {
    font-size: 13px;
    color: var(--muted);
  }

  /* ── SCORE STRIP ── */
  .score-strip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 28px;
  }
  .score-info {
    font-size: 14px;
    color: var(--muted);
  }
  .score-info strong {
    color: var(--text);
    font-size: 20px;
    margin-right: 4px;
  }
  .score-bar-wrap {
    flex: 1;
    min-width: 160px;
    max-width: 260px;
    height: 6px;
    background: rgba(255,255,255,0.07);
    border-radius: 3px;
    overflow: hidden;
  }
  .score-bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 3px;
    transition: width 0.4s ease;
  }
  .reset-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .reset-btn:hover {
    border-color: var(--wrong);
    color: var(--wrong);
  }

  /* ── QUESTION CARD ── */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  .question-card.answered { border-color: rgba(255,255,255,0.12); }

  .q-number {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .q-text {
    font-size: 16px;
    font-weight: 500;
    line-height: 1.55;
    color: #fff;
    margin-bottom: 20px;
  }

  /* ── OPTIONS ── */
  .options { display: grid; gap: 10px; }
  .option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: var(--surface2);
    border: 1.5px solid transparent;
    border-radius: 8px;
    padding: 13px 16px;
    cursor: pointer;
    transition: all 0.18s;
    user-select: none;
    text-align: left;
  }
  .option:hover:not(.disabled) {
    border-color: var(--accent);
    background: rgba(79,142,247,0.06);
  }
  .option.disabled { cursor: default; }
  .option.selected {
    border-color: var(--accent);
    background: rgba(79,142,247,0.1);
  }
  .option.correct {
    border-color: var(--correct);
    background: var(--correct-bg);
  }
  .option.wrong {
    border-color: var(--wrong);
    background: var(--wrong-bg);
  }

  .opt-letter {
    width: 26px;
    height: 26px;
    min-width: 26px;
    border-radius: 6px;
    background: rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    transition: all 0.18s;
  }
  .option.selected .opt-letter { background: var(--accent); color: #fff; }
  .option.correct .opt-letter { background: var(--correct); color: #fff; }
  .option.wrong .opt-letter { background: var(--wrong); color: #fff; }

  .opt-text {
    font-size: 14.5px;
    line-height: 1.45;
    padding-top: 2px;
    color: var(--text);
  }

  /* ── FEEDBACK ── */
  .feedback {
    margin-top: 16px;
    padding: 14px 16px;
    border-radius: 8px;
    font-size: 13.5px;
    line-height: 1.5;
    display: none;
  }
  .feedback.correct-fb {
    background: rgba(45,206,137,0.1);
    border: 1px solid rgba(45,206,137,0.25);
    color: #60e0a8;
    display: block;
  }
  .feedback.wrong-fb {
    background: rgba(245,54,92,0.1);
    border: 1px solid rgba(245,54,92,0.2);
    color: #f77;
    display: block;
  }
  .feedback-icon { font-size: 16px; margin-right: 6px; }

  /* ── CHAPTER RESULT ── */
  .chapter-result {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    text-align: center;
    margin-top: 28px;
    display: none;
  }
  .chapter-result.show { display: block; }
  .result-emoji { font-size: 48px; margin-bottom: 12px; }
  .result-title {
    font-family: 'DM Serif Display', serif;
    font-size: 24px;
    color: #fff;
    margin-bottom: 8px;
  }
  .result-score {
    font-size: 48px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  .result-sub {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 24px;
  }
  .retry-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 12px 28px;
    border-radius: 8px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .retry-btn:hover { opacity: 0.88; }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    padding: 40px 24px;
    border-top: 1px solid var(--border);
  }

  @media(max-width:580px) {
    .question-card { padding: 20px 16px; }
    .q-text { font-size: 15px; }
    .opt-text { font-size: 13.5px; }
  }
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-badge">Politieopleiding • Staatsrecht &amp; Recht</div>
  <h1>Kennistoets</h1>
  <p>Test jouw kennis per hoofdstuk. Kies een antwoord — directe terugkoppeling.</p>

<div class="main" id="mainContent"></div>

// STATE
// ─────────────────────────────────────────────
const state = {};
CHAPTERS.forEach(ch => {
  state[ch.id] = { answers: {}, current: null };
});

let activeChapter = CHAPTERS[0].id;

// ─────────────────────────────────────────────
// BUILD UI
// ─────────────────────────────────────────────
function buildNav() {
  const nav = document.getElementById('chapterNav');
  CHAPTERS.forEach(ch => {
    const btn = document.createElement('button');
    btn.className = 'chapter-btn' + (ch.id === activeChapter ? ' active' : '');
    btn.dataset.id = ch.id;
    btn.innerHTML = `H${ch.id} ${ch.title}<span class="status-dot"></span>`;
    btn.addEventListener('click', () => switchChapter(ch.id));
    nav.appendChild(btn);
  });
}

function buildContent() {
  const main = document.getElementById('mainContent');
  CHAPTERS.forEach(ch => {
    const section = document.createElement('div');
    section.className = 'chapter-section' + (ch.id === activeChapter ? ' visible' : '');
    section.id = `chapter-${ch.id}`;
    section.innerHTML = buildChapterHTML(ch);
    main.appendChild(section);
  });
}

function buildChapterHTML(ch) {
  const totalQ = ch.questions.length;
  return `
    <div class="chapter-header">
      <div class="chapter-label">Hoofdstuk ${ch.id}</div>
      <div class="chapter-title">${ch.title}</div>
      <div class="chapter-meta">${ch.subtitle} &mdash; ${totalQ} vragen</div>
    </div>
    <div class="score-strip" id="score-strip-${ch.id}">
      <div class="score-info">Beantwoord: <strong id="answered-${ch.id}">0</strong>/ ${totalQ}</div>
      <div class="score-bar-wrap"><div class="score-bar-fill" id="bar-${ch.id}"></div></div>
      <div class="score-info">Goed: <strong id="correct-count-${ch.id}">0</strong></div>
      <button class="reset-btn" onclick="resetChapter(${ch.id})">↺ Opnieuw</button>
    </div>
    ${ch.questions.map((q, i) => buildQuestionHTML(ch.id, q, i)).join('')}
    <div class="chapter-result" id="result-${ch.id}">
      <div class="result-emoji" id="result-emoji-${ch.id}">🎉</div>
      <div class="result-title">Hoofdstuk voltooid!</div>
      <div class="result-score" id="result-score-${ch.id}">0/${ch.questions.length}</div>
      <div class="result-sub" id="result-sub-${ch.id}">Bekijk de uitleg hieronder.</div>
      <button class="retry-btn" onclick="resetChapter(${ch.id})">Opnieuw proberen</button>
    </div>
  `;
}

function buildQuestionHTML(chId, q, idx) {
  const letters = ['A','B','C','D'];
  const optionsHTML = q.options.map((opt, oi) => `
    <div class="option" id="opt-${chId}-${idx}-${oi}" onclick="selectAnswer(${chId},${idx},${oi})">
      <div class="opt-letter">${letters[oi]}</div>
      <div class="opt-text">${opt}</div>
    </div>
  `).join('');
  return `
    <div class="question-card" id="qcard-${chId}-${idx}">
      <div class="q-number">Vraag ${idx + 1}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">${optionsHTML}</div>
      <div class="feedback" id="feedback-${chId}-${idx}"></div>
    </div>
  `;
}

// ─────────────────────────────────────────────
// LOGIC
// ─────────────────────────────────────────────
function switchChapter(id) {
  activeChapter = id;
  document.querySelectorAll('.chapter-section').forEach(s => s.classList.remove('visible'));
  document.getElementById(`chapter-${id}`).classList.add('visible');
  document.querySelectorAll('.chapter-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.id) === id);
  });
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectAnswer(chId, qIdx, optIdx) {
  const chState = state[chId];
  if (chState.answers[qIdx] !== undefined) return; // already answered

  chState.answers[qIdx] = optIdx;
  const ch = CHAPTERS.find(c => c.id === chId);
  const q = ch.questions[qIdx];
  const isCorrect = optIdx === q.correct;

  // Style options
  const allOpts = document.querySelectorAll(`[id^="opt-${chId}-${qIdx}-"]`);
  allOpts.forEach(opt => opt.classList.add('disabled'));

  const selectedOpt = document.getElementById(`opt-${chId}-${qIdx}-${optIdx}`);
  const correctOpt = document.getElementById(`opt-${chId}-${qIdx}-${q.correct}`);

  selectedOpt.classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) correctOpt.classList.add('correct');

  document.getElementById(`qcard-${chId}-${qIdx}`).classList.add('answered');

  // Feedback
  const fb = document.getElementById(`feedback-${chId}-${qIdx}`);
  fb.className = 'feedback ' + (isCorrect ? 'correct-fb' : 'wrong-fb');
  fb.innerHTML = `<span class="feedback-icon">${isCorrect ? '✓' : '✗'}</span> ${q.explain}`;

  updateScore(chId, ch.questions.length);
}

function updateScore(chId, totalQ) {
  const chState = state[chId];
  const answered = Object.keys(chState.answers).length;
  const ch = CHAPTERS.find(c => c.id === chId);
  const correct = Object.entries(chState.answers).filter(([qi, ai]) => {
    return ch.questions[parseInt(qi)].correct === ai;
  }).length;

  document.getElementById(`answered-${chId}`).textContent = answered;
  document.getElementById(`correct-count-${chId}`).textContent = correct;
  document.getElementById(`bar-${chId}`).style.width = `${(answered / totalQ) * 100}%`;

  // Mark chapter done in nav
  if (answered === totalQ) {
    document.querySelectorAll('.chapter-btn').forEach(b => {
      if (parseInt(b.dataset.id) === chId) b.classList.add('done');
    });
    showResult(chId, correct, totalQ);
  }
}

function showResult(chId, correct, total) {
  const pct = correct / total;
  const emoji = pct >= 0.8 ? '🏆' : pct >= 0.6 ? '👍' : '📚';
  const msg = pct >= 0.8 ? 'Uitstekend werk!' : pct >= 0.6 ? 'Goed gedaan, bijna!' : 'Probeer het nog eens.';
  document.getElementById(`result-emoji-${chId}`).textContent = emoji;
  document.getElementById(`result-score-${chId}`).textContent = `${correct}/${total}`;
  document.getElementById(`result-sub-${chId}`).textContent = msg + ' Bekijk de uitleg bij de vragen.';
  document.getElementById(`result-${chId}`).classList.add('show');
}

function resetChapter(chId) {
  state[chId].answers = {};
  const ch = CHAPTERS.find(c => c.id === chId);
  const totalQ = ch.questions.length;

  // Reset all question cards
  ch.questions.forEach((q, qi) => {
    const card = document.getElementById(`qcard-${chId}-${qi}`);
    card.classList.remove('answered');
    for (let oi = 0; oi < q.options.length; oi++) {
      const opt = document.getElementById(`opt-${chId}-${qi}-${oi}`);
      opt.classList.remove('disabled','selected','correct','wrong');
    }
    const fb = document.getElementById(`feedback-${chId}-${qi}`);
    fb.className = 'feedback';
    fb.textContent = '';
  });

  // Reset score
  document.getElementById(`answered-${chId}`).textContent = '0';
  document.getElementById(`correct-count-${chId}`).textContent = '0';
  document.getElementById(`bar-${chId}`).style.width = '0%';

  // Hide result
  document.getElementById(`result-${chId}`).classList.remove('show');

  // Remove done from nav btn
  document.querySelectorAll('.chapter-btn').forEach(b => {
    if (parseInt(b.dataset.id) === chId) b.classList.remove('done');
  });

  window.scrollTo({ top: document.getElementById(`chapter-${chId}`).offsetTop - 20, behavior: 'smooth' });
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
buildNav();
buildContent();
</script>
