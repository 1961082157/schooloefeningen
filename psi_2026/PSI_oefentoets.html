<script>
const Q=[
// ========== GRONDWET ==========
{cat:"Grondwet",art:"Art. 1",lvl:"T",text:"Een werkgever weigert een sollicitant aan te nemen omdat hij een hoofddoek draagt vanwege zijn geloof. Is dit toegestaan?",opts:["Ja, een werkgever mag zelf bepalen wie hij aanneemt, zolang hij dit consistent toepast","Nee, dit is verboden discriminatie op grond van godsdienst (art. 1 GW)","Ja, maar alleen als de functie een representatieve rol heeft naar klanten","Ja, mits de werkgever dit schriftelijk motiveert met bedrijfsbelang"],ans:1,exp:"Art. 1 GW verbiedt discriminatie op grond van godsdienst. Een sollicitant met een beter cv mag je wél aannemen (dat is geen willekeur), maar weigeren puur op basis van geloof of uiterlijk dat daarmee samenhangt is verboden."},
{cat:"Grondwet",art:"Art. 1",lvl:"T",text:"Een agent controleert bij een verkeerscontrole systematisch alleen personen met een donkere huidskleur. Wat geldt?",opts:["Dit is toegestaan als de agent dit op basis van eigen ervaring efficiënter vindt","Dit is toegestaan zolang er achteraf een procesverbaal van wordt gemaakt","Dit is verboden etnisch profileren op grond van art. 1 GW","Dit is alleen verboden als het slachtoffer hierover een klacht indient"],ans:2,exp:"Art. 1 GW verbiedt discriminatie op grond van ras. Etnisch profileren is verboden, ook voor de politie, ongeacht of er een klacht wordt ingediend."},
{cat:"Grondwet",art:"Art. 10/11",lvl:"T",text:"Op welk grondwetsartikel maakt een agent inbreuk bij het fouilleren (onderzoek aan de kleding) van een verdachte?",opts:["Art. 10 GW – persoonlijke levenssfeer, want kleding is onderdeel van de privésfeer","Art. 1 GW – gelijkheidsbeginsel, want niet iedereen wordt gefouilleerd","Art. 11 GW – onaantastbaarheid van het lichaam","Art. 15 GW – recht op vrijheid, want hij mag niet meer vrij bewegen"],ans:2,exp:"Fouilleren maakt inbreuk op art. 11 GW (onaantastbaarheid van het lichaam). Art. 56 WvSv biedt hiervoor de wettelijke grondslag. Art. 10 gaat over privacy in bredere zin, niet specifiek over het lichaam."},
{cat:"Grondwet",art:"Art. 10/11",lvl:"T",text:"De politie vraagt camerabeelden op bij een supermarkt van een verdachte. Op welk grondwetsrecht maakt dit een inbreuk?",opts:["Art. 11 GW – onaantastbaarheid van het lichaam, want zijn gezicht wordt vastgelegd","Art. 10 GW – persoonlijke levenssfeer (privacy)","Art. 15 GW – recht op vrijheid, want hij wordt gevolgd","Art. 12 GW – bescherming huisrecht"],ans:1,exp:"Art. 10 GW beschermt de persoonlijke levenssfeer (privacy). Camerabeelden zijn persoonsgegevens; voor verwerking is een wettelijke grondslag nodig. Art. 11 gaat specifiek over fysiek contact met het lichaam."},
{cat:"Grondwet",art:"Art. 12",lvl:"B",text:"Onder welke voorwaarde mag een opsporingsambtenaar een woning binnengaan zonder toestemming van de bewoner?",opts:["Als hij dit noodzakelijk acht voor een goede taakuitvoering","Altijd bij verdenking van een misdrijf waarvoor voorlopige hechtenis mogelijk is","Alleen op basis van een wettelijke bevoegdheid, doorgaans met schriftelijke machtiging conform de Awbi","Alleen als de bewoner niet aanwezig is, zodat er geen confrontatie ontstaat"],ans:2,exp:"Art. 12 GW beschermt het huisrecht. Binnentreden zonder toestemming vereist altijd een wettelijke bevoegdheid én doorgaans een schriftelijke machtiging. Dat de bewoner afwezig is of dat het om een ernstig misdrijf gaat, is op zichzelf geen toereikende grond."},
{cat:"Grondwet",art:"Art. 15",lvl:"B",text:"Wat houdt het recht op vrijheid (art. 15 GW) in?",opts:["Niemand mag van zijn vrijheid worden beroofd tenzij op basis van een wettelijke grondslag","Iedereen heeft het recht om overal vrij heen te gaan binnen Nederland","De politie mag iemand maximaal 24 uur vasthouden zonder tussenkomst van de rechter","Het recht om zonder toestemming van de overheid te reizen naar het buitenland"],ans:0,exp:"Art. 15 GW: niemand mag zomaar van zijn vrijheid worden beroofd. Vrijheidsberoving is alleen toegestaan op grond van een wettelijke bevoegdheid. Dit gaat over fysieke vrijheidsberoving (opsluiting), niet over bewegingsvrijheid in het algemeen."},
// ========== POLITIEWET 2012 ==========
{cat:"Politiewet 2012",art:"Art. 2/3",lvl:"K",text:"Wie worden als 'ambtenaren van politie' beschouwd onder de Politiewet 2012?",opts:["Alle medewerkers met een aanstelling bij de politie, inclusief administratief personeel en boa's","Alle medewerkers die een politie-uniform dragen","Uitsluitend (vrijwillige) ambtenaren aangesteld voor de uitvoering van de politietaak","Alle medewerkers inclusief kantinepersoneel, want zij werken ook ten dienste van de handhaving"],ans:2,exp:"Art. 2 Politiewet: alleen (vrijwillige) ambtenaren aangesteld voor de uitvoering van de politietaak zijn ambtenaren van politie. Kantinepersoneel, administratief personeel en technische dienst vallen hier niet onder, ook al zijn zij in dienst van de politie."},
{cat:"Politiewet 2012",art:"Art. 2/3",lvl:"K",text:"Wat is de wettelijke taak van de politie volgens art. 3 Politiewet 2012?",opts:["Zelfstandig handhaven van de rechtsorde, waarbij de politie haar eigen prioriteiten stelt","In ondergeschiktheid aan het bevoegd gezag en conform de geldende rechtsregels zorgen voor handhaving van de rechtsorde en het verlenen van hulp","Uitsluitend het opsporen van strafbare feiten op aanwijzing van de officier van justitie","Enkel de openbare orde handhaven; opsporing is uitsluitend een taak van het OM"],ans:1,exp:"Art. 3 Politiewet: de politie werkt in ondergeschiktheid aan het bevoegd gezag (burgemeester of OvJ) en conform de rechtsregels. Zij is dus geen zelfstandige macht. Zowel handhaving als hulpverlening behoren tot haar taak."},
{cat:"Politiewet 2012",art:"Art. 6",lvl:"K",text:"Een agent uit Rotterdam ziet in Utrecht hoe iemand een kind mishandelt. Mag hij ingrijpen?",opts:["Nee, hij is buiten zijn werkgebied en heeft daar geen enkele bevoegdheid","Ja, mits zijn optreden redelijkerwijs noodzakelijk is — hij heeft landelijke bevoegdheid","Ja, maar hij moet eerst zijn eigen korps bellen en toestemming vragen","Nee, hij mag alleen observeren en dit doorgeven aan de Utrechtse politie"],ans:1,exp:"Art. 6 Politiewet: een politiefunctionaris heeft landelijke bevoegdheid en mag buiten zijn werkgebied optreden als dit redelijkerwijs noodzakelijk is. Bij een noodsituatie zoals mishandeling is ingrijpen zonder overleg toegestaan."},
{cat:"Politiewet 2012",art:"Art. 7 lid 1",lvl:"T",text:"Agent Bakker gebruikt zijn wapenstok om een agressieve arrestant te overmeesteren. Wanneer is dit rechtmatig?",opts:["Altijd, want de wet geeft agenten een geweldsmonopolie en de agent beoordeelt zelf of het nodig is","Alleen als de arrestant ook een wapen heeft — anders is het niet proportioneel","Als het geweld proportioneel en subsidiair is en de agent in de rechtmatige uitoefening van zijn bediening is","Alleen als de hulpofficier van justitie dit vooraf heeft goedgekeurd via de meldkamer"],ans:2,exp:"Art. 7 lid 1 Politiewet: geweld mag alleen als de agent in de rechtmatige uitoefening van zijn bediening is én het geweld proportioneel (evenredig) en subsidiair (minst ingrijpend) is. Een wapen bij de arrestant is niet vereist; het gaat om de concrete dreiging."},
{cat:"Politiewet 2012",art:"Art. 7 lid 2",lvl:"T",text:"Een agent hoort luide schreeuwgeluiden achter een gesloten voordeur. Mag hij de woning betreden voor hulpverlening?",opts:["Nee, hij moet altijd wachten op een schriftelijke machtiging, ook bij levensgevaar","Ja, op grond van art. 7 lid 2 Politiewet, rekening houdend met de voorwaarden van de Awbi","Ja, maar alleen als er minimaal twee agenten aanwezig zijn","Nee, hij moet eerst de bewoner bellen en toestemming vragen"],ans:1,exp:"Art. 7 lid 2 Politiewet: iedere executieve politiefunctionaris heeft toegang tot elke plaats voor zover nodig voor hulpverlening. Bij onmiddellijk gevaar is een machtiging niet vereist (art. 2 lid 3 Awbi). Eén agent mag dit alleen doen."},
{cat:"Politiewet 2012",art:"Art. 7 lid 3",lvl:"K",text:"Wat is een veiligheidsfouillering en hoe wordt deze uitgevoerd?",opts:["Een grondig onderzoek waarbij zakken en tassen worden doorzocht, op bevel van de hulpofficier","Een oppervlakkig aftasten van de kleding, gericht op gevaarlijke voorwerpen, zo mogelijk door iemand van hetzelfde geslacht","Een volledig lichamelijk onderzoek inclusief uitkleden, vergelijkbaar met de insluitingsfouillering","Een fouillering waarbij ook de schoenen worden uitgedaan en de haargrens wordt gecontroleerd"],ans:1,exp:"Art. 7 lid 3 Politiewet / art. 20 Ambtsinstructie: veiligheidsfouillering = uitsluitend oppervlakkig aftasten van de kleding. Zakken doorzoeken of uitkleden hoort hier niet bij. Dit onderscheidt de veiligheidsfouillering van de insluitingsfouillering (art. 28 Ambtsinstructie)."},
{cat:"Politiewet 2012",art:"Art. 7 lid 4",lvl:"T",text:"Bij welke gelegenheid mag een vervoersfouillering worden uitgevoerd?",opts:["Bij elke verdachte persoon op straat die mee moet naar het bureau","Bij iemand die in een politievoertuig of cel wordt vervoerd, ter beveiliging van het transport","Altijd voorafgaand aan een verhoor, ook als de verdachte al is ingesloten","Alleen bij verdachten van misdrijven waarvoor voorlopige hechtenis mogelijk is"],ans:1,exp:"Art. 7 lid 4 Politiewet: een vervoersfouillering is specifiek bedoeld voor personen die worden vervoerd. Het gaat dus om de beveiliging van het transport, niet om bewijsvinding of verhoor."},
{cat:"Politiewet 2012",art:"Art. 7 lid 7",lvl:"K",text:"Wat schrijft art. 7 lid 7 Politiewet voor over de uitoefening van bevoegdheden zoals geweld en fouilleren?",opts:["De bevoegdheden mogen altijd worden ingezet als de agent dat professioneel nodig acht — de rechter toetst achteraf","De uitoefening moet redelijk en gematigd zijn in verhouding tot het beoogde doel (proportionaliteit)","De bevoegdheden vereisen altijd voorafgaande toestemming van de OvJ, behalve bij heterdaad","De bevoegdheden gelden onbeperkt bij aanhoudingen van gewelddadige verdachten"],ans:1,exp:"Art. 7 lid 7 Politiewet: het proportionaliteitsbeginsel — elke inzet van bevoegdheden moet redelijk en gematigd zijn. Dit geldt altijd, ook bij heterdaad en ook zonder rechterlijke toets achteraf."},
{cat:"Politiewet 2012",art:"Art. 8",lvl:"T",text:"Mag een agent van een willekeurige voetganger op straat inzage van zijn identiteitsbewijs vorderen?",opts:["Nee, dit mag alleen bij verdachten van een strafbaar feit — anders is het willekeur","Ja, maar uitsluitend als er concrete aanwijzingen zijn voor een strafbaar feit","Ja, voor de uitvoering van de politietaak, ook zonder dat er sprake is van een strafbaar feit","Nee, dit recht heeft uitsluitend de hulpofficier van justitie of hogere rang"],ans:2,exp:"Art. 8 Politiewet: voor de uitvoering van de politietaak kan iedereen worden gevorderd inzage te geven in een identiteitsbewijs, ook zonder verdenking van een strafbaar feit. Dat onderscheidt art. 8 Politiewet van art. 52 WvSv (staande houden), dat wél een verdachte vereist."},
// ========== AMBTSINSTRUCTIE ==========
{cat:"Ambtsinstructie",art:"Art. 2",lvl:"K",text:"Wanneer is een politieambtenaar verplicht zich te legitimeren met zijn legitimatiebewijs?",opts:["Alleen bij een aanhouding, want dan is de burger beperkt in zijn vrijheid","Bij elke ambtshandeling waarbij dit redelijkerwijs mogelijk is","Alleen op uitdrukkelijk verzoek van de burger — anders hoeft het niet","Alleen als hij buiten zijn werkgebied optreedt of burgerkleding draagt"],ans:1,exp:"Art. 2 Ambtsinstructie: de politieambtenaar legitimeert zich bij elke ambtshandeling waarbij dit redelijkerwijs mogelijk is. Hij hoeft dus niet te wachten op een verzoek van de burger, maar moet dit proactief doen."},
{cat:"Ambtsinstructie",art:"Art. 20/21",lvl:"K",text:"Aan wie moet elke veiligheidsfouillering onverwijld schriftelijk worden gemeld?",opts:["De officier van justitie, want die heeft gezag over de opsporing","De korpschef of zijn plaatsvervanger als eindverantwoordelijke","De hulpofficier van justitie","De burgemeester als bevoegd gezag voor de openbare orde"],ans:2,exp:"Art. 21 Ambtsinstructie: elke veiligheidsfouillering wordt onverwijld schriftelijk gemeld aan de hulpofficier van justitie — niet aan de OvJ, korpschef of burgemeester. Als de fouillering is gebaseerd op strafvordering (niet veiligheid), geldt deze meldplicht niet maar moet het wél in het PV worden vermeld."},
{cat:"Ambtsinstructie",art:"Art. 28/29/30",lvl:"K",text:"Wat houdt een insluitingsfouillering in en wanneer is deze verplicht?",opts:["Een oppervlakkig aftasten van de kleding bij binnenkomst op het bureau, op verzoek van de dienstdoende agent","Een verplicht onderzoek door aftasten én doorzoeken van kleding en voorwerpen, direct voorafgaand aan insluiting (art. 28 Ambtsinstructie)","Een volledig lichamelijk onderzoek inclusief uitkleden, dat altijd vereist is bij insluiting van gewelddadige verdachten","Hetzelfde als een veiligheidsfouillering, maar dan na aanhouding en voor transport naar het bureau"],ans:1,exp:"Art. 28 Ambtsinstructie: de insluitingsfouillering is verplicht direct vóór insluiting en gaat verder dan de veiligheidsfouillering — het omvat zowel aftasten als doorzoeken van kleding en meegebrachte voorwerpen. Uitkleden mag alleen onder aanvullende voorwaarden (art. 29)."},
// ========== GEMEENTEWET ==========
{cat:"Gemeentewet",art:"Art. 172",lvl:"K",text:"Wie is het bevoegde gezag bij de handhaving van de openbare orde in een gemeente?",opts:["De officier van justitie, want die heeft het strafrechtelijk gezag over de politie","De politiechef, want die is eindverantwoordelijk voor de inzet van politiepersoneel","De burgemeester","De minister van Justitie en Veiligheid als eindverantwoordelijke voor de politie"],ans:2,exp:"Art. 172 Gemeentewet: de burgemeester is het bevoegde gezag voor de handhaving van de openbare orde. De OvJ heeft gezag bij strafrechtelijke handhaving (art. 12 Politiewet), niet bij openbare orde. De politiechef heeft de dagelijkse leiding maar staat onder gezag van burgemeester of OvJ."},
// ========== WET POLITIEGEGEVENS ==========
{cat:"Wet Politiegegevens",art:"Art. 1",lvl:"K",text:"Wat worden verstaan onder 'politiegegevens' in de Wet Politiegegevens?",opts:["Alleen persoonsgegevens vastgelegd in een officieel strafdossier na vervolging","Uitsluitend digitale gegevens opgeslagen in landelijke politiedatabases zoals HKS","Elk gegeven betreffende een geïdentificeerde of identificeerbare persoon dat wordt verwerkt in het kader van de politietaak","Alleen gegevens van veroordeelde personen die zijn geregistreerd bij de reclassering"],ans:2,exp:"Art. 1 Wpg: politiegegevens zijn alle gegevens over een geïdentificeerde of identificeerbare persoon verwerkt in het kader van de politietaak. Dit omvat dus ook gegevens van getuigen, slachtoffers en personen die niet verdacht zijn."},
{cat:"Wet Politiegegevens",art:"Art. 8",lvl:"K",text:"Welke situaties vallen onder de verwerking van politiegegevens voor de 'dagelijkse politietaak' (art. 8 Wpg)?",opts:["Georganiseerde criminaliteitsonderzoeken waarbij meerdere verdachten worden gevolgd over langere tijd","Eenvoudige opsporingsonderzoeken, verkeerscontroles en hulpverlening waarbij geen intensief onderzoek nodig is","Terrorismebestrijding en inlichtingenverzameling op aanwijzing van de AIVD","Internationale rechtshulpverzoeken en uitlevering van verdachten"],ans:1,exp:"Art. 8 Wpg regelt de verwerking voor de 'dagelijkse politietaak': relatief eenvoudige taken zonder intensief opsporingsonderzoek. Zware georganiseerde criminaliteit of terrorisme vallen onder andere bepalingen van de Wpg."},
// ========== WETBOEK VAN STRAFRECHT ==========
{cat:"WvSr",art:"Art. 1",lvl:"K",text:"Wat houdt het legaliteitsbeginsel (art. 1 Sr) in?",opts:["De politie heeft altijd een wettelijke basis nodig voor haar optreden — dit heet ook wel het legaliteitsbeginsel","Niemand kan worden gestraft voor een daad die niet bij wet strafbaar was gesteld vóór het plegen ervan","Alleen de rechter mag straffen opleggen; het OM mag slechts vervolgen","Strafrecht heeft nooit terugwerkende kracht, ook niet als dat in het voordeel van de verdachte is"],ans:1,exp:"Art. 1 Sr: geen straf zonder wet (nullum crimen, nulla poena sine lege). De wet moet vóór het plegen al bestaan hebben. Terugwerkende kracht is verboden, behalve als dit in het voordeel van de verdachte uitpakt (bijv. verlaging strafmaximum). Het politieoptreden-legaliteitsbeginsel staat in art. 1 WvSv — dat is een ander artikel."},
{cat:"WvSr",art:"Art. 39",lvl:"T",text:"Een verdachte heeft een ernstige psychische stoornis en kon zijn wil niet bepalen tijdens het delict. Wat is het rechtsgevolg?",opts:["Vrijspraak: het feit is niet bewezen want hij handelde buiten zijn bewustzijn","Veroordeling met een verminderde straf, plus een maatregel zoals tbs","Ontslag van alle rechtsvervolging (OVAR) — het feit staat vast maar de dader is niet strafbaar","Schorsing van de vervolging totdat de verdachte weer behandelbaar is"],ans:2,exp:"Art. 39 Sr: bij volledige ontoerekeningsvatbaarheid volgt OVAR. De verdachte heeft het feit wél gepleegd (geen vrijspraak) maar is niet strafbaar. Bij verminderde toerekeningsvatbaarheid volgt wél een straf, maar lichter. OVAR is iets anders dan vrijspraak."},
{cat:"WvSr",art:"Art. 40",lvl:"T",text:"Een vader rijdt door rood om zijn ernstig gewonde kind naar het ziekenhuis te brengen. Op welke strafuitsluitingsgrond beroept hij zich?",opts:["Noodweer (art. 41 Sr): hij verdedigde zijn kind tegen een aanval door het noodlot","Wettelijk voorschrift (art. 42 Sr): de wet op medische noodgevallen geeft hem toestemming","Overmacht / noodtoestand (art. 40 Sr): botsende plichten waarbij de hogere plicht prevaleert","Ambtelijk bevel (art. 43 Sr): de meldkamer had hem opdracht gegeven door te rijden"],ans:2,exp:"Art. 40 Sr: overmacht/noodtoestand = botsende plichten. De vader kiest de hogere plicht (leven kind) boven de lagere (verkeersregel). Noodweer vereist een wederrechtelijke aanval van een persoon — dat is hier niet het geval. Art. 42 gaat over een specifiek wettelijk voorschrift, niet over noodgevallen in het algemeen."},
{cat:"WvSr",art:"Art. 41",lvl:"T",text:"Iemand slaat een aanvaller éénmaal weg — dat was voldoende. Maar uit paniek geeft hij nog drie extra slagen. Welke strafuitsluitingsgrond geldt?",opts:["Noodweer (art. 41 lid 1): alle slagen waren gerechtvaardigd want de aanval was begonnen","Noodweerexces (art. 41 lid 2): door de paniek koos hij een te zwaar middel, maar hij is niet strafbaar","Psychische overmacht (art. 40): hij kon door de paniek redelijkerwijs niet anders handelen","Geen strafuitsluitingsgrond: hij is volledig strafbaar voor de drie onnodige slagen"],ans:1,exp:"Art. 41 lid 2 Sr: noodweerexces. Er wás een noodweersituatie, maar door emotie (paniek/schrik) koos hij een te zwaar middel. De hevige gemoedsbeweging die door de aanval werd opgeroepen is de reden dat hij niet strafbaar is. Bij overmacht is er geen noodweersituatie; hier was die er wel."},
{cat:"WvSr",art:"Art. 41",lvl:"T",text:"Iemand slaat terug nadat de aanval volledig is gestopt en de aanvaller al is weggerend. Kan hij zich op noodweer beroepen?",opts:["Ja, de aanvaller is begonnen dus de verdediger mocht terugslaan","Nee: noodweer vereist een ogenblikkelijke wederrechtelijke aanval — die was er op dat moment niet meer","Ja, mits hij niet harder slaat dan de aanvaller heeft gedaan","Nee, maar hij kan zich beroepen op noodweerexces want hij was nog in paniek"],ans:1,exp:"Art. 41 lid 1 Sr: noodweer vereist een ogenblikkelijke (actuele of onmiddellijk dreigende) wederrechtelijke aanval. Is de aanval voorbij en is de aanvaller gevlucht, dan is er geen noodweersituatie meer. Noodweerexces vereist ook een noodweersituatie als basis — die ontbreekt hier ook."},
{cat:"WvSr",art:"Art. 42",lvl:"T",text:"Een agent gebruikt pepperspray conform de geweldsinstructie bij een rechtmatige aanhouding. Is hij strafbaar voor mishandeling?",opts:["Ja, het gebruik van pepperspray levert altijd mishandeling op — hij kan zich alleen beroepen op noodweer","Nee: art. 42 lid 2 Sr bepaalt dat een ambtenaar die in rechtmatige uitoefening van zijn taak en conform de geweldsinstructie geweld gebruikt, niet strafbaar is","Nee, maar alleen als de OvJ het gebruik achteraf goedkeurt in het PV","Ja, tenzij hij kan aantonen dat de verdachte hem heeft aangevallen (noodweer)"],ans:1,exp:"Art. 42 lid 2 Sr: rechtmatig ambtelijk geweld conform de geweldsinstructie sluit strafbaarheid uit. Hij hoeft niet te wachten op goedkeuring achteraf, en hoeft ook geen noodweer aan te tonen — het wettelijk voorschrift is zelf al de strafuitsluitingsgrond."},
{cat:"WvSr",art:"Art. 43",lvl:"T",text:"Een agent beveelt een bestuurder door rood te rijden bij een ernstig verkeersongeval. De bestuurder gehoorzaamt. Is de bestuurder strafbaar?",opts:["Ja, hij is zelf verantwoordelijk voor zijn rijgedrag — een agent mag geen verkeersregels opheffen","Nee, een bevoegd gegeven ambtelijk bevel sluit strafbaarheid uit (art. 43 lid 1 Sr)","Nee, maar alleen als het bevel mondeling is gegeven en hij dit achteraf kan bewijzen","Ja, want alleen agenten zelf mogen door rood rijden, niet burgers op hun aanwijzing"],ans:1,exp:"Art. 43 lid 1 Sr: handelen op grond van een bevoegd gegeven ambtelijk bevel sluit strafbaarheid uit. Een agent in functie heeft de bevoegdheid verkeersinstructies te geven. Schriftelijk bewijs is niet vereist."},
{cat:"WvSr",art:"Art. 43",lvl:"T",text:"Een gewone burger (geen ambtenaar) beveelt anderen door rood te rijden 'omdat het sneller is'. Kunnen zij zich op art. 43 Sr beroepen?",opts:["Ja, een bevel blijft een bevel ongeacht wie het geeft, zolang zij dit redelijk vonden","Nee, art. 43 Sr vereist een bevoegd gegeven ambtelijk bevel — een burger heeft die bevoegdheid niet","Ja, als zij te goeder trouw handelden en dachten dat de burger een agent was","Ja, want art. 43 lid 2 beschermt degene die handelt op basis van elk bevel dat redelijk leek"],ans:1,exp:"Art. 43 lid 2 Sr: een onbevoegd gegeven bevel biedt geen strafuitsluiting. Uitzondering: de uitvoerder was te goeder trouw én mocht redelijkerwijs aannemen dat het bevel bevoegd was gegeven. Als iemand duidelijk geen ambtenaar is, kan die goede trouw niet slagen."},
{cat:"WvSr",art:"Art. 45/46",lvl:"T",text:"Iemand koopt een bivakmuts en kabelbinders 'voor een kidnapping'. Er is nog geen begin van uitvoering. Wat geldt?",opts:["Strafbare poging (art. 45 Sr): hij heeft al handelingen verricht gericht op het misdrijf","Geen strafbaar feit: er is geen begin van uitvoering, enkel een voornemen","Strafbare voorbereiding (art. 46 Sr): het verwerven van middelen bestemd voor een misdrijf met max. ≥8 jaar is strafbaar","Medeplichtigheid (art. 48 Sr): hij helpt zichzelf bij de voorbereiding"],ans:2,exp:"Art. 46 Sr: voorbereidingshandelingen zijn strafbaar bij misdrijven met een maximum van 8 jaar of meer, mits er opzet is. Het aankopen van middelen (bivakmuts, kabelbinders) bestemd voor kidnapping valt hieronder. Bij art. 45 (poging) moet er al een begin van uitvoering zijn — dat is er hier nog niet."},
{cat:"WvSr",art:"Art. 45/46",lvl:"T",text:"Iemand richt een pistool op een slachtoffer en trekt de trekker over, maar het pistool werkt niet. Is dit een strafbare poging tot doodslag?",opts:["Nee, het pistool werkte niet dus er was objectief geen gevaar — absoluut ondeugdelijk middel","Ja, dit is een relatief ondeugdelijk middel: het pistool kan normaal gesproken wel doden — strafbare poging","Nee, want poging vereist dat de dader het feit ook daadwerkelijk had kúnnen voltooien","Ja, maar alleen als het slachtoffer redelijkerwijs vrees had voor zijn leven"],ans:1,exp:"Art. 45 Sr: een haperende pistool is relatief ondeugdelijk (normaal gesproken werkt het wel). Relatief ondeugdelijke pogingen zijn wél strafbaar. Absoluut ondeugdelijk (bijv. iemand proberen te vergiftigen met water) is niet strafbaar. Het gaat om de opzet van de dader en of het middel in principe deugdelijk is."},
{cat:"WvSr",art:"Art. 47/48",lvl:"T",text:"Ali overtuigt Bas via valse beloften om een inbraak te plegen. Ali blijft zelf thuis. Wat is Ali's juridische rol?",opts:["Medepleger: hij is nauw betrokken bij de planning en dus medeveantwoordelijk","Doen-pleger: hij laat Bas het feit plegen terwijl Bas zelf ook strafbaar is","Uitlokker: hij brengt Bas via een wettelijk uitlokkingsmiddel (valse belofte) op het idee","Medeplichtige: hij ondersteunt Bas bij de voorbereiding van de inbraak"],ans:2,exp:"Art. 47 Sr: uitlokken = via een van de 9 uitlokkingsmiddelen een ander op het idee brengen. Valse beloften is er één van. Uitlokker én feitelijke dader zijn beiden strafbaar. Bij doen-plegen is de materiële dader juist níet strafbaar (hij is een 'instrument'). Bij medeplichtigheid brengt de helper iemand niet op het idee, maar helpt hij pas nadat het idee er al was."},
{cat:"WvSr",art:"Art. 47/48",lvl:"T",text:"Twee vrienden plannen samen een overval, regelen het vervoer samen en voeren hem samen uit. Wat is hun juridische rol?",opts:["Uitlokker en uitgelokte: één had het idee, de ander voerde het uit","Doen-pleger en materiële dader: de planner stuurt de uitvoerder aan","Medeplegers (art. 47 Sr): beiden werken bewust en nauw samen en voeren samen uit","Één is dader, de ander medeplichtige omdat ze verschillende rollen hadden"],ans:2,exp:"Art. 47 Sr: medeplegen = bewuste, volledige en nauwe samenwerking waarbij het feit samen wordt uitgevoerd. Beide personen zijn volledig dader. Het feit dat ze verschillende rollen hebben (één rijdt, één grijpt) doet daar niet aan af — het gaat om de gezamenlijke uitvoering."},
{cat:"WvSr",art:"Art. 47/48",lvl:"T",text:"Iemand staat op de uitkijk terwijl zijn vriend een winkel overvalt. Wat is zijn juridische positie?",opts:["Medepleger: het op de uitkijk staan is een onmisbaar onderdeel van de overval","Uitlokker: hij heeft zijn vriend gestimuleerd de overval te plegen","Medeplichtige (art. 48 Sr): hij vervult een ondersteunende rol zonder zelf het feit uit te voeren","Doen-pleger: hij laat zijn vriend het vuile werk opknappen"],ans:2,exp:"Art. 48 Sr: medeplichtigheid = ondersteunende rol tijdens (of vóór) het misdrijf zonder zelf alle bestanddelen te vervullen. De straf is maximaal een derde lager dan voor de dader. Of hij medepleger is hangt af van de intensiteit van de samenwerking — uitkijk staan is doorgaans medeplichtigheid, tenzij hij nauw betrokken was bij de planning."},
{cat:"WvSr",art:"Art. 138",lvl:"T",text:"Iemand loopt via een openstaande voordeur een woning binnen — de bewoner is niet thuis en heeft geen toestemming gegeven. Is dit huisvredebreuk?",opts:["Nee, de deur stond open: er was geen sprake van 'binnendringen' want hij hoefde niets te forceren","Ja, ook via een open deur kan huisvredebreuk worden gepleegd als er duidelijk geen toestemming is","Nee, huisvredebreuk vereist altijd braak, inklimming of bedreiging","Nee, want de bewoner is niet aanwezig en kan dus geen inbreuk op zijn huisrecht ondervinden"],ans:1,exp:"Art. 138 Sr: 'binnendringen' vereist geen braak. Ook binnengaan via een open deur is huisvredebreuk als duidelijk is dat de bewoner geen toestemming heeft gegeven. De afwezigheid van de bewoner maakt het juist ernstiger, niet minder strafbaar."},
{cat:"WvSr",art:"Art. 139",lvl:"T",text:"Na sluitingstijd weigert een bezoeker een gemeentekantoor te verlaten. Welk artikel is het meest van toepassing?",opts:["Art. 138 Sr – huisvredebreuk: ook een gemeentekantoor valt onder 'woning of lokaal'","Art. 139 Sr – lokaalvredebreuk: specifiek voor voor de openbare dienst bestemde lokalen","Art. 184 Sr – niet voldoen aan ambtelijk bevel: de portier heeft gevraagd te vertrekken","Art. 180 Sr – wederspannigheid: hij verzet zich tegen het gezag"],ans:1,exp:"Art. 139 Sr: lokaalvredebreuk ziet specifiek op voor de openbare dienst bestemde lokalen (gemeentekantoren, rechtbanken etc.). Art. 138 gaat over woningen en besloten lokalen. Art. 184 is pas relevant als een bevoegde ambtenaar een formeel bevel geeft; art. 180 vereist fysiek geweld of bedreiging daarmee."},
{cat:"WvSr",art:"Art. 141",lvl:"T",text:"Drie personen slaan samen openlijk op straat een persoon. Welk artikel is — naast eventuele mishandeling — het meest passend?",opts:["Art. 350 Sr – vernieling: geweld tegen personen valt onder vernieling als ze ook schade oplopen","Art. 300 Sr – eenvoudige mishandeling: dit is het basisdelict voor geweld tegen personen","Art. 141 Sr – openlijke geweldpleging: openlijk geweld in vereniging tegen personen","Art. 312 Sr – diefstal met geweld: tenzij er ook iets wordt gestolen"],ans:2,exp:"Art. 141 Sr: openlijke geweldpleging vereist (1) openlijk (zichtbaar/hoorbaar voor publiek), (2) in vereniging (≥2 personen), (3) geweld tegen personen of goederen. Dit is een zwaarder en specifieker delict dan art. 300, en heeft geen betrekking op vernieling of diefstal."},
{cat:"WvSr",art:"Art. 177",lvl:"T",text:"Iemand geeft een ambtenaar €1.000 zodat hij een vergunning goedkeurt die normaal zou worden geweigerd. Welk artikel overtreedt de gever?",opts:["Art. 363 Sr – passieve omkoping: hij profiteert van de situatie","Art. 225 Sr – valsheid in geschrifte: de vergunning wordt valselijk verleend","Art. 177 Sr – actieve omkoping: hij biedt een gift aan een ambtenaar om hem te bewegen iets te doen","Art. 326 Sr – oplichting: hij misleidt de ambtenaar met geld"],ans:2,exp:"Art. 177 Sr: actieve omkoping = aanbieden van een gift of belofte aan een ambtenaar om hem te bewegen iets te doen of na te laten. De gever valt onder art. 177; de omgekochte ambtenaar onder art. 363 (passieve omkoping). Art. 225 gaat over valse documenten, art. 326 over misleiding van burgers."},
{cat:"WvSr",art:"Art. 180",lvl:"T",text:"Een verdachte verzet zich fysiek als twee agenten hem rechtmatig aanhouden. Welk artikel is van toepassing?",opts:["Art. 179 Sr – ambtsdwang: hij probeert de agenten te dwingen de aanhouding te staken","Art. 184 Sr – niet voldoen aan ambtelijk bevel: hij gehoorzaamt het bevel tot aanhouding niet","Art. 180 Sr – wederspannigheid: met geweld verzetten tegen een rechtmatig optredende ambtenaar","Art. 141 Sr – openlijke geweldpleging: het verzet vindt openlijk plaats tegen overheidsgezag"],ans:2,exp:"Art. 180 Sr: wederspannigheid = met geweld of bedreiging met geweld verzetten tegen een ambtenaar die een rechtmatige taak uitvoert. Art. 179 (ambtsdwang) is anders: daar dreigt de dader met geweld vóórdat de ambtenaar begint, om hem te dwingen iets te doen. Art. 184 vereist geen geweld."},
{cat:"WvSr",art:"Art. 180",lvl:"T",text:"Wat is het verschil tussen ambtsdwang (art. 179 Sr) en wederspannigheid (art. 180 Sr)?",opts:["Er is geen verschil in strafbaarheid, alleen de naam verschilt per situatie","Bij ambtsdwang wordt geweld gebruikt vóórdat de ambtenaar begint; bij wederspannigheid nadat de ambtenaar al handelt","Bij wederspannigheid gaat het altijd om verbale bedreigingen; bij ambtsdwang om fysiek geweld","Art. 179 geldt alleen voor agenten in uniform; art. 180 voor alle ambtenaren in functie"],ans:1,exp:"Art. 179 Sr: ambtsdwang = de dader dreigt met geweld of gebruikt het om een ambtenaar te dwingen iets te doen/laten, terwijl de ambtenaar nog niet begonnen is. Art. 180 Sr: wederspannigheid = verzet met geweld nadat de ambtenaar al met zijn taak is begonnen (zoals een aanhouding). De tijdsvolgorde is doorslaggevend."},
{cat:"WvSr",art:"Art. 184",lvl:"T",text:"Een agent geeft opdracht door te lopen bij een menigte. Iemand blijft staan en weigert zonder geweld te gebruiken. Welk artikel?",opts:["Art. 180 Sr – wederspannigheid: hij verzet zich door te blijven staan","Art. 179 Sr – ambtsdwang: hij dwingt de agent zijn bevel te herhalen","Art. 184 Sr – opzettelijk niet voldoen aan een bevoegd gegeven ambtelijk bevel","Art. 266 Sr – belediging van een ambtenaar: stilstaan is een belediging van zijn gezag"],ans:2,exp:"Art. 184 Sr: opzettelijk niet voldoen aan een bevoegd gegeven bevel of vordering van een ambtenaar. Geweld is niet vereist — passief weigeren is al genoeg. Art. 180 vereist wél geweld of bedreiging daarmee. Art. 179 gaat over dwang vóórdat de ambtenaar begint."},
{cat:"WvSr",art:"Art. 207",lvl:"T",text:"Een getuige legt voor de rechter opzettelijk een valse verklaring af terwijl hij onder ede staat. Wat is het maximale strafmaximum?",opts:["2 jaar gevangenisstraf — hetzelfde als voor valsheid in geschrifte","4 jaar gevangenisstraf, oplopend tot 6 jaar bij ernstige misdrijven","6 jaar gevangenisstraf, oplopend tot 9 jaar als de verklaring ten nadele was van een verdachte in een strafzaak","Levenslang, want meineed ondermijnt de rechtsstaat fundamenteel"],ans:2,exp:"Art. 207 Sr: meineed = opzettelijke valse verklaring onder ede. Maximaal 6 jaar gevangenisstraf, oplopend tot 9 jaar als de valse verklaring ten nadele was van een verdachte in een strafzaak. Zonder ede is er geen meineed maar mogelijk wel een ander strafbaar feit (bijv. art. 188 Sr)."},
{cat:"WvSr",art:"Art. 225",lvl:"T",text:"Iemand maakt een nep-arbeidscontract om een uitkering te frauderen. Welk strafbaar feit is dit primair?",opts:["Art. 188 Sr – valse aangifte: hij dient een vals document in bij de overheid","Art. 321 Sr – verduistering: hij houdt geld achter dat niet van hem is","Art. 225 Sr – valsheid in geschrifte: het valselijk opmaken van een geschrift met oogmerk tot gebruik","Art. 135 Sr – oplichting van de overheid via een listige kunstgreep"],ans:2,exp:"Art. 225 Sr: valsheid in geschrifte = valselijk opmaken of vervalsen van een geschrift met het oogmerk het te gebruiken alsof het echt is. In combinatie met de aanvraag kan er ook oplichting (art. 326 Sr) spelen. Art. 188 gaat over valse aangifte van een strafbaar feit, niet over vervalste documenten."},
{cat:"WvSr",art:"Art. 251",lvl:"T",text:"Een 35-jarige man stuurt via Instagram seksueel getinte berichten aan een 14-jarig kind en stelt een ontmoeting voor. Hij reserveert ook een hotelkamer. Welk strafbaar feit?",opts:["Art. 285b Sr – belaging: hij lastigvalt het kind stelselmatig via sociale media","Art. 261 Sr – smaadschrift: hij maakt de naam van het kind te schande","Art. 251 lid 1 onder c Sr – grooming: voorstel tot ontmoeting voor seksueel doel plus concrete handeling","Art. 285 Sr – bedreiging: seksuele berichten kunnen als bedreigend worden ervaren"],ans:2,exp:"Art. 251 lid 1 onder c Sr: grooming = een kind onder 16 jaar een ontmoeting voor seksuele doeleinden voorstellen, gecombineerd met een concrete handeling om die ontmoeting te verwezenlijken (hier: hotelkamer reserveren). De seksuele berichten alleen zijn onvoldoende; de combinatie met de concrete stap maakt het grooming."},
{cat:"WvSr",art:"Art. 261",lvl:"T",text:"Iemand beschuldigt zijn buurman openlijk op Facebook ervan dat hij geld steelt van de buurtvereniging, met de bedoeling dit wijd te verspreiden. Wat is dit?",opts:["Eenvoudige belediging (art. 266 Sr): hij scheldt de buurman uit met een beschuldiging","Laster (art. 262 Sr): de beschuldiging op sociale media is per definitie laster","Smaadschrift (art. 261 lid 2 Sr): openbare beschuldiging van een bepaald feit via geschrift met doel ruchtbaarheid","Bedreiging (art. 285 Sr): de publicatie kan de reputatie van de buurman ernstig schaden"],ans:2,exp:"Art. 261 Sr: smaad = openbare beschuldiging van een bepaald feit met het kennelijke doel ruchtbaarheid te geven. Via Facebook (geschrift/digitaal bericht) is het smaadschrift (lid 2). Als de beschuldiging aantoonbaar onwaar is, wordt het laster. Eenvoudige belediging bevat géén bepaald feit ten laste."},
{cat:"WvSr",art:"Art. 285",lvl:"T",text:"Iemand stuurt via WhatsApp aan zijn ex: 'Ik maak je af als je niet terugkomt.' Welk strafbaar feit is dit?",opts:["Art. 285b Sr – belaging: hij lastigvalt haar stelselmatig via berichten","Art. 266 Sr – eenvoudige belediging: het bericht is grievend maar geen feitelijke bedreiging","Art. 285 Sr – bedreiging met een misdrijf tegen het leven","Art. 180 Sr – wederspannigheid: hij verzet zich tegen haar keuze"],ans:2,exp:"Art. 285 Sr: bedreiging = bedreigen met een ernstig misdrijf (hier: misdrijf tegen het leven) op een wijze dat redelijkerwijs vrees kan ontstaan dat de dreiging wordt uitgevoerd. Digitale berichten vallen er volledig onder. Belaging (art. 285b) vereist stelselmatigheid — één bericht kan al bedreiging zijn."},
{cat:"WvSr",art:"Art. 285b",lvl:"T",text:"Iemand stuurt zijn ex-partner dagelijks berichten, wacht voor zijn woning en volgt hem overal. Wat is het strafbare feit?",opts:["Art. 285 Sr – bedreiging: dagelijkse berichten en volgen kunnen als bedreigend worden ervaren","Art. 285d Sr – doxing: hij verzamelt informatie over zijn ex-partners locaties","Art. 285b Sr – belaging (stalking): stelselmatig lastigvallen met inbreuk op de privacy","Art. 184 Sr – niet voldoen aan ambtelijk bevel: hij negeert het contactverbod"],ans:2,exp:"Art. 285b Sr: belaging/stalking = wederrechtelijk, opzettelijk en stelselmatig (herhaaldelijk) lastigvallen waardoor inbreuk op de privacy. Het is een absoluut klachtendelict: zonder klacht van het slachtoffer geen vervolging. Doxing (art. 285d) gaat over het publiceren van persoonsgegevens, niet over volgen."},
{cat:"WvSr",art:"Art. 285d",lvl:"T",text:"Iemand publiceert het thuisadres, telefoonnummer en werkplek van een journalist online met de tekst 'ga hem maar lastigvallen'. Welk artikel?",opts:["Art. 261 Sr – smaadschrift: hij maakt belastende informatie over de journalist openbaar","Art. 285b Sr – belaging: hij stimuleert anderen de journalist stelselmatig lastig te vallen","Art. 285d Sr – doxing: opzettelijk openbaar maken van persoonsgegevens om iemand te intimideren of te laten intimideren","Art. 48 Sr – medeplichtigheid: hij helpt anderen de journalist lastig te vallen"],ans:2,exp:"Art. 285d Sr: doxing = opzettelijk openbaar maken van persoonsgegevens met het doel iemand te intimideren of te laten intimideren door derden. Het oproepen van anderen om iemand lastig te vallen valt er ook onder. Smaad vereist een concrete beschuldiging van een bepaald feit; dat is hier niet het geval."},
{cat:"WvSr",art:"Art. 287/289",lvl:"K",text:"Wat onderscheidt moord (art. 289 Sr) van doodslag (art. 287 Sr)?",opts:["Bij moord is het slachtoffer een onbekende; bij doodslag een bekende van de dader","Bij moord is altijd gebruik gemaakt van een wapen of gif; bij doodslag niet","Bij moord is sprake van voorbedachte rade (planning vooraf); bij doodslag niet","Bij doodslag is altijd sprake van een plotselinge gemoedsbeweging als wettelijk vereiste"],ans:2,exp:"Art. 287 Sr (doodslag): opzettelijk doden zónder voorbedachte rade — impulsief. Art. 289 Sr (moord): opzettelijk doden mét voorbedachte rade — enige tijd nagedacht over het besluit. De relatie tot het slachtoffer of het gebruikte middel is niet doorslaggevend. Moord: max. levenslang of 30 jaar; doodslag: max. 15 jaar."},
{cat:"WvSr",art:"Art. 300/302",lvl:"T",text:"Iemand slaat zijn buurman met opzet op het hoofd zodat hij een zware hersenschudding oploopt. Welk artikel past het best?",opts:["Art. 300 lid 1 Sr – eenvoudige mishandeling: elke klap valt onder dit artikel","Art. 300 lid 2 Sr – mishandeling met zwaar letsel als gevolg: het letsel was niet beoogd maar is wel zwaar","Art. 302 Sr – zware mishandeling: het opzet was gericht op het toebrengen van zwaar letsel","Art. 287 Sr – doodslag: een hersenschudding kan levensbedreigend zijn"],ans:2,exp:"Art. 302 Sr: zware mishandeling = het opzet is gericht op zwaar lichamelijk letsel. Als alleen de klap (pijn/letsel) was beoogd en het zware letsel een ongewild gevolg is, geldt art. 300 lid 2. Het verschil zit in het opzet van de dader, niet in het gevolg."},
{cat:"WvSr",art:"Art. 300/302",lvl:"T",text:"Iemand geeft een ander een onverwachte duw in een vijver. De persoon raakt niet gewond maar ervaart een hevige onaangename gewaarwording. Welk artikel?",opts:["Geen strafbaar feit: er is geen lichamelijk letsel, dus geen mishandeling mogelijk","Art. 350 Sr – vernieling: zijn kleding is nat geworden","Art. 300 Sr – eenvoudige mishandeling: ook een onaangename gewaarwording zonder letsel valt hieronder","Art. 302 Sr – zware mishandeling: onderdompeling in water kan levensgevaarlijk zijn"],ans:2,exp:"Art. 300 Sr: mishandeling omvat niet alleen letsel maar ook het toebrengen van een min of meer hevige onaangename gewaarwording (jurisprudentie). Onverwacht in het water duwen is het klassieke voorbeeld. Letsel is uitdrukkelijk níet vereist voor art. 300."},
{cat:"WvSr",art:"Art. 310/311/312",lvl:"T",text:"Iemand neemt 's nachts stiekem een fiets mee uit andermans tuin. Hij heeft geen geweld gebruikt. Welk artikel?",opts:["Art. 321 Sr – verduistering: hij heeft de fiets eerder rechtmatig onder zich gekregen","Art. 311 Sr – gekwalificeerde diefstal: diefstal 's nachts in een besloten erf","Art. 310 Sr – gewone diefstal, want er zijn geen strafverzwarende omstandigheden","Art. 312 Sr – diefstal met geweld, want hij heeft de tuin betreden zonder toestemming"],ans:1,exp:"Art. 311 Sr: gekwalificeerde diefstal met strafverzwarende omstandigheid: diefstal in of op een besloten erf (de tuin). De combinatie met 's nachts maakt het nog zwaarder. Art. 310 is de basisvorm zonder verzwarende omstandigheden. Verduistering vereist dat het goed eerder rechtmatig is verkregen."},
{cat:"WvSr",art:"Art. 310/311/312",lvl:"T",text:"Een overvaller duwt een winkelier opzij en grijpt geld uit de kassa. Welk artikel is van toepassing?",opts:["Art. 311 Sr – gekwalificeerde diefstal: diefstal in een winkel met gebruik van kracht","Art. 317 Sr – afpersing: hij dwingt de winkelier afstand te doen van het geld","Art. 312 Sr – diefstal met geweld: diefstal waarbij geweld wordt gebruikt of gedreigd","Art. 310 Sr – gewone diefstal: de duw is minimaal en bijkomstig aan de diefstal"],ans:2,exp:"Art. 312 Sr: diefstal met geweld = alle bestanddelen van diefstal (art. 310) plus geweld of bedreiging daarmee, gebruikt vóór, tijdens of na de diefstal. De duw is geweld. Art. 317 (afpersing) verschilt doordat bij afpersing het slachtoffer zelf iets afgeeft onder dwang; bij art. 312 neemt de dader het zelf."},
{cat:"WvSr",art:"Art. 317",lvl:"T",text:"Iemand bedreigt een winkelhouder met een mes en eist dat hij de kassa leegmaakt. Welk artikel?",opts:["Art. 312 Sr – diefstal met geweld: de dader grijpt het geld zelf","Art. 310 Sr – gewone diefstal: de bedreiging is louter ter afleiding","Art. 317 Sr – afpersing: door bedreiging de winkelhouder dwingen zelf het geld te overhandigen","Art. 285 Sr – bedreiging: het mes en de eis vormen een bedreiging met een misdrijf"],ans:2,exp:"Art. 317 Sr: afpersing = door geweld of bedreiging iemand dwingen iets af te geven. Het onderscheid met art. 312: bij afpersing geeft het slachtoffer het goed zelf af (gedwongen keuze); bij diefstal met geweld neemt de dader het zelf. Het mes + de eis is afpersing."},
{cat:"WvSr",art:"Art. 321",lvl:"T",text:"Een huurder besluit halverwege de huurperiode de auto van de verhuurder gewoon te houden en niet meer terug te brengen. Wat is dit?",opts:["Art. 310 Sr – diefstal: hij heeft de auto weggenomen van de verhuurder","Art. 317 Sr – afpersing: hij dwingt de verhuurder de auto op te geven","Art. 321 Sr – verduistering: het goed was eerst rechtmatig verkregen, later gaat hij als eigenaar handelen","Art. 326 Sr – oplichting: hij had van het begin af aan de bedoeling de auto te houden"],ans:2,exp:"Art. 321 Sr: verduistering = het goed is first 'anders dan door misdrijf' verkregen (rechtmatige huur) en de dader gedraagt zich later als eigenaar. Had hij bij het huren al de bedoeling het niet terug te brengen, dan is het art. 326 (oplichting). Dit onderscheid zit in het tijdstip van het opzet."},
{cat:"WvSr",art:"Art. 326",lvl:"T",text:"Iemand doet zich voor als loodgieter, inspecteert een leiding en int betaling voor werk dat hij nooit uitvoert. Welk artikel?",opts:["Art. 321 Sr – verduistering: hij heeft geld ontvangen dat hij had moeten teruggeven","Art. 225 Sr – valsheid in geschrifte: hij heeft een valse factuur opgemaakt","Art. 326 Sr – oplichting: door aannemen van een valse hoedanigheid iemand bewegen tot afgifte","Art. 177 Sr – actieve omkoping: hij neemt geld aan voor een dienst die hij niet levert"],ans:2,exp:"Art. 326 Sr: oplichting = door bedrog (hier: valse hoedanigheid van loodgieter) iemand bewegen tot afgifte van geld. De valse factuur kan ook valsheid in geschrifte (art. 225) opleveren, maar de kern van dit delict is de misleiding die leidt tot de afgifte."},
{cat:"WvSr",art:"Art. 350/350a",lvl:"T",text:"Iemand gooit opzettelijk de ruit van een auto in met een steen. Welk artikel?",opts:["Art. 141 Sr – openlijke geweldpleging: geweld tegen een goed in het openbaar","Art. 312 Sr – diefstal met geweld: de geweldshandeling maakt het een zwaarder delict","Art. 350 Sr – vernieling: opzettelijk en wederrechtelijk beschadigen van een goed van een ander","Art. 300 Sr – mishandeling: het geweld is gericht op een object dat iemands eigendom is"],ans:2,exp:"Art. 350 Sr: vernieling = opzettelijk en wederrechtelijk beschadigen/vernietigen van een goed dat aan een ander toebehoort. Art. 141 vereist 'in vereniging' (meerdere daders) én openlijk; voor één persoon is art. 350 het passende artikel."},
{cat:"WvSr",art:"Art. 350/350a",lvl:"T",text:"Iemand hackt de computer van een bedrijf en verwijdert alle bestanden. Welk artikel is van toepassing?",opts:["Art. 350 Sr – vernieling: digitale bestanden zijn goederen in de zin van de wet","Art. 350a Sr – vernieling van computergegevens: specifiek artikel voor het wissen van digitale gegevens","Art. 225 Sr – valsheid in geschrifte: hij manipuleert de digitale administratie van het bedrijf","Art. 321 Sr – verduistering: hij heeft zich de gegevens wederrechtelijk toegeëigend"],ans:1,exp:"Art. 350a Sr: opzettelijk en wederrechtelijk veranderen, wissen of onbruikbaar maken van computergegevens. Dit is de digitale variant van vernieling (art. 350). Digitale bestanden zijn geen 'goederen' in de klassieke zin — vandaar de aparte bepaling."},
{cat:"WvSr",art:"Art. 416/417bis",lvl:"K",text:"Wat is het verschil tussen opzetheling (art. 416 Sr) en schuldheling (art. 417bis Sr)?",opts:["Bij opzetheling is de straf lager omdat de heler soms zelf slachtoffer is van misleiding","Bij schuldheling weet de heler zeker dat het goed gestolen is; bij opzetheling vermoedt hij het alleen","Bij opzetheling weet de heler dat het goed door misdrijf verkregen is; bij schuldheling had hij dit redelijkerwijs kunnen weten","Er is geen inhoudelijk verschil: de rechtbank bepaalt achteraf welk artikel van toepassing is"],ans:2,exp:"Art. 416 Sr: opzetheling = de heler weet dat het goed van misdrijf afkomstig is. Art. 417bis Sr: schuldheling = de heler wist het niet, maar had het redelijkerwijs kunnen vermoeden. Opzetheling is zwaarder bestraft. Het bewijs van wetenschap is het verschil."},
{cat:"WvSr",art:"Art. 370",lvl:"K",text:"Wanneer pleegt een ambtenaar 'ambtelijke huisvredebreuk' (art. 370 Sr)?",opts:["Als hij buiten diensttijd en in burgerkleding een woning betreedt","Als hij een woning betreedt met overschrijding van zijn bevoegdheid of zonder inachtneming van de wettelijke vormen","Als hij een woning betreedt zonder zijn legitimatiebewijs bij zich te hebben","Als hij een woning betreedt terwijl de bewoner geen toestemming heeft gegeven — net als art. 138 Sr"],ans:1,exp:"Art. 370 Sr: ambtelijke huisvredebreuk = een ambtenaar betreedt een woning met overschrijding van zijn bevoegdheid of zonder de wettelijk voorgeschreven vormen (bijv. zonder vereiste machtiging of zonder legitimatie). Het onderscheidt zich van art. 138 doordat het specifiek over bevoegdheidsoverschrijding gaat, niet over wederrechtelijkheid in het algemeen."},
{cat:"WvSr",art:"Art. 424",lvl:"K",text:"Wat wordt verstaan onder 'baldadigheid' (art. 424 Sr)?",opts:["Het opzettelijk beschadigen van andermans goederen op openbare weg — identiek aan vernieling","Het zonder redelijk doel hinderen van personen of aanbrengen van schade op de openbare weg","Het plegen van vernieling in groepsverband op een openbare plek overdag","Het openlijk bedreigen van personen zonder concreet misdrijf te noemen"],ans:1,exp:"Art. 424 Sr: baldadigheid = openlijk, zonder redelijk doel, de openbare rust verstoren of schade aanrichten op de openbare weg. Het is een overtreding (geen misdrijf), dus lichtere sancties dan art. 350 (vernieling). Het gaat specifiek om doelloos storend of schadelijk gedrag in de openbare ruimte."},
{cat:"WvSr",art:"Art. 435",lvl:"T",text:"Een agent vraagt iemand naar zijn naam en geboortedatum. De persoon geeft een valse naam op. Welk strafbaar feit?",opts:["Art. 447e Sr – niet voldoen aan de identificatieplicht: hij heeft geen ID getoond","Art. 180 Sr – wederspannigheid: hij verzet zich tegen de vordering van de agent","Art. 435 Sr – opgeven van valse identiteitsgegevens aan het bevoegd gezag","Art. 207 Sr – meineed: hij liegt onder een wettelijke verplichting"],ans:2,exp:"Art. 435 Sr: het opgeven van valse naam, voornaam, geboortedatum, geboorteplaats of adres aan het bevoegd gezag is strafbaar. Dit is een overtreding, niet een misdrijf. Art. 447e gaat over het niet tonen van een identiteitsbewijs — hier gaat het om het geven van valse gegevens."},
{cat:"WvSr",art:"Art. 447e",lvl:"T",text:"Een aangehouden verdachte weigert zijn identiteitsbewijs te tonen. Welk artikel overtreedt hij?",opts:["Art. 435 Sr – valse identiteitsgegevens: niet tonen is hetzelfde als valse gegevens geven","Art. 184 Sr – niet voldoen aan ambtelijk bevel: hij weigert een bevel van de agent op te volgen","Art. 447e Sr – niet voldoen aan de verplichting een identiteitsbewijs op eerste vordering te tonen","Art. 180 Sr – wederspannigheid: hij verzet zich fysiek door het bewijs weg te stoppen"],ans:2,exp:"Art. 447e Sr: strafbaar is degene die niet op eerste vordering van een opsporingsambtenaar een geldig identiteitsbewijs toont. Art. 435 gaat over het geven van valse gegevens (mondeling), niet over het weigeren een document te tonen. Art. 184 kan ook spelen, maar art. 447e is de specifieke bepaling."},
// ========== WETBOEK VAN STRAFVORDERING ==========
{cat:"WvSv",art:"Art. 1",lvl:"K",text:"Wat houdt het legaliteitsbeginsel in het strafprocesrecht (art. 1 WvSv) in?",opts:["De politie heeft een wettelijke basis nodig — hetzelfde als art. 1 Sr maar dan voor politieoptreden","Strafvordering mag alleen plaatsvinden op de wijze zoals bij wet (in formele zin) is voorzien","De rechter mag alleen wettige bewijsmiddelen gebruiken bij zijn oordeel","Verdachten hebben recht op een wettelijk vastgesteld eerlijk proces"],ans:1,exp:"Art. 1 WvSv: strafvordering vindt slechts plaats op de wijze bij de wet voorzien. 'Wet' betekent hier: een wet in formele zin van de hoogste wetgever (regering + parlement). Dit is het strafvorderlijk legaliteitsbeginsel — anders dan het strafrechtelijk legaliteitsbeginsel van art. 1 Sr."},
{cat:"WvSv",art:"Art. 27",lvl:"T",text:"Een agent ziet iemand snel weglopen van een net overvallen winkel, met een volle rugzak. Op basis waarvan is hij verdachte?",opts:["Alleen als de agent hem zelf heeft zien stelen — anders is er geen bewijs","Zodra de agent hem aanspreekt en hij nerveus reageert","Op grond van concrete feiten of omstandigheden die een redelijk vermoeden van schuld aan een strafbaar feit opleveren","Pas als het OM besluit hem te vervolgen — tot die tijd is hij officieel geen verdachte"],ans:2,exp:"Art. 27 lid 1 WvSv: verdachte = persoon tegen wie op grond van concrete feiten of omstandigheden een redelijk vermoeden van schuld aan een strafbaar feit bestaat. Weglopen van de plek + volle rugzak + melding overval kan voldoende zijn. Nerveus reageren alleen is te weinig."},
{cat:"WvSv",art:"Art. 27c/28/29",lvl:"K",text:"Welk recht heeft een aangehouden verdachte vóór zijn eerste verhoor op grond van art. 27c lid 3 WvSv?",opts:["Het recht om direct in vrijheid te worden gesteld en later te worden opgeroepen voor verhoor","Het recht op een tolk die door hemzelf wordt gekozen en betaald","Schriftelijke mededeling van zijn rechten, waaronder zwijgrecht (cautie) en recht op rechtsbijstand","Het recht om zijn familie te bellen vóór het verhoor begint"],ans:2,exp:"Art. 27c lid 3 WvSv: de aangehouden verdachte krijgt onverwijld vóór zijn eerste verhoor een schriftelijke verklaring van rechten (VvR), met daarin zijn cautie, recht op advocaat, recht op tolk, reden van aanhouding en termijnen. Kennisgeving aan familie valt onder art. 27e, niet art. 27c."},
{cat:"WvSv",art:"Art. 27c/28/29",lvl:"K",text:"Wat houdt de cautie (art. 29 lid 2 WvSv) in?",opts:["De verdachte wordt gewaarschuwd dat liegen strafbaar is en leidt tot hogere straf","De verdachte krijgt de cautie dat zijn verklaring als bewijs tegen hem kan worden gebruikt","De verdachte wordt vóór het verhoor medegedeeld dat hij niet verplicht is te antwoorden (zwijgrecht)","De verdachte wordt gewezen op de maximumstraf die op het ten laste gelegde feit staat"],ans:2,exp:"Art. 29 lid 2 WvSv: de cautie = mededeling aan de verdachte vóór het verhoor dat hij niet verplicht is te antwoorden. Dit beschermt hem tegen gedwongen zelfincriminatie. De mededeling moet ook in het PV worden opgenomen. Liegen is niet strafbaar voor een verdachte (wel voor getuigen onder ede)."},
{cat:"WvSv",art:"Art. 27cb",lvl:"K",text:"Waar vindt het verhoor van een aangehouden verdachte bij voorkeur plaats?",opts:["Op de plek van aanhouding, zodat de omstandigheden vers in het geheugen zijn","Op een door de verdachte gekozen neutrale locatie, zoals een advocatenkantoor","Op een daarvoor bestemde verhoorplaats, of een andere door de (H)OvJ aangewezen plaats","In de rechtbank, zodat de RC direct kan toetsen of het verhoor rechtmatig is"],ans:2,exp:"Art. 27cb WvSv: verhoor van een aangehouden verdachte vindt zo veel mogelijk plaats op een daarvoor bestemde verhoorplaats, of een andere door de (H)OvJ aangewezen plaats. De verdachte heeft geen keuzerecht over de locatie."},
{cat:"WvSv",art:"Art. 52",lvl:"K",text:"Wat is het verschil tussen 'staande houden' (art. 52 WvSv) en 'inzage vorderen van een ID' (art. 8 Politiewet)?",opts:["Er is geen verschil: beide bevoegdheden gelden voor iedereen zonder verdenking","Art. 52 WvSv vereist een verdachte (redelijk vermoeden); art. 8 Politiewet geldt voor iedereen tijdens de politietaak","Art. 8 Politiewet is zwaarder: het vereist een verdenking, art. 52 niet","Art. 52 WvSv geldt alleen voor burgers; art. 8 Politiewet ook voor andere ambtenaren"],ans:1,exp:"Art. 52 WvSv: staande houden vereist een verdachte (redelijk vermoeden van schuld). Art. 8 Politiewet: ID vorderen kan van iedereen tijdens de politietaak, ook zonder enige verdenking. Dit is een belangrijk onderscheid in de bevoegdheidsgrondslag."},
{cat:"WvSv",art:"Art. 53/54",lvl:"K",text:"Een burger ziet hoe iemand op heterdaad een fiets steelt. Mag hij de dief aanhouden en de fiets terugpakken?",opts:["Ja, hij mag zowel de persoon aanhouden als de gestolen fiets terugpakken als getuige","Nee, burgers mogen niemand aanhouden — dat is voorbehouden aan opsporingsambtenaren","Ja, hij mag de persoon aanhouden (art. 53 WvSv), maar hij mag geen voorwerpen in beslag nemen","Ja, maar hij moet de dief eerst aanspreken en pas bij weigering aanhouden"],ans:2,exp:"Art. 53 WvSv: bij ontdekking op heterdaad mag iedereen aanhouden. Een burger mag echter geen voorwerpen in beslag nemen — inbeslagneming is een strafvorderlijke bevoegdheid voorbehouden aan opsporingsambtenaren. De fiets terugpakken mag dus niet."},
{cat:"WvSv",art:"Art. 53/54",lvl:"K",text:"Wanneer mag een opsporingsambtenaar iemand aanhouden buiten heterdaad (art. 54 WvSv)?",opts:["Altijd bij verdenking van een misdrijf met meer dan 4 jaar strafmaximum, op eigen initiatief","Op bevel van de OvJ, ook bij misdrijven met een lager strafmaximum dan 4 jaar","Alleen bij misdrijven met een maximum van 12 jaar of meer — anders is het te ingrijpend","Op eigen initiatief als hij zeker weet dat de verdachte zal vluchten"],ans:1,exp:"Art. 54 WvSv: buiten heterdaad kan aanhouding alleen op bevel van de OvJ. Er is geen minimumstrafeis in art. 54 zelf — de OvJ beoordeelt of aanhouding noodzakelijk is. Bij heterdaad (art. 53) heeft de opsporingsambtenaar die bevelsbevoegdheid wél zelf."},
{cat:"WvSv",art:"Art. 55/55a",lvl:"T",text:"Een agent heeft de bevoegdheid om een verdachte aan te houden. Mag hij daarvoor ook een gesloten woning doorzoeken?",opts:["Ja, art. 55 WvSv geeft hem de bevoegdheid elke plaats te betreden en te doorzoeken zonder aanvullende eisen","Ja, maar alleen voor het betreden (art. 55); voor doorzoeken (art. 55a) is bij misdrijven ex art. 67 een machtiging van de OvJ nodig","Nee, voor woningen is altijd een machtiging van de rechter-commissaris nodig","Ja, mits hij in uniform is en het bevel van de OvJ schriftelijk heeft"],ans:1,exp:"Art. 55 WvSv: betreden ter aanhouding is toegestaan (met machtiging conform Awbi). Art. 55a WvSv: doorzoeken ter aanhouding vereist bij art. 67-misdrijven een machtiging van de OvJ, tenzij er dringende noodzakelijkheid is. Betreden en doorzoeken zijn twee verschillende bevoegdheden."},
{cat:"WvSv",art:"Art. 55b/56",lvl:"T",text:"Een agent wil een aangehouden verdachte onderzoeken aan zijn kleding om bewijs te vinden. Welk artikel geeft hem die bevoegdheid?",opts:["Art. 55b WvSv: ter vaststelling van de identiteit mag kleding worden onderzocht — dit omvat ook bewijsonderzoek","Art. 7 lid 3 Politiewet: de veiligheidsfouillering mag ook voor bewijsvinding worden gebruikt","Art. 56 WvSv: op bevel van de (H)OvJ bij ernstige bezwaren, gericht op bewijsvinding","Art. 20 Ambtsinstructie: de insluitingsfouillering omvat ook het zoeken naar bewijs"],ans:2,exp:"Art. 56 WvSv: de (H)OvJ kan bij ernstige bezwaren (zware verdenking) bepalen dat de verdachte aan lichaam en kleding wordt onderzocht, primair voor bewijsvinding. Art. 55b is beperkt tot identiteitsvaststelling. De veiligheidsfouillering (art. 7 Politiewet) is alleen voor veiligheid, niet voor bewijs."},
{cat:"WvSv",art:"Art. 55c",lvl:"K",text:"Hoe moet de identiteit van een aangehouden verdachte worden vastgesteld?",opts:["Door hem mondeling te vragen naar naam en geboortedatum en dit op te schrijven in het PV","Via het GBA-register van de gemeente op basis van zijn opgegeven naam","Aan de hand van een voorgeschreven identiteitsbewijs of door vergelijking van vingerafdrukken","Door een foto te maken en te vergelijken met bestaande politiefoto's"],ans:2,exp:"Art. 55c WvSv: de identiteit van een aangehouden verdachte moet worden vastgesteld via een voorgeschreven identiteitsbewijs óf door vergelijking van vingerafdrukken. Mondelinge opgave of GBA-raadpleging is onvoldoende — het gaat om verificatie van de opgegeven gegevens."},
{cat:"WvSv",art:"Art. 56a/56b/61a",lvl:"T",text:"Hoe lang mag een verdachte worden opgehouden voor onderzoek bij een feit waarvoor voorlopige hechtenis mogelijk is?",opts:["6 uur (nachttijd niet meegerekend), want dat geldt voor alle feiten","9 uur (nachttijd niet meegerekend) bij art. 67-feiten; 6 uur bij overige feiten","24 uur, want de eerste 24 uur telt de rechter niet mee","9 uur bij alle feiten, te verlengen met nog eens 9 uur door de OvJ"],ans:1,exp:"Art. 56a lid 2 WvSv: bij feiten waarvoor voorlopige hechtenis is toegelaten (art. 67-feiten) maximaal 9 uur; bij overige feiten maximaal 6 uur. De tijd tussen middernacht en 09:00 telt niet mee — slaaptijd wordt dus niet meegerekend."},
{cat:"WvSv",art:"Art. 56a/56b/61a",lvl:"T",text:"Welke maatregelen mogen worden genomen tijdens het ophouden voor onderzoek (art. 61a WvSv)?",opts:["Alle maatregelen die de agent nuttig acht voor het onderzoek, mits proportioneel","Alleen verhoor en de standaard fouillering bij insluiting","Alleen bij art. 67-feiten: foto's, vingerafdrukken, geuridentificatieproef, confrontatie, observatiecel en schotresten­onderzoek","Altijd een verplichte DNA-afname en bloedonderzoek bij geweldsmisdrijven"],ans:2,exp:"Art. 61a WvSv: de maatregelen (foto's, vingerafdrukken, confrontatie, geuridentificatieproef, observatiecel etc.) zijn uitsluitend toegestaan bij verdenking van een misdrijf ex art. 67 lid 1. DNA-afname en bloedonderzoek vallen hier niet onder — daarvoor gelden aparte regels."},
{cat:"WvSv",art:"Art. 57/58",lvl:"K",text:"Hoe lang duurt een inverzekeringstelling maximaal en wie beslist hierover?",opts:["24 uur, door de hulpofficier van justitie, te verlengen met 24 uur door de OvJ","3 dagen en nachten door de (H)OvJ, eenmalig te verlengen met 3 dagen bij dringende noodzaak","14 dagen door de rechter-commissaris — dit is de bewaring, niet de IVS","6 uur door de hulpofficier, na afloop moet de OvJ een beslissing nemen"],ans:1,exp:"Art. 57/58 WvSv: inverzekeringstelling = maximaal 3 dagen en nachten, bevolen door de (H)OvJ na verhoor van de verdachte. Eenmalige verlenging met maximaal 3 dagen is mogelijk bij dringende noodzaak. Na IVS kan de OvJ bewaring (art. 63) vorderen bij de RC — dat duurt maximaal 14 dagen."},
{cat:"WvSv",art:"Art. 67",lvl:"K",text:"Voor welke feiten is voorlopige hechtenis (art. 67 WvSv) toegestaan?",opts:["Alle strafbare feiten waarvoor ook een geldboete kan worden opgelegd","Misdrijven met een strafmaximum van 4 jaar of meer, plus speciaal aangewezen misdrijven met lager maximum","Alleen misdrijven waarbij vluchtgevaar of gevaar voor herhaling bestaat","Alle feiten waarbij de verdachte geen vaste woon- of verblijfplaats in Nederland heeft"],ans:1,exp:"Art. 67 WvSv: voorlopige hechtenis is mogelijk bij (1) misdrijven met max. 4 jaar of meer, én bij (2) speciaal aangewezen misdrijven met lager maximum (zoals belaging, eenvoudige mishandeling, vernieling). Vluchtgevaar of gevaar voor herhaling is een grond voor voorlopige hechtenis, niet een vereiste voor de toepassing van art. 67."},
{cat:"WvSv",art:"Art. 94/95/96/96a/96b",lvl:"T",text:"Een agent houdt een verdachte staande en ziet dat hij een mes bij zich heeft. Mag hij het mes in beslag nemen?",opts:["Nee, inbeslagneming mag alleen na formele aanhouding van de verdachte","Ja op grond van art. 95 WvSv: bij staande houden of aanhouding mag de opsporingsambtenaar vatbare voorwerpen die de verdachte bij zich voert in beslag nemen","Ja, maar alleen als de OvJ hier vooraf toestemming voor heeft gegeven","Nee, een mes is alleen vatbaar voor inbeslagneming als het is gebruikt bij een misdrijf"],ans:1,exp:"Art. 95 WvSv: bij het staande houden of aanhouden mag de opsporingsambtenaar vatbare voorwerpen die de verdachte bij zich voert in beslag nemen. Een mes kan vatbaar zijn (waarheidsvinding, onttrekken aan verkeer). Aanhouding is niet vereist — ook bij staande houden kan dit."},
{cat:"WvSv",art:"Art. 96c/97",lvl:"K",text:"Wie is bevoegd een woning te doorzoeken ter inbeslagneming als de bewoner geen toestemming geeft?",opts:["De opsporingsambtenaar zelf, bij verdenking van een art. 67-feit en dringende noodzaak","De OvJ met een machtiging van de RC; bij dringende noodzaak waarbij de RC niet kan worden afgewacht, mag de OvJ ook zonder RC-machtiging","Alleen de rechter-commissaris zelf, in persoon aanwezig bij de doorzoeking","De hulpofficier van justitie, na overleg met de burgemeester en de OvJ"],ans:1,exp:"Art. 97 WvSv: de OvJ is bevoegd een woning te doorzoeken ter inbeslagneming, maar heeft daarvoor een machtiging van de RC nodig. Bij dringende noodzaak waarbij optreden van de RC niet kan worden afgewacht, mag de OvJ ook zonder die machtiging handelen. De opsporingsambtenaar zelf heeft deze bevoegdheid niet."},
{cat:"WvSv",art:"Art. 124",lvl:"K",text:"Wie is verantwoordelijk voor de orde tijdens een ambtsverrichting en welke maatregel is mogelijk bij verstoring?",opts:["De politie is verantwoordelijk; zij kan de verstoorder direct aanhouden en in bewaring stellen","De griffier is verantwoordelijk en kan de verstoorder verwijderen na overleg met de rechter","De voorzitter/rechter/leidende ambtenaar; na waarschuwing kan hij de verstoorder laten verwijderen en tot afloop in verzekering houden","De OvJ is verantwoordelijk; hij kan onmiddellijk een bevel tot verwijdering geven"],ans:2,exp:"Art. 124 WvSv: de voorzitter/rechter/leidende ambtenaar is verantwoordelijk voor de orde. Na nodige waarschuwing kan hij bevelen dat de verstoorder vertrekt en hem tot de afloop van de ambtsverrichting in verzekering houden. Er hoeft geen PV van de verstoring zelf te worden opgemaakt door de politie — de leidende ambtenaar handelt zelf."},
{cat:"WvSv",art:"Art. 127/141/142",lvl:"K",text:"Wie zijn 'algemene opsporingsambtenaren' (art. 141 WvSv)?",opts:["Alle ambtenaren die in dienst zijn van de overheid en bevoegd zijn PV op te maken","Officieren van justitie, ambtenaren van politie, en aangewezen personeel van de Koninklijke Marechaussee","Alleen politiefunctionarissen met de rang van inspecteur of hoger","Alle buitengewone opsporingsambtenaren (boa's) met een geldig legitimatiebewijs"],ans:1,exp:"Art. 141 WvSv: algemene opsporingsambtenaren zijn belast met de opsporing van alle strafbare feiten: (1) officieren van justitie, (2) ambtenaren van politie, en (3) aangewezen personeel van de KMar. Boa's zijn buitengewoon opsporingsambtenaar (art. 142), niet algemeen."},
{cat:"WvSv",art:"Art. 128",lvl:"B",text:"Een agent arriveert 20 minuten na een melding van een inbraak en het onderzoek is sindsdien ononderbroken doorgegaan. Is er nog sprake van heterdaad?",opts:["Nee, heterdaad eindigt op het moment dat het feit is begaan en de dader is gevlucht","Nee, heterdaad geldt maximaal 10 minuten na het plegen van het feit","Ja, als het opsporingsonderzoek zonder onderbreking is voortgegaan, kan de heterdaadsituatie worden opgerekt","Ja, mits de agent de dader zelf heeft zien vluchten op camerabeelden"],ans:2,exp:"Art. 128 WvSv: heterdaad = het feit wordt ontdekt terwijl het wordt begaan of terstond daarna. De heterdaadsituatie kan worden opgerekt zolang het opsporingsonderzoek continu en zonder onderbreking doorgaat. Een tijdslimiet (10 minuten, 1 uur) is niet vastgelegd in de wet."},
{cat:"WvSv",art:"Art. 161",lvl:"K",text:"Wie is bevoegd aangifte te doen van een strafbaar feit?",opts:["Alleen het directe slachtoffer of zijn wettelijke vertegenwoordiger","Alleen meerderjarigen met een vaste woon- of verblijfplaats in Nederland","Iedereen die kennis draagt van een strafbaar feit (art. 161 WvSv)","Alleen personen die zelf schade hebben geleden door het strafbare feit"],ans:2,exp:"Art. 161 WvSv: iedereen die kennis draagt van een strafbaar feit is bevoegd aangifte te doen. Er is geen leeftijdsgrens, geen schade-eis en geen eis van slachtofferschap. Dus ook een getuige die zelf geen schade heeft geleden kan aangifte doen."},
{cat:"WvSv",art:"Art. 167",lvl:"K",text:"Wat houdt het opportuniteitsbeginsel (art. 167 WvSv) in?",opts:["Het OM is altijd verplicht te vervolgen als er voldoende bewijs is — anders is het in strijd met de wet","De rechter beslist uiteindelijk of vervolging opportuun is; het OM adviseert alleen","Het OM heeft de vrijheid van vervolging af te zien op gronden van het algemeen belang, ook bij voldoende bewijs","De politie beslist of een zaak naar het OM wordt gestuurd op basis van de ernst van het feit"],ans:2,exp:"Art. 167 WvSv: het opportuniteitsbeginsel = het OM beslist of vervolging plaatsvindt en kan afzien van vervolging (sepot) op gronden van het algemeen belang — ook als er voldoende bewijs is. Dit is een ruim beleidsdiscretie. Technisch sepot (onvoldoende bewijs) is iets anders dan een beleidssepot."},
{cat:"WvSv",art:"Art. 338",lvl:"K",text:"Waarop moet de rechter zijn overtuiging baseren bij de bewijsbeslissing?",opts:["Uitsluitend op de bekentenis van de verdachte, want dat is het sterkste bewijs","Op de inhoud van wettige bewijsmiddelen na onderzoek ter terechtzitting, gecombineerd met zijn eigen overtuiging","Op het advies en de eis van de officier van justitie","Op de mening van de jury, als die aanwezig is"],ans:1,exp:"Art. 338 WvSv: de rechter mag alleen tot veroordeling komen als hij uit het onderzoek ter terechtzitting door de inhoud van wettige bewijsmiddelen overtuigd is. Zowel wettige bewijsmiddelen als de overtuiging van de rechter zijn vereist — één van beide is onvoldoende."},
{cat:"WvSv",art:"Art. 339",lvl:"T",text:"Welke zijn de wettige bewijsmiddelen (art. 339 WvSv)?",opts:["Alleen schriftelijke stukken en bekennende verklaringen van de verdachte","DNA-bewijs, camerabeelden, getuigenissen en deskundigenrapporten","Eigen waarneming van de rechter, verklaringen van verdachte/getuigen/deskundigen en schriftelijke stukken","Alle informatie die de politie rechtmatig heeft verzameld en in het PV heeft vastgelegd"],ans:2,exp:"Art. 339 WvSv: de wettige bewijsmiddelen zijn uitputtend opgesomd: (1) eigen waarneming van de rechter, (2) verklaringen van de verdachte, getuigen en deskundigen, en (3) schriftelijke stukken. DNA-bewijs en camerabeelden zijn schriftelijke stukken of komen via een deskundige in het bewijs."},
{cat:"WvSv",art:"Art. 341/342",lvl:"K",text:"Mag een verdachte worden veroordeeld uitsluitend op basis van zijn eigen bekentenis?",opts:["Ja, een bekentenis is het sterkste bewijs en maakt aanvullend bewijs overbodig","Ja, mits de bekentenis schriftelijk is vastgelegd en de verdachte zijn handtekening heeft gezet","Nee, art. 341 lid 4 WvSv verbiedt veroordeling louter op basis van de verklaring van de verdachte zelf","Ja, als de rechter gelooft dat de bekentenis vrijwillig en betrouwbaar is"],ans:2,exp:"Art. 341 lid 4 WvSv: een verdachte mag niet worden veroordeeld louter op basis van zijn eigen verklaring. Er moeten aanvullende bewijsmiddelen zijn. Dit beschermt tegen valse bekentenissen onder druk."},
{cat:"WvSv",art:"Art. 341/342",lvl:"K",text:"Wat houdt de regel 'één getuige is geen getuige' (art. 342 lid 2 WvSv) in?",opts:["Een verklaring van één getuige heeft überhaupt geen bewijswaarde en wordt genegeerd","Het bewijs van de gehele tenlastelegging mag niet uitsluitend berusten op de verklaring van één getuige","Een rechter moet altijd minstens twee getuigen horen voor hij een veroordeling uitspreekt","Getuigenverklaringen zijn altijd minder betrouwbaar dan schriftelijk bewijs en tellen minder mee"],ans:1,exp:"Art. 342 lid 2 WvSv: het bewijs van de volledige tenlastelegging mag niet uitsluitend berusten op de verklaring van één getuige. Uitzondering: een PV van één opsporingsambtenaar kan wél voldoende zijn (art. 344 lid 2). Eén getuige kan dus bijdragen aan het bewijs, mits er aanvullend ander bewijs is."},
{cat:"WvSv",art:"Art. 344",lvl:"K",text:"Welke schriftelijke stukken kunnen als bewijsmiddel dienen in een strafzaak?",opts:["Alle schriftelijke documenten, ook als ze niet officieel zijn, zolang ze relevant zijn","Alleen officieel door de rechter-commissaris opgemaakt PV's","PV's van bevoegde personen, rechterlijke beslissingen, verslagen van deskundigen en andere geschriften (de laatste alleen in combinatie met andere bewijsmiddelen)","Uitsluitend door de verdachte ondertekende verklaringen en door de OvJ goedgekeurde stukken"],ans:2,exp:"Art. 344 WvSv: als schriftelijk bewijsmiddel gelden o.a. PV's van bevoegde personen, rechterlijke beslissingen, verslagen van deskundigen en andere geschriften. Dat laatste is een restcategorie die alleen in combinatie met andere bewijsmiddelen mag worden gebruikt."},

{cat:"Wet Identificatieplicht",art:"Art. 1",lvl:"K",text:"Welke documenten zijn geldig als identiteitsbewijs op grond van de Wet op de identificatieplicht?",opts:["Alleen een paspoort — een ID-kaart is alleen geldig binnen de EU, niet voor de politie","Paspoort, Nederlandse ID-kaart, vreemdelingendocument, rijbewijs van een EU-lidstaat en noodpaspoort","Elk document met een pasfoto en naam afgegeven door een overheidsinstantie","Rijbewijs, paspoort en bankpas met foto, voor zover deze geldig zijn"],ans:1,exp:"Art. 1 WID: geldige identiteitsbewijzen zijn: Nederlandse ID-kaart, paspoort, vreemdelingendocument, geldig nationaal/diplomatiek paspoort, rijbewijs afgegeven door een EU-lidstaat, en noodpaspoort. Een bankpas is nooit een geldig identiteitsbewijs. Een rijbewijs van buiten de EU valt er niet onder."},
{cat:"Wet Identificatieplicht",art:"Art. 2",lvl:"K",text:"Vanaf welke leeftijd ben je verplicht een identiteitsbewijs te tonen op vordering van een bevoegde ambtenaar?",opts:["12 jaar — de leeftijd van strafrechtelijke verantwoordelijkheid","16 jaar — de leeftijd van arbeidsrecht en bepaalde bevoegdheden","14 jaar","18 jaar — de meerderjarigheidsgrens"],ans:2,exp:"Art. 2 WID: vanaf 14 jaar ben je verplicht een geldig identiteitsbewijs te tonen op eerste vordering. Dit is een andere grens dan 12 jaar (strafrechtelijke aansprakelijkheid) en 18 jaar (meerderjarigheid). Kinderen onder de 14 hoeven geen ID te tonen."},

{cat:"Awbi",art:"Art. 1/2",lvl:"K",text:"Wat zijn de verplichtingen van een ambtenaar die een woning betreedt (art. 1 Awbi)?",opts:["Hij hoeft zich alleen te legitimeren als de bewoner hierom vraagt","Hij is verplicht zich vooraf te legitimeren én het doel van zijn komst mee te delen; bij meerdere ambtenaren geldt dit alleen voor de leidinggevende","Hij mag zonder legitimatie binnentreden als er spoed is en de omstandigheden dit vereisen","Hij hoeft alleen het wettelijke artikel te noemen waarop hij zijn binnentreden baseert"],ans:1,exp:"Art. 1 Awbi: de ambtenaar die een woning betreedt is altijd verplicht zich vooraf te legitimeren én het doel mee te delen — ook bij spoed en ook als de bewoner er niet om vraagt. Bij een team geldt dit voor de leidinggevende. Spoed ontslaat niet van de legitimatieplicht, tenzij dit onmogelijk is door de aard van de situatie."},
{cat:"Awbi",art:"Art. 2/3",lvl:"K",text:"Wie is bevoegd een machtiging tot binnentreden af te geven?",opts:["Elke opsporingsambtenaar kan zichzelf een schriftelijke machtiging geven als de OvJ niet bereikbaar is","Alleen de rechter-commissaris, omdat binnentreden een inbreuk op een grondrecht is","De advocaat-generaal bij het hof, de OvJ, de HOvJ, en (voor niet-opsporingstaken) de burgemeester","De minister van Justitie en Veiligheid als eindverantwoordelijke voor de politie"],ans:2,exp:"Art. 3 Awbi: de machtiging kan worden afgegeven door: advocaat-generaal bij het hof, OvJ, HOvJ, en voor niet-opsporingstaken door de burgemeester. Opsporingsambtenaren kunnen zichzelf geen machtiging afgeven. De RC geeft geen machtiging conform de Awbi — die bevoegdheid geldt voor de RC bij doorzoekingen ex WvSv."},
{cat:"Awbi",art:"Art. 2",lvl:"K",text:"Wanneer is een schriftelijke machtiging voor binnentreden niet vereist?",opts:["Nooit: een machtiging is altijd verplicht, ook bij acuut levensgevaar","Als de bewoner mondeling toestemming geeft — mondelinge toestemming vervangt de machtiging","Bij ernstig en onmiddellijk gevaar voor personen of goederen waarbij direct binnentreden noodzakelijk is","Als de OvJ telefonisch toestemming geeft en dit achteraf schriftelijk bevestigt"],ans:2,exp:"Art. 2 lid 3 Awbi: een machtiging is niet vereist bij ernstig en onmiddellijk gevaar voor personen of goederen waarbij onmiddellijk binnentreden noodzakelijk is. Mondelinge toestemming van de bewoner (niet: de OvJ) maakt ook een machtiging overbodig, want dan is er überhaupt geen 'zonder toestemming'."},
{cat:"Awbi",art:"Art. 7",lvl:"K",text:"Onder welke voorwaarden mag een woning tussen middernacht en 06:00 worden betreden zonder toestemming van de bewoner?",opts:["Altijd bij verdenking van een art. 67-feit, mits de agent zich legitimeert","Na mondelinge toestemming van de OvJ via de meldkamer","Alleen bij dringende noodzakelijkheid én de machtiging moet dit uitdrukkelijk vermelden","Na schriftelijke toestemming van de rechter-commissaris, ook als dat een paar uur duurt"],ans:2,exp:"Art. 7 Awbi: nachtelijk binnentreden (tussen middernacht en 06:00) vereist (1) dringende noodzakelijkheid én (2) de machtiging moet uitdrukkelijk vermelden dat nachtelijk binnentreden is toegestaan. Mondelinge OvJ-toestemming volstaat niet; het moet in de machtiging staan."},
{cat:"Awbi",art:"Art. 9",lvl:"T",text:"Een opsporingsambtenaar is rechtmatig een woning binnengetreden maar de bewoner blokkeert de toegang tot de slaapkamer. Wat mag de agent doen?",opts:["Niets: hij mag geen kracht gebruiken want hij is al binnen — verdere dwang vereist een nieuwe machtiging","Hij mag de bewoner overtuigen maar niet dwingen; bij weigering moet hij de RC raadplegen","Hij mag zich de toegang of doorgang verschaffen voor zover dit redelijkerwijs nodig is voor het doel (art. 9 Awbi), en kan de sterke arm inroepen","Hij mag alleen de hulp van collega's inroepen maar geen fysieke kracht gebruiken"],ans:2,exp:"Art. 9 Awbi: de bevoegde ambtenaar mag zich de toegang of doorgang in de woning verschaffen voor zover dit redelijkerwijs nodig is voor het doel van het binnentreden. Hij kan daarvoor de hulp van de sterke arm (fysiek geweld/hulp van collega's) inroepen. Eén machtiging dekt ook dit."}
];

// ---- Shuffle ----
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// ---- State ----
// deck: array of {qIdx, optOrder, streak}
// streak = how many consecutive correct answers for this card in current session
// answers: {deckPos: {displayedOpt, wasCorrect}} - only last answer per position
let deck=[], answers={}, reviewed=false, filterCat='Alles', randomMode=true;
let cur=0;

const cats=[...new Set(Q.map(q=>q.cat))];

function buildDeck(){
  const base=filterCat==='Alles'?Q.map((_,i)=>i):Q.map((_,i)=>i).filter(i=>Q[i].cat===filterCat);
  const cards=base.map(qIdx=>({qIdx, optOrder:Q[qIdx].opts.map((_,i)=>i), streak:0}));
  if(randomMode){
    const shuffled=shuffle(cards);
    return shuffled.map(c=>({...c, optOrder:shuffle(c.optOrder)}));
  }
  return cards;
}

function initSession(){
  deck=buildDeck();
  answers={};
  reviewed=false;
  cur=0;
}

initSession();

// Spaced repetition: after answering, if wrong -> queue the card 2 more times (needs 2 correct in a row)
// We expand the deck dynamically
function expandDeck(pos){
  const item=deck[pos];
  // Insert 2 copies after a gap (within next 3-6 cards or at end if near end)
  const insertAt1=Math.min(pos+3, deck.length);
  const insertAt2=Math.min(pos+6, deck.length+1);
  const clone1={qIdx:item.qIdx, optOrder:shuffle(Q[item.qIdx].opts.map((_,i)=>i)), streak:0, retryOf:pos};
  const clone2={qIdx:item.qIdx, optOrder:shuffle(Q[item.qIdx].opts.map((_,i)=>i)), streak:0, retryOf:pos};
  deck.splice(insertAt1, 0, clone1);
  deck.splice(insertAt2+1, 0, clone2);
}

function totalAnswered(){return Object.keys(answers).length;}
function totalCards(){return deck.length;}
function countCorrect(){
  return Object.values(answers).filter(a=>a.wasCorrect).length;
}
// Original questions answered correctly (not retries)
function origCorrect(){
  const orig=deck.map((d,i)=>({d,i})).filter(({d})=>!d.retryOf);
  return orig.filter(({i})=>answers[i]&&answers[i].wasCorrect).length;
}
function origTotal(){return deck.filter(d=>!d.retryOf).length;}

function isDone(){
  // All original cards answered correctly at least once AND no pending retries ahead of cur
  const pending=deck.slice(cur+1).some((d,i)=>!answers[cur+1+i]);
  const curAnswered=answers[cur]!==undefined;
  return curAnswered && !pending && cur===deck.length-1;
}

  if(reviewed){renderResults(m);return;}
  const total=deck.length;

  const item=deck[cur];
  const q=Q[item.qIdx];
  const ans=answers[cur];
  const done=ans!==undefined;
  const givenDisplay=done?ans.displayedOpt:undefined;
  const givenOrig=done?item.optOrder[givenDisplay]:undefined;
  const isRetry=!!item.retryOf;

  m.innerHTML=`
<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${prog.toFixed(1)}%"></div></div>
<div class="stats">
