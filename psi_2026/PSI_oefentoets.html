<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f3;color:#1a1a18;padding:1rem}

.header{margin-bottom:1.5rem}

.q-nav{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:1.25rem}

.q-nav-btn.current{background:#378ADD;border-color:#378ADD;color:#fff}
.q-nav-btn.c-right{background:#c0dd97;border-color:#639922;color:#27500a}
.q-nav-btn.c-wrong{background:#f7c1c1;border-color:#a32d2d;color:#791f1f}
.question-card{background:#fff;border:0.5px solid #d3d1c7;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.q-meta{font-size:11px;color:#5f5e5a;margin-bottom:8px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}

.q-level.B{background:#faeeda;color:#633806}
.q-level.T{background:#fbeaf0;color:#4b1528}

.feedback.correct{background:#eaf3de;color:#27500a;border:0.5px solid #639922}

.result-pass.pass{color:#27500a}
.result-pass.fail{color:#791f1f}
.cat-results{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:1rem 0;text-align:left}
.cat-result{background:#f1efe8;border-radius:8px;padding:10px 12px;font-size:13px}
.cat-result-name{color:#5f5e5a;margin-bottom:2px;font-size:12px}
.cat-result-score{font-weight:500;font-size:15px}
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.filter-btn{cursor:pointer;background:transparent;border:0.5px solid #b4b2a9;border-radius:6px;padding:5px 10px;font-size:12px;color:#5f5e5a;font-family:inherit}

<body>
<div id="app">
<div class="header">
<h1>PSI Theorietoets — Uitgebreide Oefenvragen</h1>
<p id="subtitle">Alle artikelen uit de toetsmatrijs · Cesuur ≈ 55%</p>

<div id="main"></div>
</div>
<script>
const Q=[
// ========== GRONDWET ==========
{cat:"Grondwet",art:"Art. 1",lvl:"T",text:"Een werkgever weigert een sollicitant aan te nemen omdat hij een hoofddoek draagt vanwege zijn geloof. Is dit toegestaan?",opts:["Ja, een werkgever mag zelf bepalen wie hij aanneemt","Nee, dit is discriminatie op grond van godsdienst en verboden","Ja, mits de werkgever dit schriftelijk motiveert","Nee, maar alleen bij overheidsfuncties"],ans:1,exp:"Art. 1 GW: discriminatie op grond van godsdienst is verboden. Een sollicitant met een beter cv mag je wél aannemen (geen willekeur), maar weigeren op basis van geloof niet."},
{cat:"Grondwet",art:"Art. 1",lvl:"T",text:"Een agent controleert systematisch alleen personen met een donkere huidskleur bij een verkeerscontrole. Wat is hiervan het rechtsgevolg?",opts:["Dit is toegestaan als de agent dit efficiënter vindt","Dit is verboden etnisch profileren op grond van art. 1 GW","Dit mag alleen als de teamleider toestemming geeft","Dit is toegestaan zolang het geen strafbaar feit betreft"],ans:1,exp:"Art. 1 GW verbiedt discriminatie op grond van ras. Systematisch controleren op basis van etniciteit is verboden etnisch profileren, ook voor de politie."},
{cat:"Grondwet",art:"Art. 10/11",lvl:"T",text:"Op welk grondwetsartikel maakt een agent inbreuk bij het fouilleren (onderzoek aan de kleding) van een verdachte?",opts:["Art. 1 GW – gelijkheidsbeginsel","Art. 10 GW – persoonlijke levenssfeer","Art. 11 GW – onaantastbaarheid van het lichaam","Art. 15 GW – recht op vrijheid"],ans:2,exp:"Fouilleren maakt inbreuk op art. 11 GW (onaantastbaarheid van het lichaam). Art. 56 WvSv biedt hiervoor een wettelijke grondslag."},
{cat:"Grondwet",art:"Art. 10/11",lvl:"T",text:"De politie wil camerabeelden van een verdachte opvragen bij een supermarkt. Op welk grondwetsrecht maakt dit een inbreuk?",opts:["Art. 11 GW – onaantastbaarheid van het lichaam","Art. 10 GW – persoonlijke levenssfeer (recht op privacy)","Art. 15 GW – recht op vrijheid","Art. 1 GW – gelijkheidsbeginsel"],ans:1,exp:"Art. 10 GW beschermt de persoonlijke levenssfeer (privacy). Camerabeelden raken aan de privacy van de betrokkene; voor verwerking is een wettelijke grondslag nodig."},
{cat:"Grondwet",art:"Art. 12",lvl:"B",text:"Onder welke voorwaarden mag een opsporingsambtenaar een woning binnengaan zonder toestemming van de bewoner?",opts:["Als hij het noodzakelijk acht voor de openbare orde","Altijd, mits hij zich legitimeert","Alleen op basis van een wettelijke bevoegdheid en doorgaans met schriftelijke machtiging (Awbi)","Nooit, de woning is altijd onschendbaar"],ans:2,exp:"Art. 12 GW beschermt het huisrecht. Binnentreden zonder toestemming vereist een wettelijke bevoegdheid en doorgaans een schriftelijke machtiging conform de Awbi."},
{cat:"Grondwet",art:"Art. 15",lvl:"B",text:"Wat houdt het recht op vrijheid (art. 15 GW) in?",opts:["Niemand mag van zijn vrijheid worden beroofd tenzij op basis van een wettelijke grondslag","Iedereen mag overal vrij heen in Nederland","De politie mag iemand maximaal 24 uur vasthouden zonder rechterlijke toets","Burgers mogen nooit worden aangehouden door de staat"],ans:0,exp:"Art. 15 GW: niemand mag zomaar van zijn vrijheid worden beroofd. Vrijheidsberoving is alleen toegestaan op grond van een wettelijke bevoegdheid."},
// ========== POLITIEWET 2012 ==========
{cat:"Politiewet 2012",art:"Art. 2/3",lvl:"K",text:"Wie worden als 'ambtenaren van politie' beschouwd onder de Politiewet 2012?",opts:["Alle medewerkers van de politieorganisatie, inclusief administratief personeel","Alleen rangen vanaf inspecteur en hoger","Uitsluitend (vrijwillige) ambtenaren aangesteld voor de uitvoering van de politietaak","Alle medewerkers inclusief kantinepersoneel"],ans:2,exp:"Art. 2 Politiewet: alleen (vrijwillige) ambtenaren aangesteld voor de uitvoering van de politietaak zijn ambtenaren van politie. Kantinepersoneel en administratief personeel vallen hier niet onder."},
{cat:"Politiewet 2012",art:"Art. 2/3",lvl:"K",text:"Wat is de wettelijke taak van de politie volgens art. 3 Politiewet 2012?",opts:["Zelfstandig handhaven van de rechtsorde naar eigen inzicht","In ondergeschiktheid aan het bevoegd gezag en conform de geldende rechtsregels zorgen voor handhaving van de rechtsorde en het verlenen van hulp","Uitsluitend het opsporen van strafbare feiten","Enkel de openbare orde handhaven in opdracht van de burgemeester"],ans:1,exp:"Art. 3 Politiewet: de politie werkt in ondergeschiktheid aan het bevoegd gezag (burgemeester of OvJ) en conform de rechtsregels. Zij handhaaft de rechtsorde en verleent hulp."},
{cat:"Politiewet 2012",art:"Art. 6",lvl:"K",text:"Een agent uit Rotterdam ziet in Utrecht hoe iemand een kind mishandelt. Mag hij ingrijpen?",opts:["Nee, hij is buiten zijn werkgebied","Ja, mits zijn optreden redelijkerwijs noodzakelijk is","Ja, maar alleen na toestemming van zijn leidinggevende","Nee, tenzij hij een schriftelijke machtiging heeft"],ans:1,exp:"Art. 6 Politiewet: een politiefunctionaris heeft landelijke bevoegdheid en mag buiten zijn werkgebied optreden als dit redelijkerwijs noodzakelijk is. Bij een noodsituatie is dit zeker het geval."},
{cat:"Politiewet 2012",art:"Art. 7 lid 1",lvl:"T",text:"Agent Bakker gebruikt zijn wapenstok om een agressieve arrestant te overmeesteren. Wanneer is dit rechtmatig?",opts:["Altijd, als de agent in uniform is","Alleen als de officier van justitie dit vooraf goedkeurt","Als het geweld proportioneel en subsidiair is en de agent in rechtmatige uitoefening van zijn bediening is","Nooit, politiegeweld is altijd een strafbaar feit"],ans:2,exp:"Art. 7 lid 1 Politiewet: een politiefunctionaris mag geweld gebruiken als hij in de rechtmatige uitoefening van zijn bediening is én het geweld proportioneel en subsidiair is."},
{cat:"Politiewet 2012",art:"Art. 7 lid 2",lvl:"T",text:"Een agent hoort luide schreeuwgeluiden achter een dichte voordeur. Mag hij de woning betreden?",opts:["Nee, betreden van een woning mag nooit zonder machtiging","Ja, op basis van art. 7 lid 2 Politiewet ter hulpverlening, rekening houdend met de Awbi","Ja, maar alleen als hij eerst aanbelt","Alleen als de bewoner de deur opendoet"],ans:1,exp:"Art. 7 lid 2 Politiewet: iedere executieve politiefunctionaris heeft toegang tot elke plaats voor zover nodig voor hulpverlening. De Awbi stelt aanvullende eisen (legitimatie, machtiging)."},
{cat:"Politiewet 2012",art:"Art. 7 lid 3",lvl:"K",text:"Wat is een veiligheidsfouillering en hoe wordt deze uitgevoerd?",opts:["Een grondig onderzoek in zakken en tassen op bevel van de OvJ","Oppervlakkig aftasten van de kleding gericht op gevaarlijke voorwerpen, zo mogelijk door iemand van hetzelfde geslacht","Een volledig onderzoek aan het lichaam door een arts","Doorzoeken van bagage en voertuig"],ans:1,exp:"Art. 7 lid 3 Politiewet / art. 20 Ambtsinstructie: veiligheidsfouillering = oppervlakkig aftasten van de kleding, gericht op voorwerpen waarmee iemand zichzelf of anderen schade kan toebrengen, zo mogelijk door iemand van hetzelfde geslacht."},
{cat:"Politiewet 2012",art:"Art. 7 lid 4",lvl:"T",text:"Bij welke gelegenheid mag een vervoersfouillering worden uitgevoerd?",opts:["Bij elke verdachte persoon op straat","Bij personen die worden vervoerd in een politievoertuig of cel, ter beveiliging van het transport","Alleen bij aangehouden verdachten van ernstige misdrijven","Altijd voorafgaand aan een verhoor"],ans:1,exp:"Art. 7 lid 4 Politiewet: een vervoersfouillering mag worden uitgevoerd bij personen die worden vervoerd (bijv. in een politievoertuig) ter beveiliging van het transport."},
{cat:"Politiewet 2012",art:"Art. 7 lid 7",lvl:"K",text:"Wat schrijft art. 7 lid 7 Politiewet voor over de uitoefening van bevoegdheden zoals geweld en fouilleren?",opts:["Deze bevoegdheden mogen altijd worden ingezet als de agent dat nodig acht","De uitoefening moet redelijk en gematigd zijn in verhouding tot het beoogde doel","Deze bevoegdheden vereisen altijd toestemming van de OvJ","De bevoegdheden gelden alleen in aanwijsbare noodsituaties"],ans:1,exp:"Art. 7 lid 7 Politiewet: het proportionaliteitsbeginsel — de uitoefening van bevoegdheden (geweld, fouilleren, vrijheidsbeperkende middelen) moet redelijk en gematigd zijn in verhouding tot het doel."},
{cat:"Politiewet 2012",art:"Art. 8",lvl:"T",text:"Mag een agent op straat van willekeurige voetgangers inzage van hun identiteitsbewijs vorderen?",opts:["Nee, dit mag alleen bij verdachten van een strafbaar feit","Ja, voor de uitvoering van de politietaak, ook zonder verdenking van een strafbaar feit","Ja, maar alleen als ze ouder zijn dan 18 jaar","Nee, dit recht heeft uitsluitend de hulpofficier van justitie"],ans:1,exp:"Art. 8 Politiewet: voor de uitvoering van de politietaak kan iedereen worden gevorderd inzage te geven in een identiteitsbewijs; een strafbaar feit hoeft (nog) niet aanwezig te zijn."},
// ========== AMBTSINSTRUCTIE ==========
{cat:"Ambtsinstructie",art:"Art. 2",lvl:"K",text:"Wanneer is een politieambtenaar verplicht zich te legitimeren met zijn legitimatiebewijs?",opts:["Alleen bij een aanhouding","Bij elke ambtshandeling waarbij dit redelijkerwijs mogelijk is","Alleen op uitdrukkelijk verzoek van de burger","Alleen als hij buiten zijn werkgebied optreedt"],ans:1,exp:"Art. 2 Ambtsinstructie: de politieambtenaar is verplicht zich te legitimeren bij elke ambtshandeling waarbij dit redelijkerwijs mogelijk is."},
{cat:"Ambtsinstructie",art:"Art. 20/21",lvl:"K",text:"Aan wie moet elke veiligheidsfouillering onverwijld schriftelijk worden gemeld?",opts:["De korpschef","De officier van justitie","De hulpofficier van justitie","De burgemeester"],ans:2,exp:"Art. 21 Ambtsinstructie: elke veiligheidsfouillering moet onverwijld (zonder uitstel) schriftelijk worden gemeld aan de hulpofficier van justitie."},
{cat:"Ambtsinstructie",art:"Art. 28/29/30",lvl:"K",text:"Wat houdt een insluitingsfouillering in en wanneer is deze verplicht?",opts:["Een oppervlakkige controle bij het binnentreden van een cel, op verzoek van de bewaker","Een verplicht onderzoek door aftasten én doorzoeken van kleding direct voorafgaand aan insluiting, opgelegd door art. 28 Ambtsinstructie","Een volledig lichamelijk onderzoek door een arts bij elke aanhouding","Een fouillering die alleen plaatsvindt bij verdachten van geweldsdelicten"],ans:1,exp:"Art. 28 Ambtsinstructie: de insluitingsfouillering is verplicht direct voorafgaand aan de insluiting en omvat aftasten én doorzoeken van kleding en meegebrachte voorwerpen."},
// ========== GEMEENTEWET ==========
{cat:"Gemeentewet",art:"Art. 172",lvl:"K",text:"Wie is het bevoegde gezag bij de handhaving van de openbare orde in een gemeente?",opts:["De officier van justitie","De politiechef","De burgemeester","De minister van Justitie en Veiligheid"],ans:2,exp:"Art. 172 Gemeentewet: de burgemeester is het bevoegde gezag voor de handhaving van de openbare orde en kan daarvoor de politie inschakelen. Bij ernstige verstoringen kan hij een noodbevel (art. 175) of noodverordening (art. 176) uitvaardigen."},
// ========== WET POLITIEGEGEVENS ==========
{cat:"Wet Politiegegevens",art:"Art. 1",lvl:"K",text:"Wat worden verstaan onder 'politiegegevens' in de Wet Politiegegevens?",opts:["Alleen persoonsgegevens die zijn vastgelegd in een strafdossier","Elk gegeven betreffende een geïdentificeerde of identificeerbare persoon dat wordt verwerkt in het kader van de politietaak","Uitsluitend gegevens van verdachten van misdrijven","Alleen digitale gegevens opgeslagen in politiedatabases"],ans:1,exp:"Art. 1 Wet Politiegegevens: politiegegevens zijn alle gegevens over een geïdentificeerde of identificeerbare persoon die worden verwerkt in het kader van de uitvoering van de politietaak."},
{cat:"Wet Politiegegevens",art:"Art. 8",lvl:"K",text:"Welke situaties vallen onder de verwerking van politiegegevens voor de 'dagelijkse politietaak' (art. 8 Wpg)?",opts:["Zware georganiseerde criminaliteit met meer dan 10 verdachten","Eenvoudige opsporingsonderzoeken, verkeerscontroles en hulpverlening","Terrorismebestrijding en inlichtingenverzameling","Internationale rechtshulpverzoeken"],ans:1,exp:"Art. 8 Wpg regelt de verwerking voor de dagelijkse politietaak: eenvoudige opsporingsonderzoeken, handhaving openbare orde en hulpverlening waarbij geen intensief onderzoek nodig is."},
// ========== WETBOEK VAN STRAFRECHT ==========
{cat:"WvSr",art:"Art. 1",lvl:"K",text:"Wat houdt het legaliteitsbeginsel (art. 1 Sr) in?",opts:["De politie heeft altijd een wettelijke basis nodig voor haar optreden","Niemand kan worden gestraft voor een daad die niet bij wet strafbaar was gesteld vóór het plegen ervan","Alleen de rechter mag straffen opleggen","Strafrecht heeft altijd terugwerkende kracht"],ans:1,exp:"Art. 1 Sr: geen straf zonder wet (nullum crimen, nulla poena). De wet moet vóór het plegen bestaan hebben. Terugwerkende kracht is verboden, behalve als dit in het voordeel van de verdachte uitpakt."},
{cat:"WvSr",art:"Art. 39",lvl:"T",text:"Een verdachte heeft een ernstige psychische stoornis en kon zijn wil niet bepalen tijdens het plegen van het feit. Wat is het rechtsgevolg?",opts:["Vrijspraak: er is geen bewijs van het strafbare feit","Veroordeling met een lagere straf","Ontslag van alle rechtsvervolging (OVAR); de verdachte wordt niet gestraft","De verdachte wordt verplicht opgenomen én gestraft"],ans:2,exp:"Art. 39 Sr: bij volledige ontoerekeningsvatbaarheid wegens een psychische stoornis volgt OVAR. De verdachte heeft het feit wél gepleegd maar is niet strafbaar."},
{cat:"WvSr",art:"Art. 40",lvl:"T",text:"Een vader rijdt door rood om zijn ernstig gewonde kind naar het ziekenhuis te brengen. Op welke strafuitsluitingsgrond kan hij een beroep doen?",opts:["Noodweer (art. 41 Sr)","Wettelijk voorschrift (art. 42 Sr)","Overmacht / noodtoestand (art. 40 Sr)","Ambtelijk bevel (art. 43 Sr)"],ans:2,exp:"Art. 40 Sr: overmacht/noodtoestand = botsende plichten waarbij de verdachte de hogere plicht (leven kind) laat prevaleren boven de lagere (verkeersregel). Dit is een rechtvaardigingsgrond."},
{cat:"WvSr",art:"Art. 41",lvl:"T",text:"Iemand slaat een aanvaller éénmaal weg. Dit was voldoende, maar uit paniek geeft hij nog drie extra slagen. Welke strafuitsluitingsgrond is van toepassing?",opts:["Noodweer: alle slagen waren gerechtvaardigd","Noodweerexces: door de paniek koos hij een te zwaar middel, maar hij is niet strafbaar","Overmacht: hij had geen keuze","Hij is volledig strafbaar want de extra slagen waren niet nodig"],ans:1,exp:"Art. 41 lid 2 Sr: noodweerexces. Er was een noodweersituatie maar door emotie (paniek/schrik/woede) koos hij een te zwaar middel. Geen straf vanwege de hevige gemoedsbeweging die de aanval opriep."},
{cat:"WvSr",art:"Art. 41",lvl:"T",text:"Iemand slaat terug nadat een aanval al volledig is gestopt en de aanvaller is gevlucht. Kan hij zich op noodweer beroepen?",opts:["Ja, de aanvaller begon dus de verdediger had het recht te slaan","Nee, noodweer vereist een ogenblikkelijke wederrechtelijke aanval; die was niet meer aanwezig","Ja, mits hij één keer slaat","Nee, maar hij kan zich beroepen op noodweerexces"],ans:1,exp:"Art. 41 lid 1 Sr: noodweer vereist een ogenblikkelijke (actuele) wederrechtelijke aanval. Is de aanval gestopt en de aanvaller gevlucht, dan is er geen noodweersituatie meer."},
{cat:"WvSr",art:"Art. 42",lvl:"T",text:"Een agent gebruikt pepperspray conform de geweldsinstructie bij een rechtmatige aanhouding. Is hij strafbaar?",opts:["Ja, het gebruik van pepperspray is altijd een strafbaar feit","Nee: art. 42 lid 2 Sr bepaalt dat een ambtenaar die geweld gebruikt in rechtmatige uitoefening van zijn taak conform de geweldsinstructie niet strafbaar is","Nee, maar alleen als de OvJ achteraf toestemming geeft","Ja, tenzij hij noodweer kan aantonen"],ans:1,exp:"Art. 42 lid 2 Sr: een ambtenaar die geweld gebruikt in de rechtmatige uitoefening van zijn taak en conform de geweldsinstructie handelt, is niet strafbaar."},
{cat:"WvSr",art:"Art. 43",lvl:"T",text:"Een agent beveelt een bestuurder door rood te rijden bij een ernstig verkeersongeval. De bestuurder gehoorzaamt. Is hij strafbaar?",opts:["Ja, hij is zelf verantwoordelijk voor zijn rijgedrag","Nee, een bevoegd gegeven ambtelijk bevel sluit strafbaarheid uit (art. 43 Sr)","Nee, maar alleen als het bevel schriftelijk is vastgelegd","Ja, want agenten mogen geen rijinstructies geven"],ans:1,exp:"Art. 43 lid 1 Sr: handelen op basis van een bevoegd gegeven ambtelijk bevel sluit strafbaarheid uit. Een agent heeft de bevoegdheid verkeersinstructies te geven."},
{cat:"WvSr",art:"Art. 43",lvl:"T",text:"Iemand zonder enige bevoegdheid (een 'gewone burger') beveelt anderen door rood te rijden. Kunnen zij zich beroepen op art. 43 Sr?",opts:["Ja, een bevel is een bevel ongeacht wie het geeft","Nee, art. 43 lid 2 Sr geldt alleen bij een bevoegd gegeven ambtelijk bevel; bij een onbevoegd bevel geen strafuitsluiting","Ja, als zij te goeder trouw handelden","Nee, maar zij kunnen zich beroepen op overmacht"],ans:1,exp:"Art. 43 lid 2 Sr: een onbevoegd gegeven bevel biedt geen strafuitsluiting, tenzij de uitvoerder te goeder trouw was en redelijkerwijs mocht aannemen dat het bevel bevoegd was gegeven."},
{cat:"WvSr",art:"Art. 45/46",lvl:"T",text:"Iemand koopt een bivakmuts en kabelbinders 'voor een kidnapping'. Er is nog geen begin van uitvoering. Wat geldt?",opts:["Strafbare poging (art. 45 Sr)","Strafbare voorbereiding (art. 46 Sr) als het misdrijf ≥8 jaar strafmaximum heeft én er opzet is","Geen strafbaar feit: hij heeft nog niets gedaan","Medeplichtigheid (art. 48 Sr)"],ans:1,exp:"Art. 46 Sr: voorbereidingshandelingen (verwerven van middelen bestemd voor het misdrijf) zijn strafbaar bij misdrijven met een maximum van 8 jaar of meer, mits er opzet is. Kidnapping valt hieronder."},
{cat:"WvSr",art:"Art. 45/46",lvl:"T",text:"Iemand trekt een pistool en richt het op een slachtoffer, maar het pistool werkt niet. Is dit een strafbare poging tot doodslag?",opts:["Nee, het pistool werkte niet dus er is geen gevaar geweest","Ja, dit is een relatief ondeugdelijk middel: strafbare poging","Nee, dit is een absoluut ondeugdelijk middel: geen strafbare poging","Ja, maar alleen als het slachtoffer bang was"],ans:1,exp:"Art. 45 Sr: een haperende pistool is een relatief ondeugdelijk middel (normaal gesproken werkt het). Relatief ondeugdelijke pogingen zijn strafbaar. Absoluut ondeugdelijk (bijv. water als gif) is niet strafbaar."},
{cat:"WvSr",art:"Art. 47/48",lvl:"T",text:"Ali overtuigt Bas met valse beloften om een inbraak te plegen. Ali blijft thuis. Wat is Ali's juridische rol?",opts:["Medepleger","Uitlokker","Doen-pleger","Medeplichtige"],ans:1,exp:"Art. 47 Sr: uitlokken = een ander via een van de 9 wettelijke uitlokkingsmiddelen (hier: valse beloften) op het idee brengen een misdrijf te plegen. Zowel de uitlokker als de feitelijke dader zijn strafbaar."},
{cat:"WvSr",art:"Art. 47/48",lvl:"T",text:"Twee vrienden plannen samen een overval, regelen het vervoer samen en voeren de overval samen uit. Wat is hun juridische rol?",opts:["Uitlokker en uitgelokte","Doen-pleger en materiële dader","Medeplegers: beiden zijn volledig dader","Één is dader, de ander medeplichtige"],ans:2,exp:"Art. 47 Sr: medeplegen = twee of meer personen die bewust, volledig en nauw samenwerken en het feit samen uitvoeren. Beiden zijn volledig dader."},
{cat:"WvSr",art:"Art. 47/48",lvl:"T",text:"Iemand staat op de uitkijk terwijl zijn vriend een winkel overvalt. Wat is zijn juridische positie?",opts:["Medepleger","Uitlokker","Medeplichtige (art. 48 Sr): ondersteunende rol tijdens het misdrijf","Doen-pleger"],ans:2,exp:"Art. 48 Sr: medeplichtigheid = een ondersteunende rol zonder zelf het feit uit te voeren (hier: op de uitkijk staan). De straf is maximaal een derde minder dan voor het hoofdmisdrijf."},
{cat:"WvSr",art:"Art. 138",lvl:"T",text:"Iemand loopt via een openstaande voordeur een woning binnen terwijl de bewoner duidelijk niet aanwezig is en geen toestemming heeft gegeven. Is dit huisvredebreuk?",opts:["Nee, de deur stond open dus er is geen binnendringen","Ja, ook via een open deur kan huisvredebreuk worden gepleegd als er geen toestemming is","Nee, huisvredebreuk vereist altijd braak of geweld","Ja, maar alleen als de bewoner het meldt"],ans:1,exp:"Art. 138 Sr: het maakt niet uit of de deur op slot was. Binnengaan via een openstaande deur is ook huisvredebreuk als duidelijk is dat de bewoner geen toestemming heeft gegeven."},
{cat:"WvSr",art:"Art. 139",lvl:"T",text:"Na sluitingstijd weigert een bezoeker een gemeentekantoor te verlaten. Welk artikel is van toepassing?",opts:["Art. 138 Sr – huisvredebreuk","Art. 139 Sr – lokaalvredebreuk","Art. 180 Sr – wederspannigheid","Art. 184 Sr – niet voldoen aan ambtelijk bevel"],ans:1,exp:"Art. 139 Sr: lokaalvredebreuk ziet op wederrechtelijk verblijven in voor de openbare dienst bestemde lokalen (zoals een gemeentekantoor) buiten openingstijden of in niet-publieke delen."},
{cat:"WvSr",art:"Art. 141",lvl:"T",text:"Drie personen slaan samen openlijk een persoon op straat. Welk artikel is naast mishandeling het meest van toepassing?",opts:["Art. 350 Sr – vernieling","Art. 141 Sr – openlijke geweldpleging","Art. 317 Sr – afpersing","Art. 300 Sr – eenvoudige mishandeling"],ans:1,exp:"Art. 141 Sr: openlijke geweldpleging = openlijk (zichtbaar/hoorbaar voor publiek) geweld in vereniging (≥2 personen) tegen personen of goederen. Dit is een speciale, zwaardere variant dan art. 300."},
{cat:"WvSr",art:"Art. 177",lvl:"T",text:"Iemand geeft een ambtenaar €1.000 zodat hij een vergunning goedkeurt die normaal gesproken geweigerd zou worden. Welk artikel overtreedt de gever?",opts:["Art. 363 Sr – passieve omkoping","Art. 177 Sr – actieve omkoping","Art. 326 Sr – oplichting","Art. 225 Sr – valsheid in geschrifte"],ans:1,exp:"Art. 177 Sr: actieve omkoping = het omkopen van een ambtenaar zodat hij iets doet of nalaat. De gever valt onder art. 177; de omgekochte ambtenaar onder art. 363 (passieve omkoping)."},
{cat:"WvSr",art:"Art. 180",lvl:"T",text:"Een verdachte verzet zich fysiek tegen twee agenten die hem rechtmatig aanhouden. Welk artikel is van toepassing?",opts:["Art. 179 Sr – ambtsdwang","Art. 180 Sr – wederspannigheid","Art. 184 Sr – niet voldoen aan bevel","Art. 141 Sr – openlijke geweldpleging"],ans:1,exp:"Art. 180 Sr: wederspannigheid = met geweld of bedreiging met geweld verzetten tegen een ambtenaar die een rechtmatige taak uitvoert. Het optreden van de agent moet rechtmatig zijn."},
{cat:"WvSr",art:"Art. 180",lvl:"T",text:"Wat is het verschil tussen ambtsdwang (art. 179 Sr) en wederspannigheid (art. 180 Sr)?",opts:["Er is geen verschil, beide artikelen beschermen ambtenaren","Bij ambtsdwang dreigt de dader met geweld vóórdat de ambtenaar begint; bij wederspannigheid verzet de dader zich nadat de ambtenaar al is begonnen","Bij wederspannigheid gaat het om verbale bedreigingen, bij ambtsdwang om fysiek geweld","Art. 179 geldt alleen voor politieagenten, art. 180 voor alle ambtenaren"],ans:1,exp:"Art. 179 vs. 180 Sr: ambtsdwang = dader gebruikt geweld of dreigt daarmee om de ambtenaar te dwingen iets (niet) te doen vóórdat hij begint. Wederspannigheid = verzet nadat de ambtenaar al met zijn taak is begonnen."},
{cat:"WvSr",art:"Art. 184",lvl:"T",text:"Een agent geeft opdracht door te lopen bij een menigte. Iemand weigert dit zonder geweld te gebruiken. Welk artikel overtreedt hij?",opts:["Art. 180 Sr – wederspannigheid","Art. 184 Sr – niet voldoen aan een bevoegd gegeven ambtelijk bevel","Art. 266 Sr – eenvoudige belediging","Art. 285 Sr – bedreiging"],ans:1,exp:"Art. 184 Sr: opzettelijk niet voldoen aan een bevoegd gegeven bevel of vordering van een ambtenaar. Geen geweld nodig; passief weigeren volstaat."},
{cat:"WvSr",art:"Art. 207",lvl:"T",text:"Een getuige legt voor de rechter opzettelijk een valse verklaring af, terwijl hij onder ede staat. Wat is het maximale strafmaximum?",opts:["2 jaar gevangenisstraf","4 jaar gevangenisstraf","6 jaar, oplopend tot 9 jaar bij nadeel voor een verdachte in strafzaak","Levenslang"],ans:2,exp:"Art. 207 Sr: meineed = opzettelijk valse verklaring onder ede. Maximaal 6 jaar gevangenisstraf, oplopend tot 9 jaar als de valse verklaring ten nadele was van een verdachte in een strafzaak."},
{cat:"WvSr",art:"Art. 225",lvl:"T",text:"Iemand maakt een nep-arbeidscontract om een uitkering te frauderen. Welk strafbaar feit pleegt hij?",opts:["Art. 188 Sr – valse aangifte","Art. 225 Sr – valsheid in geschrifte","Art. 321 Sr – verduistering","Art. 326 Sr – oplichting"],ans:1,exp:"Art. 225 Sr: valsheid in geschrifte = het valselijk opmaken van een geschrift met het oogmerk dit te gebruiken alsof het echt is (hier: nep-arbeidscontract). Combinatie met oplichting is mogelijk."},
{cat:"WvSr",art:"Art. 251",lvl:"T",text:"Een volwassene stuurt via Instagram seksueel getinte berichten aan een 14-jarig kind en stelt een ontmoeting voor. Welk strafbaar feit is dit?",opts:["Art. 285b Sr – belaging","Art. 251 lid 1 onder c Sr – grooming","Art. 285d Sr – doxing","Art. 261 Sr – smaad"],ans:1,exp:"Art. 251 lid 1 onder c Sr: grooming = een kind onder 16 jaar een ontmoeting voor seksuele doeleinden voorstellen, gecombineerd met een concrete handeling om die ontmoeting te verwezenlijken."},
{cat:"WvSr",art:"Art. 261",lvl:"T",text:"Iemand beschuldigt zijn buurman openlijk op sociale media ervan dat hij geld steelt van de buurtvereniging, met de bedoeling dit ruim te verspreiden. Wat is dit?",opts:["Eenvoudige belediging (art. 266 Sr)","Smaadschrift (art. 261 lid 2 Sr): openbare beschuldiging van een bepaald feit via geschrift","Bedreiging (art. 285 Sr)","Laster, want de beschuldiging is onwaar"],ans:1,exp:"Art. 261 Sr: smaad = openbare beschuldiging van een bepaald feit met het doel ruchtbaarheid te geven. Via sociale media (geschrift) is het smaadschrift (lid 2). Als de beschuldiging onwaar is, wordt het laster."},
{cat:"WvSr",art:"Art. 285",lvl:"T",text:"Iemand stuurt zijn ex-partner via WhatsApp het bericht: 'Ik maak je af als je niet terugkomt.' Welk strafbaar feit is dit?",opts:["Art. 285b Sr – belaging","Art. 285 Sr – bedreiging met een misdrijf tegen het leven","Art. 266 Sr – eenvoudige belediging","Art. 285d Sr – doxing"],ans:1,exp:"Art. 285 Sr: bedreiging = bedreigen met een ernstig misdrijf (hier: misdrijf tegen het leven) op een wijze dat redelijkerwijs vrees kan ontstaan dat de dreiging wordt uitgevoerd. Digitale berichten vallen er ook onder."},
{cat:"WvSr",art:"Art. 285b",lvl:"T",text:"Iemand stuurt zijn ex-partner dagelijks berichten, wacht elke dag op voor zijn woning en volgt hem overal. Wat is het strafbare feit?",opts:["Art. 285 Sr – bedreiging","Art. 285b Sr – belaging (stalking)","Art. 285d Sr – doxing","Art. 266 Sr – belediging"],ans:1,exp:"Art. 285b Sr: belaging/stalking = wederrechtelijk, opzettelijk en stelselmatig lastigvallen waardoor inbreuk op de privacy. Het is een absoluut klachtendelict (geen klacht = geen vervolging)."},
{cat:"WvSr",art:"Art. 285d",lvl:"T",text:"Iemand publiceert het thuisadres, telefoonnummer en werkplek van een journalist online met de tekst 'ga hem maar lastigvallen'. Welk artikel is van toepassing?",opts:["Art. 261 Sr – smaad","Art. 285b Sr – belaging","Art. 285d Sr – doxing","Art. 266 Sr – belediging"],ans:2,exp:"Art. 285d Sr: doxing = opzettelijk openbaar maken van persoonsgegevens met het doel iemand te intimideren of te laten intimideren door derden. Het oproepen van anderen om iemand lastig te vallen valt er ook onder."},
{cat:"WvSr",art:"Art. 287/289",lvl:"K",text:"Wat onderscheidt moord (art. 289 Sr) van doodslag (art. 287 Sr)?",opts:["Bij moord is het slachtoffer een bekende van de dader","Bij moord is sprake van voorbedachte rade; bij doodslag niet","Bij doodslag wordt gebruik gemaakt van een wapen","Bij moord is een hogere straf van maximaal 20 jaar"],ans:1,exp:"Art. 287 Sr (doodslag): opzettelijk doden zonder voorbedachte rade (impulsief). Art. 289 Sr (moord): opzettelijk doden mét voorbedachte rade (planning vooraf). Moord heeft levenslang of max. 30 jaar als strafmaximum."},
{cat:"WvSr",art:"Art. 300/302",lvl:"T",text:"Iemand slaat zijn buurman met opzet op het hoofd zodat hij bewusteloos raakt en een hersenschudding oploopt. Welk artikel is van toepassing?",opts:["Art. 300 Sr – eenvoudige mishandeling","Art. 302 Sr – zware mishandeling (opzet op zwaar letsel)","Art. 287 Sr – doodslag","Art. 141 Sr – openlijke geweldpleging"],ans:1,exp:"Art. 302 Sr: zware mishandeling = opzet gericht op het toebrengen van zwaar lichamelijk letsel. Als alleen het toebrengen van pijn of letsel het doel was (en zwaar letsel een ongewild gevolg), is het art. 300 lid 2."},
{cat:"WvSr",art:"Art. 300/302",lvl:"T",text:"Iemand geeft een ander een onverwachte duw in een vijver. De persoon raakt niet gewond maar ondergaat een onaangename gewaarwording. Welk artikel?",opts:["Geen strafbaar feit, er is geen letsel","Art. 300 Sr – eenvoudige mishandeling","Art. 302 Sr – zware mishandeling","Art. 350 Sr – vernieling"],ans:1,exp:"Art. 300 Sr: mishandeling omvat ook het toebrengen van een min of meer hevige onaangename gewaarwording, zoals onverwacht in het water duwen. Letsel is niet vereist."},
{cat:"WvSr",art:"Art. 310/311/312",lvl:"T",text:"Een man neemt een fiets mee die niet van hem is, zonder geweld te gebruiken. Welk artikel?",opts:["Art. 321 Sr – verduistering","Art. 310 Sr – diefstal","Art. 317 Sr – afpersing","Art. 312 Sr – diefstal met geweld"],ans:1,exp:"Art. 310 Sr: diefstal = enig goed wegnemen dat aan een ander toebehoort, met het oogmerk zich dit wederrechtelijk toe te eigenen. Geen geweld, dus niet art. 312."},
{cat:"WvSr",art:"Art. 310/311/312",lvl:"T",text:"Een inbreker klimt 's nachts via een raam een woning binnen en steelt sieraden. Welk artikel is van toepassing?",opts:["Art. 310 Sr – gewone diefstal","Art. 311 Sr – diefstal met strafverzwarende omstandigheden (inklimming, woning)","Art. 312 Sr – diefstal met geweld","Art. 321 Sr – verduistering"],ans:1,exp:"Art. 311 Sr: gekwalificeerde diefstal met strafverzwarende omstandigheden: diefstal in een woning waarbij de dader zich toegang verschaft via inklimming. Dit geeft een hogere straf dan gewone diefstal."},
{cat:"WvSr",art:"Art. 310/311/312",lvl:"T",text:"Een overvaller duwt een winkelier opzij en grijpt de kassa. Welk artikel is van toepassing?",opts:["Art. 310 Sr – gewone diefstal","Art. 311 Sr – gekwalificeerde diefstal","Art. 312 Sr – diefstal met geweld","Art. 317 Sr – afpersing"],ans:2,exp:"Art. 312 Sr: diefstal met geweld = alle bestanddelen van diefstal (art. 310) plus geweld of bedreiging met geweld. De duw is geweld gericht op het mogelijk maken van de diefstal."},
{cat:"WvSr",art:"Art. 317",lvl:"T",text:"Iemand bedreigt een winkelhouder met een mes en eist dat hij de kassa afgeeft. Welk artikel is van toepassing?",opts:["Art. 310 Sr – diefstal","Art. 312 Sr – diefstal met geweld","Art. 317 Sr – afpersing","Art. 285 Sr – bedreiging"],ans:2,exp:"Art. 317 Sr: afpersing = door geweld of bedreiging met geweld iemand dwingen tot afgifte van een goed, met het oogmerk zich wederrechtelijk te bevoordelen. Kenmerkend is dat het slachtoffer de keuze heeft maar daartoe wordt gedwongen."},
{cat:"WvSr",art:"Art. 321",lvl:"T",text:"Een huurder besluit halverwege de huurperiode de gehuurde auto gewoon te houden en niet terug te brengen. Welk strafbaar feit is dit?",opts:["Art. 310 Sr – diefstal","Art. 317 Sr – afpersing","Art. 321 Sr – verduistering","Art. 326 Sr – oplichting"],ans:2,exp:"Art. 321 Sr: verduistering = het goed is eerst rechtmatig ('anders dan door misdrijf') verkregen en de dader gedraagt zich later als eigenaar. Had hij direct bij het huren de bedoeling het niet terug te brengen, dan is het oplichting."},
{cat:"WvSr",art:"Art. 326",lvl:"T",text:"Iemand doet zich voor als loodgieter en int betaling voor werk dat hij nooit uitvoert. Welk artikel?",opts:["Art. 321 Sr – verduistering","Art. 317 Sr – afpersing","Art. 326 Sr – oplichting (aannemen valse hoedanigheid)","Art. 225 Sr – valsheid in geschrifte"],ans:2,exp:"Art. 326 Sr: oplichting = door bedrog (hier: aannemen van een valse hoedanigheid als loodgieter) iemand bewegen tot afgifte van geld of dienstverlening, met het oogmerk wederrechtelijk voordeel te behalen."},
{cat:"WvSr",art:"Art. 350/350a",lvl:"T",text:"Iemand gooit opzettelijk de ruit van een auto in. Welk artikel is van toepassing?",opts:["Art. 141 Sr – openlijke geweldpleging","Art. 310 Sr – diefstal","Art. 350 Sr – vernieling","Art. 300 Sr – mishandeling"],ans:2,exp:"Art. 350 Sr: vernieling = opzettelijk en wederrechtelijk beschadigen, vernietigen of onbruikbaar maken van een goed dat geheel of ten dele aan een ander toebehoort."},
{cat:"WvSr",art:"Art. 350/350a",lvl:"T",text:"Iemand hackt de computer van een bedrijf en verwijdert alle bestanden. Welk artikel is van toepassing?",opts:["Art. 350 Sr – vernieling","Art. 350a Sr – vernieling computergegevens","Art. 225 Sr – valsheid in geschrifte","Art. 321 Sr – verduistering"],ans:1,exp:"Art. 350a Sr: opzettelijk en wederrechtelijk veranderen, wissen of onbruikbaar maken van computergegevens. Dit is de digitale variant van vernieling (art. 350)."},
{cat:"WvSr",art:"Art. 416/417bis",lvl:"K",text:"Wat is het verschil tussen opzetheling (art. 416 Sr) en schuldheling (art. 417bis Sr)?",opts:["Bij opzetheling weet de heler zeker dat het goed gestolen is; bij schuldheling had hij het redelijkerwijs kunnen weten","Bij schuldheling is de straf hoger dan bij opzetheling","Opzetheling geldt alleen voor goederen, schuldheling ook voor diensten","Er is geen verschil, de artikelen zijn identiek"],ans:0,exp:"Art. 416 Sr: opzetheling = de heler weet dat het goed door misdrijf verkregen is. Art. 417bis Sr: schuldheling = de heler had redelijkerwijs kunnen vermoeden dat het goed van misdrijf afkomstig was. Opzetheling is zwaarder bestraft."},
{cat:"WvSr",art:"Art. 370",lvl:"K",text:"Wanneer pleegt een ambtenaar 'ambtelijke huisvredebreuk' (art. 370 Sr)?",opts:["Als hij buiten diensttijd een woning betreedt","Als hij met overschrijding van zijn bevoegdheid of zonder inachtneming van de wettelijke vormen een woning binnentreedt","Als hij een woning betreedt zonder zijn legitimatie te tonen","Als hij een woning betreedt zonder toestemming van zijn leidinggevende"],ans:1,exp:"Art. 370 Sr: ambtelijke huisvredebreuk = een ambtenaar die een woning binnentreedt met overschrijding van zijn bevoegdheid of zonder inachtneming van de wettelijke vormen (bijv. zonder vereiste machtiging)."},
{cat:"WvSr",art:"Art. 424",lvl:"K",text:"Wat wordt verstaan onder 'baldadigheid' (art. 424 Sr)?",opts:["Het opzettelijk beschadigen van andermans eigendommen","Het openlijk en zonder redelijk doel hinderen van personen of het aanbrengen van schade aan goederen op een openbare weg","Het lastigvallen van personen via sociale media","Het plegen van vernieling in groepsverband"],ans:1,exp:"Art. 424 Sr: baldadigheid = openlijk, zonder redelijk doel, de openbare rust verstoren of personen hinderen of aanbrengen van schade aan goederen op een openbare weg. Dit is een overtreding (geen misdrijf)."},
{cat:"WvSr",art:"Art. 435",lvl:"T",text:"Een agent vraagt iemand naar zijn naam en geboortedatum. De persoon geeft een valse naam op. Welk strafbaar feit?",opts:["Art. 447e Sr – niet voldoen aan de identificatieplicht","Art. 435 Sr – opgeven van valse identiteitsgegevens aan het bevoegd gezag","Art. 188 Sr – valse aangifte","Art. 225 Sr – valsheid in geschrifte"],ans:1,exp:"Art. 435 Sr: het opgeven van valse naam, voornaam, geboortedatum, geboorteplaats of adres aan het bevoegd gezag dat daarnaar vraagt, is strafbaar. Dit is een overtreding."},
{cat:"WvSr",art:"Art. 447e",lvl:"T",text:"Een aangehouden verdachte weigert zijn identiteitsbewijs te tonen. Welk artikel overtreedt hij?",opts:["Art. 435 Sr – valse identiteitsgegevens","Art. 447e Sr – niet voldoen aan verplichting identiteitsbewijs te tonen","Art. 184 Sr – niet voldoen aan ambtelijk bevel","Art. 180 Sr – wederspannigheid"],ans:1,exp:"Art. 447e Sr: strafbaar is degene die niet op eerste vordering van een opsporingsambtenaar een geldig identiteitsbewijs kan tonen."},
// ========== WETBOEK VAN STRAFVORDERING ==========
{cat:"WvSv",art:"Art. 1",lvl:"K",text:"Wat houdt het legaliteitsbeginsel in het strafprocesrecht (art. 1 WvSv) in?",opts:["Strafvordering mag alleen plaatsvinden op de wijze zoals bij wet is voorzien","De politie moet altijd een rechter inschakelen voordat zij optreedt","Verdachten hebben altijd recht op een advocaat","Opsporing mag alleen overdag plaatsvinden"],ans:0,exp:"Art. 1 WvSv: strafvordering vindt slechts plaats op de wijze bij de wet voorzien. Alleen de formele wetgever (regering + parlement) mag regels stellen over het strafprocesrecht."},
{cat:"WvSv",art:"Art. 27",lvl:"T",text:"Een agent ziet iemand snel weglopen van een net overvallen winkel. Op basis waarvan kan hij iemand als verdachte aanmerken?",opts:["Alleen als hij het strafbare feit zelf heeft gezien","Op basis van een redelijk vermoeden van schuld aan een strafbaar feit, gebaseerd op concrete feiten en omstandigheden","Zodra iemand nerveus gedrag vertoont","Pas als het OM hem vervolgt"],ans:1,exp:"Art. 27 lid 1 WvSv: verdachte = persoon tegen wie op grond van concrete feiten of omstandigheden een redelijk vermoeden van schuld aan een strafbaar feit bestaat."},
{cat:"WvSv",art:"Art. 27c/28/29",lvl:"K",text:"Welk recht heeft een aangehouden verdachte vóór zijn eerste verhoor op grond van art. 27c lid 3 WvSv?",opts:["Het recht om direct in vrijheid te worden gesteld","Schriftelijke mededeling van zijn rechten (verklaring van rechten), waaronder cautie en recht op rechtsbijstand","Het recht om direct de rechter te spreken","Het recht om anoniem te blijven"],ans:1,exp:"Art. 27c lid 3 WvSv: de aangehouden verdachte krijgt onverwijld vóór zijn eerste verhoor een schriftelijke verklaring van rechten, waaronder zijn zwijgrecht (cautie), recht op een advocaat en recht op een tolk."},
{cat:"WvSv",art:"Art. 27c/28/29",lvl:"K",text:"Wat houdt de cautie (art. 29 lid 2 WvSv) in?",opts:["De verdachte wordt gewaarschuwd dat liegen strafbaar is","De verdachte wordt voor het verhoor medegedeeld dat hij niet tot antwoorden verplicht is (zwijgrecht)","De verdachte wordt meegedeeld welk feit hem ten laste wordt gelegd","De verdachte wordt gewezen op zijn recht een advocaat te betalen"],ans:1,exp:"Art. 29 lid 2 WvSv: de cautie = mededeling aan de verdachte vóór het verhoor dat hij niet verplicht is te antwoorden. Dit beschermt hem tegen zelfincriminatie."},
{cat:"WvSv",art:"Art. 27cb",lvl:"K",text:"Waar vindt het verhoor van een aangehouden verdachte bij voorkeur plaats?",opts:["Op straat waar de aanhouding plaatsvond","Op een plaats bestemd voor verhoren of een door de (H)OvJ aangewezen verhoorplaats","Thuis bij de verdachte","In de rechtszaal"],ans:1,exp:"Art. 27cb WvSv: verhoor van een aangehouden verdachte vindt zo veel mogelijk plaats op een daarvoor bestemde verhoorplaats of een andere door de (H)OvJ aangewezen plaats."},
{cat:"WvSv",art:"Art. 52",lvl:"K",text:"Wat houdt 'staande houden' (art. 52 WvSv) in en wie mag het toepassen?",opts:["Een burger mag iedereen staande houden die hij verdacht vindt","Een opsporingsambtenaar mag een verdachte vragen te stoppen om zijn identiteit vast te stellen; het is een strafvorderlijke bevoegdheid","Iedereen mag iemand staande houden op heterdaad","Alleen de OvJ mag een bevel tot staande houden geven"],ans:1,exp:"Art. 52 WvSv: staande houden = een verdachte vragen te stoppen om zijn identiteit vast te stellen. Dit is een strafvorderlijke bevoegdheid die alleen door opsporingsambtenaren kan worden uitgeoefend."},
{cat:"WvSv",art:"Art. 53/54",lvl:"K",text:"Een burger ziet hoe iemand op heterdaad een tas steelt. Mag hij de dief aanhouden?",opts:["Nee, dat mag uitsluitend een opsporingsambtenaar","Ja, iedereen mag bij heterdaad aanhouden (art. 53 WvSv), maar burgers mogen geen voorwerpen in beslag nemen","Ja, en hij mag de gestolen tas ook terugvorderen","Alleen als hij een buitengewoon opsporingsambtenaar is"],ans:1,exp:"Art. 53 WvSv: bij ontdekking op heterdaad mag iedereen aanhouden. Een burger mag echter geen voorwerpen in beslag nemen; dat is voorbehouden aan opsporingsambtenaren."},
{cat:"WvSv",art:"Art. 53/54",lvl:"K",text:"Wanneer mag een opsporingsambtenaar een verdachte aanhouden buiten heterdaad (art. 54 WvSv)?",opts:["Altijd, mits hij dat noodzakelijk acht","Op bevel van de OvJ bij verdenking van een strafbaar feit","Alleen bij misdrijven met een strafmaximum van meer dan 4 jaar","Op eigen initiatief als hij de verdachte herkent"],ans:1,exp:"Art. 54 WvSv: buiten heterdaad kan alleen worden aangehouden op bevel van de OvJ. De bevoegdheid is beperkter dan bij heterdaad."},
{cat:"WvSv",art:"Art. 55/55a",lvl:"T",text:"Een agent heeft de bevoegdheid een verdachte aan te houden. Mag hij daarvoor ook elke plaats betreden?",opts:["Nee, hij mag alleen openbare plaatsen betreden","Ja, art. 55 WvSv geeft de bevoegdheid elke plaats te betreden ter aanhouding, met inachtneming van de Awbi","Ja, maar alleen als de OvJ dit vooraf goedkeurt","Nee, voor een woning is altijd toestemming van de bewoner nodig"],ans:1,exp:"Art. 55 lid 2 WvSv: de opsporingsambtenaar mag ter aanhouding elke plaats betreden. Voor woningen gelden de aanvullende voorwaarden van de Awbi (machtiging e.d.)."},
{cat:"WvSv",art:"Art. 55b/56",lvl:"T",text:"Een agent wil een aangehouden verdachte onderzoeken aan zijn kleding om bewijs te vinden. Welk artikel geeft hem die bevoegdheid?",opts:["Art. 55b WvSv: ter vaststelling van identiteit kleding onderzoeken","Art. 56 WvSv: op bevel van de (H)OvJ bij ernstige bezwaren lichaam en kleding onderzoeken ter bewijsvinding","Art. 7 Politiewet: veiligheidsfouillering","Art. 20 Ambtsinstructie: insluitingsfouillering"],ans:1,exp:"Art. 56 WvSv: de (H)OvJ kan bij ernstige bezwaren (zware verdenking) bepalen dat de verdachte aan lichaam en kleding wordt onderzocht, primair ter bewijsvinding. Art. 55b is specifiek voor identiteitsvaststelling."},
{cat:"WvSv",art:"Art. 55c",lvl:"K",text:"Hoe moet de identiteit van een aangehouden verdachte worden vastgesteld?",opts:["Door hem mondeling naar zijn naam te vragen","Aan de hand van een voorgeschreven identiteitsbewijs of door vergelijking van vingerafdrukken (art. 55c WvSv)","Door een foto van hem te maken en te vergelijken","Via het GBA-register van de gemeente"],ans:1,exp:"Art. 55c WvSv: de identiteit van een aangehouden verdachte moet worden gecontroleerd via een voorgeschreven identiteitsbewijs of door vergelijking van vingerafdrukken."},
{cat:"WvSv",art:"Art. 56a/56b/61a",lvl:"T",text:"Hoe lang mag een verdachte maximaal worden opgehouden voor onderzoek bij een misdrijf waarvoor voorlopige hechtenis mogelijk is?",opts:["6 uur (nachttijd niet meegerekend)","9 uur (nachttijd niet meegerekend)","24 uur","72 uur"],ans:1,exp:"Art. 56a lid 2 WvSv: bij feiten waarvoor voorlopige hechtenis is toegelaten maximaal 9 uur; bij andere feiten maximaal 6 uur. De tijd tussen middernacht en 09:00 telt niet mee."},
{cat:"WvSv",art:"Art. 56a/56b/61a",lvl:"T",text:"Welke maatregelen mogen worden genomen tijdens het ophouden voor onderzoek (art. 61a WvSv)?",opts:["Alleen verhoor en fouillering","Alleen bij misdrijven van art. 67 lid 1: foto's, vingerafdrukken, geuridentificatieproef, confrontatie, observatiecel e.d.","Altijd DNA-afname en bloedonderzoek","Opsluiting in een cel zonder tijdslimiet"],ans:1,exp:"Art. 61a WvSv: bij verdenking van een misdrijf als bedoeld in art. 67 lid 1 kunnen maatregelen worden genomen zoals foto's, vingerafdrukken, confrontatie, geuridentificatieproef en plaatsing in een observatiecel."},
{cat:"WvSv",art:"Art. 57/58",lvl:"K",text:"Hoe lang duurt een inverzekeringstelling maximaal en door wie wordt dit beslist?",opts:["24 uur, door de agent ter plaatse","3 dagen en nachten door de (H)OvJ, eenmaal te verlengen met 3 dagen bij dringend noodzakelijkheid","14 dagen door de rechter-commissaris","6 uur door de hulpofficier van justitie"],ans:1,exp:"Art. 57/58 WvSv: inverzekeringstelling = maximaal 3 dagen en nachten, bevolen door de (H)OvJ na verhoor van de verdachte. Eénmalige verlenging met maximaal 3 dagen is mogelijk."},
{cat:"WvSv",art:"Art. 67",lvl:"K",text:"Voor welke feiten is voorlopige hechtenis (art. 67 WvSv) toegestaan?",opts:["Alle strafbare feiten","Misdrijven met een strafmaximum van 4 jaar of meer, én een aantal speciaal aangewezen misdrijven met lager maximum","Alleen bij misdrijven met levenslang als strafmaximum","Alle feiten waarbij de verdachte vluchtgevaar vertoont"],ans:1,exp:"Art. 67 WvSv: voorlopige hechtenis is mogelijk bij misdrijven met max. 4 jaar of meer, én bij speciaal aangewezen misdrijven met lager maximum (zoals belaging, eenvoudige mishandeling, vernieling)."},
{cat:"WvSv",art:"Art. 94/95/96/96a/96b",lvl:"T",text:"Welke voorwerpen zijn vatbaar voor inbeslagneming op grond van art. 94 WvSv?",opts:["Alleen goederen die eigendom zijn van de verdachte","Voorwerpen die kunnen dienen voor waarheidsvinding, verbeurdverklaard kunnen worden, onttrokken aan het verkeer kunnen worden, of wederrechtelijk verkregen voordeel aantonen","Alleen wapens en drugs","Alle eigendommen van de verdachte"],ans:1,exp:"Art. 94 WvSv: vatbaar voor inbeslagneming zijn: (1) voorwerpen voor waarheidsvinding, (2) voorwerpen die verbeurd verklaard of onttrokken aan het verkeer kunnen worden, en (3) voorwerpen die wederrechtelijk verkregen voordeel aantonen."},
{cat:"WvSv",art:"Art. 96c/97",lvl:"K",text:"Wie is bevoegd een woning te doorzoeken ter inbeslagneming als de bewoner geen toestemming geeft?",opts:["De opsporingsambtenaar zelf, mits noodzakelijk","De OvJ met machtiging van de RC, bij dringende noodzaak ook zonder afwachten van de RC","Alleen de rechter-commissaris","De hulpofficier van justitie na overleg met de burgemeester"],ans:1,exp:"Art. 97 WvSv: de OvJ kan bij dringende noodzakelijkheid een woning doorzoeken zonder toestemming van de bewoner, maar heeft daarvoor een machtiging van de RC nodig (of kan bij acute nood niet op de RC wachten)."},
{cat:"WvSv",art:"Art. 124",lvl:"K",text:"Wie is verantwoordelijk voor de orde tijdens een ambtsverrichting (zoals een zitting) en welke maatregel kan worden genomen bij verstoring?",opts:["De politie is verantwoordelijk en kan de verstoorder aanhouden","De voorzitter/rechter/leidende ambtenaar is verantwoordelijk; hij kan na waarschuwing bevelen de verstoorder te verwijderen en tijdelijk in verzekering te stellen","De griffier is verantwoordelijk voor de orde","Iedereen in de zaal is gezamenlijk verantwoordelijk"],ans:1,exp:"Art. 124 WvSv: de voorzitter/rechter/leidende ambtenaar zorgt voor de orde. Bij verstoring kan hij na waarschuwing bevelen dat de verstoorder vertrekt en hem tot afloop in verzekering houden."},
{cat:"WvSv",art:"Art. 127/141/142",lvl:"K",text:"Wie zijn 'algemene opsporingsambtenaren' (art. 141 WvSv)?",opts:["Alleen officieren van justitie","Officieren van justitie, politieambtenaren en officieren/onderofficieren van de Koninklijke Marechaussee","Alle ambtenaren van de overheid","Alleen hoofdagenten en hogere rangen"],ans:1,exp:"Art. 141 WvSv: algemene opsporingsambtenaren zijn belast met de opsporing van alle strafbare feiten: officieren van justitie, ambtenaren van politie en aangewezen Koninklijke Marechaussee-personeel."},
{cat:"WvSv",art:"Art. 128",lvl:"B",text:"Wanneer is er sprake van 'heterdaad' (art. 128 WvSv)?",opts:["Alleen als de agent het feit zelf heeft zien gebeuren","Als het feit wordt ontdekt terwijl het wordt begaan of terstond nadat het is begaan, mits het onderzoek zonder onderbreking voortgaat","Alleen binnen 1 uur na het plegen van het feit","Als er minimaal twee getuigen zijn"],ans:1,exp:"Art. 128 WvSv: heterdaad = het feit wordt ontdekt terwijl het wordt begaan of terstond daarna. De heterdaadsituatie kan worden opgerekt zolang het opsporingsonderzoek continu en zonder onderbreking doorgaat."},
{cat:"WvSv",art:"Art. 161",lvl:"K",text:"Wie is bevoegd aangifte te doen van een strafbaar feit?",opts:["Alleen het directe slachtoffer","Iedereen die kennis draagt van een strafbaar feit (art. 161 WvSv)","Alleen personen die meerderjarig zijn","Alleen personen die zelf schade hebben geleden"],ans:1,exp:"Art. 161 WvSv: iedereen die kennis draagt van een strafbaar feit is bevoegd hiervan aangifte te doen bij een opsporingsambtenaar."},
{cat:"WvSv",art:"Art. 167",lvl:"K",text:"Wat houdt het opportuniteitsbeginsel (art. 167 WvSv) in?",opts:["Het OM is verplicht altijd te vervolgen als er bewijs is","Het OM heeft de vrijheid af te zien van vervolging op gronden ontleend aan het algemeen belang, ook als er voldoende bewijs is","De rechter beslist of vervolging opportuun is","De politie beslist of een zaak wordt doorgestuurd naar het OM"],ans:1,exp:"Art. 167 WvSv: het OM beslist of vervolging plaatsvindt. Het mag afzien van vervolging (sepot) op gronden van het algemeen belang (beleidsmatig/opportuniteitsbeginsel), ook bij voldoende bewijs."},
{cat:"WvSv",art:"Art. 338",lvl:"K",text:"Waarop moet de rechter zijn overtuiging baseren bij bewijsbeslissing?",opts:["Uitsluitend op de bekentenis van de verdachte","Op de inhoud van wettige bewijsmiddelen na onderzoek ter terechtzitting, en zijn eigen overtuiging","Op het advies van de officier van justitie","Op de mening van de jury"],ans:1,exp:"Art. 338 WvSv: de rechter mag alleen tot een veroordeling komen als hij uit het onderzoek ter terechtzitting door de inhoud van wettige bewijsmiddelen overtuigd is dat de verdachte het feit heeft begaan."},
{cat:"WvSv",art:"Art. 339",lvl:"T",text:"Welke zijn wettige bewijsmiddelen (art. 339 WvSv)?",opts:["Alleen schriftelijke stukken en bekennende verklaringen","Eigen waarneming van de rechter, verklaringen van verdachte/getuigen/deskundigen, en schriftelijke stukken","Getuigenissen, DNA-bewijs en camerabeelden","Alle informatie die de politie heeft verzameld"],ans:1,exp:"Art. 339 WvSv: de wettige bewijsmiddelen zijn: (1) eigen waarneming van de rechter, (2) verklaringen van de verdachte, getuigen en deskundigen, en (3) schriftelijke stukken."},
{cat:"WvSv",art:"Art. 341/342",lvl:"K",text:"Mag een verdachte worden veroordeeld uitsluitend op basis van zijn eigen bekentenis?",opts:["Ja, een bekentenis is het sterkste bewijs","Nee, art. 341 lid 4 WvSv verbiedt veroordeling louter op basis van de bekentenis van de verdachte","Ja, maar alleen als de bekentenis schriftelijk is vastgelegd","Nee, tenzij er ook camerabeelden zijn"],ans:1,exp:"Art. 341 lid 4 WvSv: een verdachte mag niet worden veroordeeld louter op basis van zijn eigen bekentenis. Er moeten aanvullende bewijsmiddelen zijn."},
{cat:"WvSv",art:"Art. 341/342",lvl:"K",text:"Wat houdt de regel 'één getuige is geen getuige' (art. 342 lid 2 WvSv) in?",opts:["Een getuigenverklaring heeft geen bewijswaarde","De bewijslast voor de gehele tenlastelegging mag niet uitsluitend rusten op de verklaring van één getuige","Een rechter moet altijd minimaal twee getuigen horen","Getuigenverklaringen zijn altijd onbetrouwbaar"],ans:1,exp:"Art. 342 lid 2 WvSv: het bewijs van de volledige tenlastelegging mag niet uitsluitend worden gebaseerd op de verklaring van één getuige. Uitzondering: een PV van één opsporingsambtenaar kan wél voldoende zijn (art. 344 lid 2)."},
{cat:"WvSv",art:"Art. 344",lvl:"K",text:"Welke schriftelijke stukken kunnen als bewijsmiddel dienen in een strafzaak?",opts:["Alleen officiële rechterlijke uitspraken","Processen-verbaal van opsporingsambtenaren, beslissingen van colleges, verslagen van deskundigen en andere geschriften in combinatie met andere bewijsmiddelen","Alleen door de verdachte ondertekende verklaringen","Alle schriftelijke documenten ongeacht de bron"],ans:1,exp:"Art. 344 WvSv: als schriftelijk bewijsmiddel gelden o.a.: rechterlijke beslissingen, PV's van bevoegde personen, verslagen van deskundigen en andere geschriften (deze laatste alleen in combinatie met andere bewijsmiddelen)."},

{cat:"Wet Identificatieplicht",art:"Art. 1",lvl:"K",text:"Welke documenten zijn geldig als identiteitsbewijs op grond van de Wet op de identificatieplicht?",opts:["Alleen een paspoort of rijbewijs","Paspoort, ID-kaart, vreemdelingendocument, geldig rijbewijs (EU-lidstaat) en noodpaspoort","Elke bankpas met foto","Elk door de overheid uitgegeven document met naam en geboortedatum"],ans:1,exp:"Art. 1 WID: geldige identiteitsbewijzen zijn: Nederlandse ID-kaart, paspoort, vreemdelingendocument, geldig nationaal/diplomatiek paspoort, rijbewijs afgegeven door een EU-lidstaat, en noodpaspoort."},
{cat:"Wet Identificatieplicht",art:"Art. 2",lvl:"K",text:"Vanaf welke leeftijd bent u verplicht een identiteitsbewijs te tonen op vordering van een ambtenaar?",opts:["12 jaar","14 jaar","16 jaar","18 jaar"],ans:1,exp:"Art. 2 WID: vanaf 14 jaar bent u verplicht op eerste vordering van een bevoegde ambtenaar een geldig identiteitsbewijs te tonen."},

{cat:"Awbi",art:"Art. 1/2",lvl:"K",text:"Wat zijn de verplichtingen van een ambtenaar die een woning betreedt (art. 1 Awbi)?",opts:["Hij hoeft zich alleen te legitimeren bij verdenking van een misdrijf","Hij is verplicht zich vooraf te legitimeren en het doel van zijn komst mee te delen","Hij mag de woning betreden zonder zich te identificeren als er spoed is","Hij hoeft alleen het doel mee te delen, geen legitimatie"],ans:1,exp:"Art. 1 Awbi: de ambtenaar die een woning betreedt is verplicht zich vooraf te legitimeren én het doel van zijn komst uit te leggen. Bij meerdere ambtenaren geldt dit alleen voor de leidinggevende."},
{cat:"Awbi",art:"Art. 2/3",lvl:"K",text:"Wie is bevoegd een machtiging tot binnentreden af te geven?",opts:["De minister van Justitie en Veiligheid","De advocaat-generaal, officier van justitie, hulpofficier van justitie en (voor niet-opsporingstaken) de burgemeester","Elke opsporingsambtenaar mag zichzelf machtigen","Alleen de rechter-commissaris"],ans:1,exp:"Art. 3 Awbi: de machtiging kan worden afgegeven door de advocaat-generaal, OvJ, HOvJ en (voor niet-opsporingstaken) de burgemeester."},
{cat:"Awbi",art:"Art. 2",lvl:"K",text:"Wanneer is een schriftelijke machtiging voor binnentreden niet vereist?",opts:["Nooit, een machtiging is altijd verplicht","Bij ernstig en onmiddellijk gevaar voor personen of goederen waarbij onmiddellijk moet worden binnengetreden","Als de bewoner niet aanwezig is","Als het gaat om een huurwoning"],ans:1,exp:"Art. 2 lid 3 Awbi: een machtiging is niet vereist als er ernstig en onmiddellijk gevaar bestaat voor personen of goederen en onmiddellijk binnentreden noodzakelijk is."},
{cat:"Awbi",art:"Art. 7",lvl:"K",text:"Onder welke voorwaarden mag een woning tussen middernacht en 06:00 worden betreden zonder toestemming van de bewoner?",opts:["Altijd, mits de agent zich legitimeert","Alleen bij dringende noodzakelijkheid én de machtiging moet dit uitdrukkelijk vermelden","Na toestemming van de OvJ via de telefoon","Dit is te allen tijde verboden"],ans:1,exp:"Art. 7 Awbi: binnentreden tussen middernacht en 06:00 vereist (1) dringende noodzakelijkheid én (2) de machtiging moet uitdrukkelijk vermelden dat nachtelijk binnentreden is toegestaan."},

// ---- Shuffle helpers ----
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// ---- State ----
// shuffledQ: array of objects {qIdx, optOrder} where optOrder maps display pos -> original opt index
// answers: {shuffledPos: displayedOptIndex chosen}  (index into shuffledQ)
let shuffledQ=[], answers={}, reviewed=false, filterCat='Alles', randomMode=true, cur=0;

const cats=[...new Set(Q.map(q=>q.cat))];

function buildShuffled(){
  const base=filterCat==='Alles'?Q.map((_,i)=>i):Q.map((_,i)=>i).filter(i=>Q[i].cat===filterCat);
  const ordered=base.map(qIdx=>{
    const optOrder=Q[qIdx].opts.map((_,i)=>i);
    return {qIdx, optOrder};
  });
  if(randomMode){
    const qShuffled=shuffle(ordered);
    return qShuffled.map(item=>({qIdx:item.qIdx, optOrder:shuffle(item.optOrder)}));
  }
  return ordered;
}

function initSession(){
  shuffledQ=buildShuffled();
  answers={};
  reviewed=false;
  cur=0;
}

initSession();

function countCorrect(){
  let n=0;
  Object.keys(answers).forEach(pos=>{
    const item=shuffledQ[pos];
    const chosenDisplay=answers[pos];
    const chosenOrig=item.optOrder[chosenDisplay];
    if(chosenOrig===Q[item.qIdx].ans)n++;
  });
  return n;
}

  const done=givenDisplay!==undefined;
  const givenOrig=done?item.optOrder[givenDisplay]:undefined;

  m.innerHTML=`

<div class="stats">

  <button class="filter-btn${!randomMode?' active':''}" onclick="setMode(false)">📋 Op volgorde</button>
  <span style="font-size:12px;color:#888780;line-height:2;margin-left:8px;margin-right:4px">Categorie:</span>
  ${['Alles',...cats].map(c=>`<button class="filter-btn${filterCat===c?' active':''}" onclick="setFilter('${c}')">${c}</button>`).join('')}
</div>
<div class="q-nav">${shuffledQ.map((it,pos)=>{
  let cls='q-nav-btn';
  if(pos===cur)cls+=' current';
  else if(answers[pos]!==undefined)cls+=' answered';
  return `<button class="${cls}" onclick="goTo(${pos})">${pos+1}</button>`;
}).join('')}</div>
<div class="question-card">
  <div class="q-meta">
    <span class="q-tag">${q.cat}</span>
    <span class="q-art">${q.art}</span>
    <span class="q-level ${q.lvl}">${q.lvl==='K'?'Kennis':q.lvl==='B'?'Begrip':'Toepassing'}</span>
    <span style="color:#888780;font-size:11px">Vraag ${cur+1}/${total}</span>
  </div>
  <div class="q-text">${q.text}</div>
  <div class="options">${item.optOrder.map((origIdx,displayPos)=>{
    const optText=q.opts[origIdx];
    const isCorrect=origIdx===q.ans;
    const isChosen=givenDisplay===displayPos;
    let cls='opt';
    if(done){
      if(isCorrect)cls+=' correct';
      else if(isChosen&&!isCorrect)cls+=' wrong';
    } else if(isChosen)cls+=' selected';
    const ltr=['A','B','C','D'][displayPos];
    return `<button class="${cls}" ${done?'disabled':''} onclick="pick(${displayPos})"><span class="opt-letter">${ltr}</span><span>${optText}</span></button>`;
  }).join('')}</div>
  ${done?`<div class="feedback ${givenOrig===q.ans?'correct':'wrong'}">
    <strong>${givenOrig===q.ans?'Correct!':'Helaas.'}</strong> ${q.exp}
  </div>`:''}
</div>
<div class="nav">
  ${cur>0?`<button class="nav-btn" onclick="goTo(${cur-1})">← Vorige</button>`:''}
  ${cur<total-1?`<button class="nav-btn primary" onclick="goTo(${cur+1})">Volgende →</button>`:''}
  ${answered===total?`<button class="nav-btn primary" onclick="showResults()">Resultaten bekijken</button>`:''}
  <button class="nav-btn" onclick="if(confirm('Alle antwoorden wissen en opnieuw beginnen?'))initSession(),render()" style="margin-left:auto;font-size:12px;color:#888780">Opnieuw</button>
</div>`;
}

function renderResults(m){
  const correct=countCorrect();
  const total=shuffledQ.length;
  const pct2=Math.round(correct/total*100);
  const pass=pct2>=55;
  const catScores={};
  cats.forEach(c=>{
    const items=shuffledQ.map((it,pos)=>({it,pos})).filter(({it})=>Q[it.qIdx].cat===c);
    const right=items.filter(({it,pos})=>{
      const d=answers[pos];
      return d!==undefined && it.optOrder[d]===Q[it.qIdx].ans;
    }).length;
    catScores[c]={right,total:items.length};
  });

  m.innerHTML=`
<div class="result-card">
  <div class="result-score">${correct}/${total}</div>
  <div class="result-pct">${pct2}%</div>
  <div class="result-pass ${pass?'pass':'fail'}">${pass?'Geslaagd ✓':'Gezakt ✗'} — Cesuur: 55%</div>
  <div class="cat-results">${cats.map(c=>{
    const cs=catScores[c];
    if(!cs||cs.total===0)return '';
    const cp=Math.round(cs.right/cs.total*100);
    return `<div class="cat-result"><div class="cat-result-name">${c}</div><div class="cat-result-score" style="color:${cp>=55?'#27500a':'#791f1f'}">${cs.right}/${cs.total} (${cp}%)</div></div>`;
  }).join('')}</div>
  <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
    <button class="nav-btn primary" onclick="initSession();render()">Opnieuw oefenen</button>
    <button class="nav-btn" onclick="showWrong()">Alleen foute vragen</button>
  </div>
</div>
${shuffledQ.filter((_,pos)=>{const it=shuffledQ[pos];const d=answers[pos];return d===undefined||it.optOrder[d]!==Q[it.qIdx].ans;}).length>0?`
<div class="section-divider">Foute / niet-beantwoorde vragen</div>
<div>
${shuffledQ.map((item,pos)=>{
  const d=answers[pos];
  const givenOrig=d!==undefined?item.optOrder[d]:undefined;
  const q=Q[item.qIdx];
  if(givenOrig===q.ans)return '';
  return `<div class="question-card">
  <div class="q-meta"><span class="q-tag">${q.cat}</span><span class="q-art">${q.art}</span><span class="q-level ${q.lvl}">${q.lvl==='K'?'Kennis':q.lvl==='B'?'Begrip':'Toepassing'}</span></div>
  <div class="q-text">${q.text}</div>
  <div class="options">${item.optOrder.map((origIdx,displayPos)=>{
    const isCorrect=origIdx===q.ans;
    const isChosen=d===displayPos;
    let cls='opt';
    if(isCorrect)cls+=' correct';
    else if(isChosen)cls+=' wrong';
    return `<button class="${cls}" disabled><span class="opt-letter">${['A','B','C','D'][displayPos]}</span><span>${q.opts[origIdx]}</span></button>`;
  }).join('')}</div>
  <div class="feedback wrong"><strong>Jouw antwoord: ${d!==undefined?['A','B','C','D'][d]:'—'}</strong>. ${q.exp}</div>
</div>`;}).join('')}
</div>`:'<p style="text-align:center;color:#27500a;padding:2rem;font-size:15px">Alle vragen goed! Uitstekend!</p>'}`;
}

function pick(displayPos){
  if(answers[cur]!==undefined)return;
  answers[cur]=displayPos;
  render();
}
function goTo(pos){cur=pos;render();}
function setMode(rand){
  if(randomMode===rand)return;
  if(!confirm('Volgorde wijzigen wist je huidige voortgang. Doorgaan?'))return;
  randomMode=rand;
  initSession();
  render();
}
function setFilter(c){
  if(filterCat===c)return;
  if(Object.keys(answers).length>0&&!confirm('Categorie wijzigen wist je huidige voortgang. Doorgaan?'))return;
  filterCat=c;
  initSession();
  render();
}
function showResults(){reviewed=true;render();}
function showWrong(){
  reviewed=false;
  const wrongPos=shuffledQ.map((_,pos)=>pos).filter(pos=>{
    const d=answers[pos];
    return d===undefined||shuffledQ[pos].optOrder[d]!==Q[shuffledQ[pos].qIdx].ans;
  });
  if(wrongPos.length>0)cur=wrongPos[0];
  render();
}
render();
</script>
</body>
</html>
