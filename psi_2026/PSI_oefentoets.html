  <div class="stat"><div class="stat-num">${Math.round(prog)}%</div><div class="stat-lbl">Voortgang</div></div>
  <div class="stat"><div class="stat-num">${deck.length-origTotal()}</div><div class="stat-lbl">Herkansingen</div></div>
  <div class="stat"><div class="stat-num">${cur+1}/${total}</div><div class="stat-lbl">Kaart</div></div>
</div>

  <button class="filter-btn${randomMode?' active':''}" onclick="setMode(true)">🔀 Willekeurig</button>
  <button class="filter-btn${!randomMode?' active':''}" onclick="setMode(false)">📋 Op volgorde</button>
  <span style="font-size:12px;color:#888780;line-height:2;margin-left:8px;margin-right:4px">Categorie:</span>
  ${['Alles',...cats].map(c=>`<button class="filter-btn${filterCat===c?' active':''}" onclick="setFilter('${c}')">${c}</button>`).join('')}
</div>
<div class="q-nav">${deck.map((it,pos)=>{
  let cls='q-nav-btn';
  if(pos===cur)cls+=' current';
  else if(answers[pos]!==undefined){
    cls+=answers[pos].wasCorrect?' c-right':' c-wrong';
  }
  return `<button class="${cls}" onclick="goTo(${pos})">${pos+1}${it.retryOf!==undefined?'↩':''}</button>`;
}).join('')}</div>
<div class="question-card">
  <div class="q-meta">
    <span class="q-tag">${q.cat}</span>
    <span class="q-art">${q.art}</span>
    <span class="q-level ${q.lvl}">${q.lvl==='K'?'Kennis':q.lvl==='B'?'Begrip':'Toepassing'}</span>
    ${isRetry?`<span style="background:#faeeda;color:#633806;border-radius:4px;padding:2px 7px;font-size:11px">↩ Herkansing</span>`:''}
    <span style="color:#888780;font-size:11px">Kaart ${cur+1}/${total}</span>
  </div>
  <div class="q-text">${q.text}</div>
  <div class="options">${item.optOrder.map((origIdx,displayPos)=>{
    const optText=q.opts[origIdx];
    const isCorrect=origIdx===q.ans;
    const isChosen=givenDisplay===displayPos;
    let cls='opt';
    if(done){
      if(isCorrect)cls+=' correct';
      else if(isChosen&&!isCorrect)cls+=' wrong';
    } else if(isChosen)cls+=' selected';
    const ltr=['A','B','C','D'][displayPos];
    return `<button class="${cls}" ${done?'disabled':''} onclick="pick(${displayPos})"><span class="opt-letter">${ltr}</span><span>${optText}</span></button>`;
  }).join('')}</div>
  ${done?`<div class="feedback ${ans.wasCorrect?'correct':'wrong'}">
    <strong>${ans.wasCorrect?'Correct!':'Helaas.'}</strong> ${q.exp}
    ${!ans.wasCorrect?`<br><br><em style="font-size:12px">Deze vraag komt nog twee keer terug — je moet hem twee keer achter elkaar goed hebben.</em>`:''}
  </div>`:''}
</div>
<div class="nav">
  ${cur>0?`<button class="nav-btn" onclick="goTo(${cur-1})">← Vorige</button>`:''}
  ${cur<deck.length-1?`<button class="nav-btn primary" onclick="goTo(${cur+1})">Volgende →</button>`:''}
  ${(totalAnswered()>0&&cur===deck.length-1&&answers[cur]!==undefined)?`<button class="nav-btn primary" onclick="showResults()">Resultaten bekijken</button>`:''}
  <button class="nav-btn" onclick="if(confirm('Alle antwoorden wissen en opnieuw beginnen?')){initSession();render();}" style="margin-left:auto;font-size:12px;color:#888780">Opnieuw</button>
</div>`;
}

function renderResults(m){
  const orig=deck.filter(d=>!d.retryOf);
  const origRight=orig.filter((d,i)=>{
    const realI=deck.indexOf(d);
    return answers[realI]&&answers[realI].wasCorrect;
  }).length;
  const total=orig.length;
  const pct2=Math.round(origRight/total*100);
  const pass=pct2>=55;
  const catScores={};
  cats.forEach(c=>{
    const items=deck.map((it,pos)=>({it,pos})).filter(({it})=>!it.retryOf&&Q[it.qIdx].cat===c);
    const right=items.filter(({it,pos})=>answers[pos]&&answers[pos].wasCorrect).length;
    catScores[c]={right,total:items.length};
  });
  const retryCount=deck.filter(d=>d.retryOf!==undefined).length;

  m.innerHTML=`
<div class="result-card">
  <div class="result-score">${origRight}/${total}</div>
  <div class="result-pct">${pct2}%</div>
  <div class="result-pass ${pass?'pass':'fail'}">${pass?'Geslaagd ✓':'Gezakt ✗'} — Cesuur: 55%</div>
  <p style="font-size:13px;color:#5f5e5a;margin-bottom:1rem">Herkansingen gemaakt: ${retryCount}</p>
  <div class="cat-results">${cats.map(c=>{
    const cs=catScores[c];
    if(!cs||cs.total===0)return '';
    const cp=Math.round(cs.right/cs.total*100);
    return `<div class="cat-result"><div class="cat-result-name">${c}</div><div class="cat-result-score" style="color:${cp>=55?'#27500a':'#791f1f'}">${cs.right}/${cs.total} (${cp}%)</div></div>`;
  }).join('')}</div>
  <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
    <button class="nav-btn primary" onclick="initSession();render()">Opnieuw oefenen</button>
  </div>
</div>
${deck.filter((d,pos)=>!d.retryOf&&answers[pos]&&!answers[pos].wasCorrect).length>0?`
<div class="section-divider">Foute vragen (origineel)</div>
<div>
${deck.map((item,pos)=>{
  if(item.retryOf!==undefined)return '';
  const a=answers[pos];
  if(!a||a.wasCorrect)return '';
  const q=Q[item.qIdx];
  return `<div class="question-card">
  <div class="q-meta"><span class="q-tag">${q.cat}</span><span class="q-art">${q.art}</span></div>
  <div class="q-text">${q.text}</div>
  <div class="options">${item.optOrder.map((origIdx,displayPos)=>{
    const isCorrect=origIdx===q.ans;
    const isChosen=a.displayedOpt===displayPos;
    let cls='opt';
    if(isCorrect)cls+=' correct';
    else if(isChosen)cls+=' wrong';
    return `<button class="${cls}" disabled><span class="opt-letter">${['A','B','C','D'][displayPos]}</span><span>${q.opts[origIdx]}</span></button>`;
  }).join('')}</div>
  <div class="feedback wrong">${q.exp}</div>
</div>`;}).join('')}
</div>`:'<p style="text-align:center;color:#27500a;padding:2rem;font-size:15px">Alle originele vragen goed beantwoord! Uitstekend!</p>'}`;
}

function pick(displayPos){
  if(answers[cur]!==undefined)return;
  const item=deck[cur];
  const origIdx=item.optOrder[displayPos];
  const wasCorrect=origIdx===Q[item.qIdx].ans;
  answers[cur]={displayedOpt:displayPos,wasCorrect};
  if(!wasCorrect){
    expandDeck(cur);
  }
  render();
}
function goTo(pos){cur=pos;render();}
function setMode(rand){
  if(randomMode===rand)return;
  if(!confirm('Volgorde wijzigen wist je voortgang. Doorgaan?'))return;
  randomMode=rand;initSession();render();
}
function setFilter(c){
  if(filterCat===c)return;
  if(Object.keys(answers).length>0&&!confirm('Categorie wijzigen wist je voortgang. Doorgaan?'))return;
  filterCat=c;initSession();render();
}
function showResults(){reviewed=true;render();}
render();
</script>
</body>
</html>
