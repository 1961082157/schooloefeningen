<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏙️ stadssafari · flitskaarten · groep 6</title>
    <!-- Font Awesome voor iconen (speels) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Comic Neue', 'Quicksand', 'Segoe UI', cursive, sans-serif;
        }

        :root {
            --stad-groen: #1e7b4b;
            --stad-geel: #fccf7c;
            --stad-oranje: #f59f4a;
            --stad-rood: #e3513a;
            --stad-blauw: #609dc9;
            --stad-beige: #f8f0dd;
            --stad-bruin: #7f5539;
            --stad-licht: #fefae0;
        }

        body {
            background: linear-gradient(145deg, #b6dcb0 0%, #8fc1a0 100%);
            min-height: 100vh;
            padding: 1.2rem;
            position: relative;
            background-image: radial-gradient(circle at 20% 30%, rgba(255, 235, 150, 0.3) 5%, transparent 20%),
                              radial-gradient(circle at 90% 70%, rgba(200, 230, 180, 0.4) 8%, transparent 25%);
        }

        /* stadselementen */
        body::before {
            content: "🏢🏭🏪🦊🐿️🦔";
            position: fixed;
            bottom: 5px;
            left: 10px;
            font-size: 3rem;
            opacity: 0.2;
            white-space: nowrap;
            pointer-events: none;
            rotate: -2deg;
            z-index: 0;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            background-color: rgba(255, 250, 235, 0.75);
            backdrop-filter: blur(4px);
            border-radius: 70px 70px 30px 30px;
            border: 5px solid var(--stad-bruin);
            box-shadow: 0 20px 0 #8b5a2b, 0 25px 25px rgba(0,0,0,0.25);
            padding: 1.5rem 2rem 2rem;
            position: relative;
            z-index: 5;
        }

        /* hoofding */
        .safari-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            background: var(--stad-beige);
            border-radius: 50px;
            padding: 0.8rem 2rem;
            margin-bottom: 1.8rem;
            border: 4px dashed var(--stad-groen);
            box-shadow: 0 6px 0 #ae6c47;
        }

        .title {
            font-size: 2.7rem;
            font-weight: 800;
            color: var(--stad-groen);
            text-shadow: 4px 4px 0 var(--stad-geel);
            letter-spacing: 2px;
        }

        .title i {
            color: var(--stad-oranje);
            margin-right: 10px;
        }

        .week-badges {
            display: flex;
            gap: 12px;
        }

        .week-badge {
            background: #dcedbb;
            border: 3px solid var(--stad-groen);
            border-radius: 40px;
            padding: 0.4rem 1.3rem;
            font-size: 1.2rem;
            font-weight: 700;
            color: #274e13;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 5px 0 #5b8c4e;
        }

        .week-badge.active {
            background: var(--stad-oranje);
            color: white;
            border-color: #b6491a;
            box-shadow: 0 5px 0 #994414;
            transform: translateY(2px);
        }

        .week-badge:hover {
            background: #ffd966;
        }

        /* werkbalk */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem 1.2rem;
            justify-content: center;
            margin: 2rem 0 1.5rem;
        }

        .btn {
            background: #f5b87b;
            border: none;
            border-radius: 50px;
            padding: 0.8rem 1.8rem;
            font-size: 1.2rem;
            font-weight: 700;
            color: #2f2f1f;
            border: 3px solid #a5662b;
            box-shadow: 0 6px 0 #7b4820, 0 5px 10px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: 0.08s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn:active {
            transform: translateY(6px);
            box-shadow: 0 1px 0 #7b4820;
        }

        .btn.groen {
            background: #b1d86b;
            border-color: #2f7d4a;
            box-shadow: 0 6px 0 #236538;
        }

        .btn.roze {
            background: #f9acbc;
            border-color: #b3435a;
            box-shadow: 0 6px 0 #842d40;
        }

        /* statistiek vakjes */
        .stats-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            justify-content: center;
            margin: 1.5rem 0 2rem;
        }

        .stat-item {
            background: #f1dbc0;
            border-radius: 30px;
            border: 3px solid var(--stad-bruin);
            padding: 0.8rem 2rem;
            min-width: 150px;
            text-align: center;
            font-weight: 700;
            font-size: 1.3rem;
            color: #2a441e;
            box-shadow: 0 5px 0 #8b6240;
        }

        .stat-item span {
            font-size: 2rem;
            margin-right: 10px;
            color: var(--stad-rood);
        }

        /* OEFENSESSIE (verborgen tot start) */
        .practice-zone {
            background: #efe1c6;
            border: 5px solid var(--stad-groen);
            border-radius: 60px;
            padding: 1.5rem;
            margin-bottom: 2.5rem;
            box-shadow: inset 0 0 0 4px #ffe9b6, 0 12px 0 #5d8747;
            display: none;
        }

        .practice-zone.active {
            display: block;
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .practice-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            background: #b4d5a2;
            border-radius: 40px;
            padding: 1rem 2rem;
            margin-bottom: 1.5rem;
        }

        .practice-title {
            font-size: 2rem;
            font-weight: 800;
            color: #1f4d2b;
        }

        .practice-stats {
            display: flex;
            gap: 1.2rem;
            font-size: 1.3rem;
            background: #fcf0cf;
            padding: 0.5rem 1.5rem;
            border-radius: 30px;
        }

        .practice-card {
            background: #fffae9;
            border-radius: 50px;
            padding: 2.2rem;
            text-align: center;
            border: 5px solid var(--stad-oranje);
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 12px 0 #c4642c;
            margin-bottom: 1.5rem;
        }

        .practice-word {
            font-size: 3.2rem;
            font-weight: 800;
            color: #2f6b42;
            text-shadow: 3px 3px 0 #ffd966;
            margin-bottom: 20px;
        }

        .practice-answer {
            font-size: 2rem;
            font-weight: 600;
            color: #9d4e1f;
            background: #f9e7b3;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            display: none;
            border: 3px solid #bb5b1e;
        }

        .practice-answer.show {
            display: inline-block;
        }

        .practice-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* flitskaarten raster */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.8rem;
            margin: 2rem 0;
        }

        .flashcard {
            background: #ffeecb;
            border-radius: 30px;
            border: 4px solid #bf8f60;
            box-shadow: 0 12px 0 #7f613f, 0 8px 12px rgba(0,0,0,0.2);
            aspect-ratio: 1 / 1.1;
            perspective: 1200px;
            cursor: pointer;
            transition: 0.15s;
            position: relative;
        }

        .flashcard:hover {
            transform: scale(1.01);
            border-color: #f7b05e;
        }

        .flipper {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            border-radius: 28px;
        }

        .flashcard.flipped .flipper {
            transform: rotateY(180deg);
        }

        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 28px;
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: #fffae1;
            border: 3px solid #b5763a;
        }

        .front {
            background: #fcf1d6;
            background-image: radial-gradient(circle at 10px 10px, #ffd78c 2px, transparent 2px), 
                              radial-gradient(circle at 30px 25px, #febe7c 2px, transparent 2px);
            background-size: 40px 40px;
        }

        .back {
            background: #e6efc5;
            transform: rotateY(180deg);
        }

        .woord-flash {
            font-size: 2rem;
            font-weight: 800;
            color: #1f6533;
            margin-bottom: 10px;
        }

        .definitie-flash {
            font-size: 1.2rem;
            color: #4a2f12;
            background: #f7eac6;
            padding: 10px;
            border-radius: 30px;
            border: 2px dashed #b98c4b;
        }

        .week-sticker {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--stad-blauw);
            padding: 0.2rem 1rem;
            border-radius: 30px;
            color: white;
            font-weight: 700;
            font-size: 0.8rem;
            z-index: 3;
            border: 2px solid #274e7b;
        }

        /* vinkknop voor moeilijk */
        .moeilijk-markeer {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 42px;
            height: 42px;
            background: white;
            border: 4px solid #d14545;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            color: #d14545;
            z-index: 20;
            transition: all 0.1s;
            box-shadow: 0 4px 0 #8b2c2c;
            cursor: pointer;
            pointer-events: auto;
        }

        .flashcard.difficult .moeilijk-markeer {
            background: #ffb5b5;
            border-color: #b12b2b;
            color: #b12b2b;
            box-shadow: 0 4px 0 #701f1f;
        }

        .moeilijk-markeer i {
            pointer-events: none;
        }

        /* tel-elementen */
        .aantal-badge {
            background: #fff0b5;
            border-radius: 30px;
            padding: 0.4rem 1.5rem;
            font-size: 1.5rem;
            font-weight: 700;
            border: 3px solid #c7792b;
        }

        .footer-tip {
            background: #d1dbb6;
            border-radius: 50px;
            padding: 1rem;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 600;
            color: #1d4d2b;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="safari-header">
        <div class="title">
            <i class="fas fa-binoculars"></i> STADSSAFARI
        </div>
        <div class="week-badges" id="weekFilter">
            <div class="week-badge active" data-week="all">🌳 alle weken</div>
            <div class="week-badge" data-week="1">🗓️ week 1</div>
            <div class="week-badge" data-week="2">🗓️ week 2</div>
        </div>
    </div>

    <!-- knoppenbalk -->
    <div class="toolbar">
        <button class="btn" id="toonAlleBtn"><i class="fas fa-th"></i> alle kaarten</button>
        <button class="btn" id="toonMoeilijkBtn"><i class="fas fa-exclamation-triangle"></i> alleen lastige</button>
        <button class="btn groen" id="startOefenBtn"><i class="fas fa-graduation-cap"></i> start herhaling</button>
        <button class="btn roze" id="shuffleBtn"><i class="fas fa-random"></i> shuffle</button>
    </div>

    <!-- statistiek -->
    <div class="stats-row">
        <div class="stat-item"><span>📋</span> <span id="totaalCount">0</span> woorden</div>
        <div class="stat-item"><span>❗</span> <span id="moeilijkCount">0</span> lastig</div>
        <div class="stat-item"><span>🔄</span> <span id="gedraaidCount">0</span> bekeken</div>
    </div>

    <!-- OEFENZONE (voor moeilijke woorden) -->
    <div class="practice-zone" id="practiceZone">
        <div class="practice-header">
            <span class="practice-title"><i class="fas fa-campground"></i> herhaal‑sessie</span>
            <div class="practice-stats">
                <span><i class="fas fa-hourglass-half"></i> <span id="practiceOver">0</span> over</span>
                <span><i class="fas fa-check-circle" style="color:#208a3a;"></i> <span id="practiceGedaan">0</span></span>
            </div>
        </div>
        <div class="practice-card" id="practiceCard">
            <div class="practice-word" id="practiceWoord">—</div>
            <div class="practice-answer" id="practiceBetekenis">—</div>
        </div>
        <div class="practice-buttons">
            <button class="btn" id="toonAntwoordBtn"><i class="fas fa-eye"></i> toon betekenis</button>
            <button class="btn" id="nogMoeilijkBtn" style="background:#f08080;"><i class="fas fa-times-circle"></i> nog lastig</button>
            <button class="btn groen" id="nuMakkelijkBtn"><i class="fas fa-check-circle"></i> nu makkelijk</button>
            <button class="btn roze" id="stopOefenBtn"><i class="fas fa-stop"></i> stop</button>
        </div>
    </div>

    <!-- flitskaarten grid -->
    <div class="cards-grid" id="cardsGrid"></div>

    <div class="footer-tip">
        <i class="fas fa-lightbulb"></i> Tik op een kaart om te draaien. Vink lastige woorden aan met de rode knop ⬆️. Groene knop = herhaal alleen gemerkte.
    </div>
</div>

<script>
    (function(){
        // ================= WOORDDATA (uit de PDF, 40 stuks) =================
        const woordData = [
            // week 1 (20)
            { woord: "belanden", betekenis: "als je toevallig ergens komt, dan beland je daar", week: 1 },
            { woord: "voedsel", betekenis: "de etenswaar", week: 1 },
            { woord: "fladderen", betekenis: "vliegen met snel op en neer gaande vleugels", week: 1 },
            { woord: "gunstig", betekenis: "het komt je goed van pas", week: 1 },
            { woord: "ideaal", betekenis: "zo goed of fijn als je maar kunt wensen", week: 1 },
            { woord: "inmiddels", betekenis: "ondertussen", week: 1 },
            { woord: "kwetteren", betekenis: "druk fluiten, het geluid dat vogels maken", week: 1 },
            { woord: "het nadeel", betekenis: "een kant van iets die niet zo fijn is", week: 1 },
            { woord: "het natuurgebied", betekenis: "een stuk land waar de natuur het belangrijkst is", week: 1 },
            { woord: "nauwelijks", betekenis: "bijna niet, bijna geen", week: 1 },
            { woord: "de overlast", betekenis: "hinder, veel last van iets", week: 1 },
            { woord: "het rumoer", betekenis: "het lawaai van veel geluiden door elkaar", week: 1 },
            { woord: "signaleren", betekenis: "opmerken dat iets of iemand er is", week: 1 },
            { woord: "de soortgenoot", betekenis: "mens of dier dat tot dezelfde groep behoort", week: 1 },
            { woord: "het stedelijk gebied", betekenis: "een stuk land met veel gebouwen, waar veel mensen wonen", week: 1 },
            { woord: "de strenge winter", betekenis: "een heel koude winter", week: 1 },
            { woord: "het territorium", betekenis: "een gebied waar een dier of mens de baas is", week: 1 },
            { woord: "verjagen", betekenis: "dwingen om weg te gaan", week: 1 },
            { woord: "het voordeel", betekenis: "een leuke of goede kant van iets", week: 1 },
            { woord: "zich aanpassen", betekenis: "je zo gaan gedragen dat je bij je omgeving past", week: 1 },
            // week 2 (20)
            { woord: "de bedreiging", betekenis: "iets wat gevaarlijk kan zijn", week: 2 },
            { woord: "bestrijden", betekenis: "tegen iets of iemand vechten", week: 2 },
            { woord: "exotisch", betekenis: "iets of iemand uit verre, vreemde landen", week: 2 },
            { woord: "de gevangenschap", betekenis: "gevangen zijn", week: 2 },
            { woord: "importeren", betekenis: "invoeren, iets over de grens het land in brengen", week: 2 },
            { woord: "inheems", betekenis: "iets van een land zelf, iets wat altijd al in het land thuishoorde", week: 2 },
            { woord: "meeliften", betekenis: "gratis meereizen met iets of iemand", week: 2 },
            { woord: "de migrant", betekenis: "nieuwkomer, iets of iemand uit een ander land die hier gaat wonen", week: 2 },
            { woord: "het ongedierte", betekenis: "kleine dieren die je liever niet in je huis of in de buurt wilt hebben, zoals insecten en muizen", week: 2 },
            { woord: "ongewenst", betekenis: "niet gewenst, je wilt het liever niet", week: 2 },
            { woord: "het onkruid", betekenis: "planten die groeien op plaatsen waar je ze niet wilt", week: 2 },
            { woord: "spotten", betekenis: "opmerken dat iets of iemand er is", week: 2 },
            { woord: "tot voor kort", betekenis: "tot een tijdje geleden", week: 2 },
            { woord: "uitheems", betekenis: "iets van buiten je eigen land", week: 2 },
            { woord: "uitroeien", betekenis: "vernietigen, ervoor zorgen dat er niet één overblijft", week: 2 },
            { woord: "de verbijstering", betekenis: "grote verbazing", week: 2 },
            { woord: "de verstekeling", betekenis: "iemand die stiekem en zonder te betalen meereist op een boot of in een vliegtuig of een auto", week: 2 },
            { woord: "de vrije natuur", betekenis: "de natuur waar de mensen niets aan gedaan hebben", week: 2 },
            { woord: "woekeren", betekenis: "heel snel over alles heen groeien", week: 2 },
            { woord: "zich verspreiden", betekenis: "zich over een groter gebied verdelen", week: 2 }
        ];

        // moeilijk-status: 0 = niet, 1 = moeilijk
        let moeilijkStatus = new Array(woordData.length).fill(0);
        // flipped count per kaartje voor statistiek 'bekeken'
        let flippedCount = new Array(woordData.length).fill(false);
        let totaalGedraaid = 0;

        // filters
        let currentWeek = 'all';      // 'all' of 1/2
        let currentFilter = 'all';    // 'all' of 'difficult'

        // Oefen-sessie variabelen
        let practiceActief = false;
        let practiceLijst = [];        // indices van moeilijke woorden
        let practiceIndex = 0;

        // DOM elementen
        const grid = document.getElementById('cardsGrid');
        const totaalSpan = document.getElementById('totaalCount');
        const moeilijkSpan = document.getElementById('moeilijkCount');
        const gedraaidSpan = document.getElementById('gedraaidCount');
        const weekBadges = document.querySelectorAll('.week-badge');
        const toonAlleBtn = document.getElementById('toonAlleBtn');
        const toonMoeilijkBtn = document.getElementById('toonMoeilijkBtn');
        const startOefenBtn = document.getElementById('startOefenBtn');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const practiceZone = document.getElementById('practiceZone');
        const practiceWoord = document.getElementById('practiceWoord');
        const practiceBetekenis = document.getElementById('practiceBetekenis');
        const toonAntwoordBtn = document.getElementById('toonAntwoordBtn');
        const nogMoeilijkBtn = document.getElementById('nogMoeilijkBtn');
        const nuMakkelijkBtn = document.getElementById('nuMakkelijkBtn');
        const stopOefenBtn = document.getElementById('stopOefenBtn');
        const practiceOver = document.getElementById('practiceOver');
        const practiceGedaan = document.getElementById('practiceGedaan');

        // ========== HULPFUNCTIES ==========
        function hertelMoeilijk() {
            return moeilijkStatus.filter(v => v === 1).length;
        }

        function updateStats() {
            totaalGedraaid = flippedCount.filter(v => v).length;
            gedraaidSpan.textContent = totaalGedraaid;
            moeilijkSpan.textContent = hertelMoeilijk();
            // aantal zichtbare kaarten hangt af van filter; doen we bij render
        }

        // filter welke indices getoond worden (gebaseerd op currentWeek + currentFilter)
        function indicesOmTeTonen() {
            return woordData.reduce((acc, item, idx) => {
                if (currentWeek !== 'all' && item.week !== currentWeek) return acc;
                if (currentFilter === 'difficult' && moeilijkStatus[idx] !== 1) return acc;
                acc.push(idx);
                return acc;
            }, []);
        }

        // kaarten renderen (op basis van indices)
        function renderKaarten(indices) {
            grid.innerHTML = '';
            indices.forEach(idx => {
                const item = woordData[idx];
                const card = document.createElement('div');
                card.className = `flashcard ${moeilijkStatus[idx] === 1 ? 'difficult' : ''}`;
                card.dataset.index = idx;

                // week sticker
                const weekDiv = document.createElement('div');
                weekDiv.className = 'week-sticker';
                weekDiv.textContent = `week ${item.week}`;
                card.appendChild(weekDiv);

                // moeilijk-knop (vink)
                const moeilijkDiv = document.createElement('div');
                moeilijkDiv.className = 'moeilijk-markeer';
                moeilijkDiv.innerHTML = '<i class="fas fa-exclamation"></i>';
                card.appendChild(moeilijkDiv);

                // flipper container
                const flipper = document.createElement('div');
                flipper.className = 'flipper';

                // front
                const front = document.createElement('div');
                front.className = 'front';
                front.innerHTML = `<div class="woord-flash">${item.woord}</div><div style="margin-top:15px;"><i class="fas fa-hand-pointer"></i> tik om te draaien</div>`;

                // back
                const back = document.createElement('div');
                back.className = 'back';
                back.innerHTML = `<div class="woord-flash">${item.woord}</div><div class="definitie-flash">${item.betekenis}</div>`;

                flipper.appendChild(front);
                flipper.appendChild(back);
                card.appendChild(flipper);

                // click: flip + tellen
                card.addEventListener('click', function(e) {
                    if (e.target.classList.contains('moeilijk-markeer') || e.target.closest('.moeilijk-markeer')) {
                        // vink toggle
                        e.stopPropagation();
                        const i = parseInt(this.dataset.index);
                        moeilijkStatus[i] = moeilijkStatus[i] === 1 ? 0 : 1;
                        this.classList.toggle('difficult', moeilijkStatus[i] === 1);
                        updateStats();
                        // als we in moeilijk-filter modus en we halen vink weg, kan kaart verdwijnen
                        if (currentFilter === 'difficult' && moeilijkStatus[i] !== 1) {
                            if (indicesOmTeTonen().indexOf(i) === -1) {
                                this.style.display = 'none';
                            }
                        }
                        return;
                    }
                    // flip de kaart
                    this.classList.toggle('flipped');
                    const i = parseInt(this.dataset.index);
                    if (!flippedCount[i] && this.classList.contains('flipped')) {
                        flippedCount[i] = true;
                        updateStats();
                    }
                });

                grid.appendChild(card);
            });
            totaalSpan.textContent = indices.length;
        }

        // ververs grid obv huidige filters
        function verversGrid() {
            const indices = indicesOmTeTonen();
            renderKaarten(indices);
        }

        // ========== OEFENSESSIE ==========
        function startPractice() {
            const moeilijkeIndices = moeilijkStatus.reduce((acc, val, idx) => val === 1 ? acc.concat(idx) : acc, []);
            if (moeilijkeIndices.length === 0) {
                alert('Je hebt nog geen lastige woorden gemarkeerd! Tik op de rode knop op een kaart.');
                return;
            }
            // zet practiceLijst (shuffle)
            practiceLijst = [...moeilijkeIndices];
            for (let i = practiceLijst.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [practiceLijst[i], practiceLijst[j]] = [practiceLijst[j], practiceLijst[i]];
            }
            practiceIndex = 0;
            practiceActief = true;
            practiceZone.classList.add('active');
            grid.style.display = 'none';
            toonAntwoordBtn.disabled = false;
            practiceBetekenis.classList.remove('show');
            toonVolgendePractice();
        }

        function toonVolgendePractice() {
            if (!practiceActief) return;
            if (practiceIndex >= practiceLijst.length) {
                // einde
                alert('Goed gedaan! Je hebt alle lastige woorden geoefend.');
                stopPractice();
                return;
            }
            const idx = practiceLijst[practiceIndex];
            practiceWoord.textContent = woordData[idx].woord;
            practiceBetekenis.textContent = woordData[idx].betekenis;
            practiceBetekenis.classList.remove('show');
            practiceOver.textContent = practiceLijst.length - practiceIndex;
            practiceGedaan.textContent = practiceIndex;
        }

        function stopPractice() {
            practiceActief = false;
            practiceZone.classList.remove('active');
            grid.style.display = 'grid';
            verversGrid(); // evt aanpassingen
        }

        // ========== EVENT LISTENERS ==========
        // week filters
        weekBadges.forEach(b => {
            b.addEventListener('click', function() {
                weekBadges.forEach(w => w.classList.remove('active'));
                this.classList.add('active');
                currentWeek = this.dataset.week === 'all' ? 'all' : parseInt(this.dataset.week);
                verversGrid();
                updateStats();
            });
        });

        toonAlleBtn.addEventListener('click', function() {
            currentFilter = 'all';
            toonAlleBtn.classList.add('active'); // simpele visuele feedback
            toonMoeilijkBtn.classList.remove('active');
            verversGrid();
        });

        toonMoeilijkBtn.addEventListener('click', function() {
            currentFilter = 'difficult';
            toonMoeilijkBtn.classList.add('active');
            toonAlleBtn.classList.remove('active');
            verversGrid();
        });

        shuffleBtn.addEventListener('click', function() {
            // schud alleen de huidige getoonde indices
            const indices = indicesOmTeTonen();
            for (let i = indices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [indices[i], indices[j]] = [indices[j], indices[i]];
            }
            renderKaarten(indices);
        });

        startOefenBtn.addEventListener('click', startPractice);

        toonAntwoordBtn.addEventListener('click', function() {
            practiceBetekenis.classList.add('show');
        });

        nogMoeilijkBtn.addEventListener('click', function() {
            if (!practiceActief) return;
            const idx = practiceLijst[practiceIndex];
            moeilijkStatus[idx] = 1; // blijf moeilijk
            practiceIndex++;
            toonVolgendePractice();
            updateStats();
        });

        nuMakkelijkBtn.addEventListener('click', function() {
            if (!practiceActief) return;
            const idx = practiceLijst[practiceIndex];
            moeilijkStatus[idx] = 0; // niet langer moeilijk
            practiceIndex++;
            toonVolgendePractice();
            updateStats();
        });

        stopOefenBtn.addEventListener('click', stopPractice);

        // initialisatie
        verversGrid();
        updateStats();
    })();
</script>
</body>
</html>
