<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit 4 Lesson 4 · Words to Know · Engels Groep 6</title>
    <!-- Font Awesome voor iconen -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Comic Neue', 'Quicksand', 'Segoe UI', cursive, sans-serif;
        }

        :root {
            --train-blue: #4a7a9c;
            --train-red: #c43e3e;
            --train-yellow: #f7d44a;
            --train-green: #4a9359;
            --window-light: #d9eaf5;
            --track-brown: #735e4d;
        }

        body {
            background: linear-gradient(145deg, #8ba8c0 0%, #6b8ca3 100%);
            min-height: 100vh;
            padding: 1.2rem;
            background-image: repeating-linear-gradient(90deg, rgba(255,255,255,0.1) 0px, rgba(255,255,255,0.1) 20px, transparent 20px, transparent 40px);
        }

        /* locomotief decoratie */
        body::before {
            content: "🚂🚆🚇🚊";
            position: fixed;
            bottom: 5px;
            left: 10px;
            font-size: 4rem;
            opacity: 0.2;
            white-space: nowrap;
            pointer-events: none;
            rotate: -5deg;
            z-index: 0;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            background-color: rgba(255, 250, 240, 0.9);
            backdrop-filter: blur(4px);
            border-radius: 80px 80px 40px 40px;
            border: 5px solid var(--track-brown);
            box-shadow: 0 18px 0 #4e3f33, 0 22px 22px rgba(0,0,0,0.3);
            padding: 1.8rem 2rem 2rem;
            position: relative;
            z-index: 5;
        }

        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            background: var(--window-light);
            border-radius: 50px;
            padding: 0.8rem 2rem;
            margin-bottom: 1.8rem;
            border: 4px solid var(--train-blue);
            box-shadow: 0 6px 0 #315f7a;
            background-image: repeating-linear-gradient(45deg, rgba(74,122,156,0.1) 0px, rgba(74,122,156,0.1) 15px, transparent 15px, transparent 30px);
        }

        .title {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--train-red);
            text-shadow: 4px 4px 0 var(--train-yellow);
            letter-spacing: 1px;
        }

        .title i {
            color: var(--train-blue);
            margin-right: 10px;
        }

        .subhead {
            background: var(--train-yellow);
            border-radius: 30px;
            padding: 0.4rem 1.5rem;
            font-size: 1.4rem;
            font-weight: 700;
            color: #1f5e7a;
            border: 3px solid #c88f2e;
        }

        /* trein-achtige knoppenbalk */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem 1.2rem;
            justify-content: center;
            margin: 1.8rem 0 1.5rem;
        }

        .btn {
            background: #f0c45a;
            border: none;
            border-radius: 40px 40px 20px 20px;
            padding: 0.7rem 1.8rem;
            font-size: 1.2rem;
            font-weight: 700;
            color: #1e3b4f;
            border: 3px solid #9b6f2c;
            border-bottom-width: 6px;
            box-shadow: 0 6px 0 #7b4f1a, 0 5px 10px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: 0.08s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn:active {
            transform: translateY(6px);
            border-bottom-width: 3px;
            box-shadow: 0 2px 0 #7b4f1a;
        }

        .btn.groen {
            background: #6bb46b;
            border-color: #2d752d;
            box-shadow: 0 6px 0 #1e551e;
        }

        .btn.blauw {
            background: #6cb2d1;
            border-color: #23648c;
            box-shadow: 0 6px 0 #15475f;
        }

        .btn.rood {
            background: #e46767;
            border-color: #a53c3c;
            box-shadow: 0 6px 0 #732a2a;
        }

        /* NIEUW: richtingsknoppen */
        .direction-panel {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 0.5rem 0 1rem;
        }

        .direction-btn {
            background: #e6e9f0;
            border: 4px solid #4a7a9c;
            border-radius: 40px;
            padding: 0.8rem 2.5rem;
            font-size: 1.5rem;
            font-weight: 800;
            color: #1a3c4f;
            cursor: pointer;
            box-shadow: 0 6px 0 #274e66;
            transition: 0.1s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .direction-btn.active {
            background: var(--train-yellow);
            border-color: #c43e3e;
            box-shadow: 0 6px 0 #992f2f;
            transform: translateY(2px);
        }

        .stats-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            justify-content: center;
            margin: 1.5rem 0 2rem;
        }

        .stat-item {
            background: #f0e5d5;
            border-radius: 30px;
            border: 3px solid #7f5539;
            padding: 0.8rem 2rem;
            min-width: 150px;
            text-align: center;
            font-weight: 700;
            font-size: 1.3rem;
            color: #2a441e;
            box-shadow: 0 5px 0 #8b6240;
        }

        .stat-item span {
            font-size: 2rem;
            margin-right: 10px;
            color: #c43e3e;
        }

        /* Oefenzone - treincoupé stijl */
        .practice-zone {
            background: #ccddee;
            border: 6px ridge var(--train-blue);
            border-radius: 60px;
            padding: 1.5rem;
            margin-bottom: 2.5rem;
            box-shadow: inset 0 0 0 4px #f9eec1, 0 12px 0 #1f607a;
            display: none;
            background-image: radial-gradient(circle at 20px 30px, #ffffff80 2px, transparent 2px);
            background-size: 30px 30px;
        }

        .practice-zone.active {
            display: block;
            animation: treinBinnen 0.3s ease-out;
        }

        @keyframes treinBinnen {
            0% { transform: translateX(30px); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }

        .practice-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            background: #b4d5a2;
            border-radius: 40px;
            padding: 1rem 2rem;
            margin-bottom: 1.5rem;
            border: 3px solid var(--train-green);
        }

        .practice-title {
            font-size: 2rem;
            font-weight: 800;
            color: #1f4d2b;
        }

        .practice-stats {
            display: flex;
            gap: 1.2rem;
            font-size: 1.3rem;
            background: #fcf0cf;
            padding: 0.5rem 1.5rem;
            border-radius: 30px;
        }

        .practice-card {
            background: #fffae9;
            border-radius: 50px;
            padding: 2.2rem;
            text-align: center;
            border: 5px solid var(--train-red);
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 12px 0 #992f2f;
            margin-bottom: 1.5rem;
            background-image: repeating-linear-gradient(0deg, #fdf4d9, #fdf4d9 10px, #fff7e0 10px, #fff7e0 20px);
        }

        .practice-word {
            font-size: 3.2rem;
            font-weight: 800;
            color: #2f6b42;
            text-shadow: 3px 3px 0 #ffd966;
            margin-bottom: 20px;
        }

        .practice-answer {
            font-size: 2rem;
            font-weight: 600;
            color: #9d4e1f;
            background: #f9e7b3;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            display: none;
            border: 3px solid #bb5b1e;
        }

        .practice-answer.show {
            display: inline-block;
        }

        .practice-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Grid voor flitskaarten */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.8rem;
            margin: 2rem 0;
        }

        .flashcard {
            background: #ffeecb;
            border-radius: 30px;
            border: 4px solid #bf8f60;
            box-shadow: 0 12px 0 #7f613f, 0 8px 12px rgba(0,0,0,0.2);
            aspect-ratio: 1 / 1.1;
            perspective: 1200px;
            cursor: pointer;
            transition: 0.15s;
            position: relative;
        }

        .flashcard:hover {
            transform: scale(1.01);
            border-color: #f7b05e;
        }

        .flipper {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            border-radius: 28px;
        }

        .flashcard.flipped .flipper {
            transform: rotateY(180deg);
        }

        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 28px;
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: #fffae1;
            border: 3px solid #b5763a;
        }

        .front {
            background: #fcf1d6;
            background-image: radial-gradient(circle at 10px 10px, #ffd78c 2px, transparent 2px);
            background-size: 40px 40px;
        }

        .back {
            background: #e6efc5;
            transform: rotateY(180deg);
        }

        .woord-flash {
            font-size: 2rem;
            font-weight: 800;
            color: #1f6533;
            margin-bottom: 10px;
        }

        .definitie-flash {
            font-size: 1.2rem;
            color: #4a2f12;
            background: #f7eac6;
            padding: 10px;
            border-radius: 30px;
            border: 2px dashed #b98c4b;
        }

        /* moeilijk-markeer knop */
        .moeilijk-markeer {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 42px;
            height: 42px;
            background: white;
            border: 4px solid #d14545;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            color: #d14545;
            z-index: 20;
            transition: all 0.1s;
            box-shadow: 0 4px 0 #8b2c2c;
            cursor: pointer;
            pointer-events: auto;
        }

        .flashcard.difficult .moeilijk-markeer {
            background: #ffb5b5;
            border-color: #b12b2b;
            color: #b12b2b;
            box-shadow: 0 4px 0 #701f1f;
        }

        .moeilijk-markeer i {
            pointer-events: none;
        }

        .footer-tip {
            background: #d1dbb6;
            border-radius: 50px;
            padding: 1rem;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 600;
            color: #1d4d2b;
            margin-top: 1.5rem;
            border: 3px solid var(--train-green);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="title">
            <i class="fas fa-train"></i> Unit 4 · Lesson 4
        </div>
        <div class="subhead">
            <i class="fas fa-language"></i> Engels - Groep 6
        </div>
    </div>

    <!-- Richting kiezen: NL→ENG of ENG→NL -->
    <div class="direction-panel">
        <div class="direction-btn active" id="dirNlToEng"><i class="fas fa-arrow-right"></i> NL → ENG</div>
        <div class="direction-btn" id="dirEngToNl"><i class="fas fa-arrow-left"></i> ENG → NL</div>
    </div>

    <div class="toolbar">
        <button class="btn" id="toonAlleBtn"><i class="fas fa-th"></i> alle kaarten</button>
        <button class="btn" id="toonMoeilijkBtn"><i class="fas fa-exclamation-triangle"></i> alleen lastige</button>
        <button class="btn groen" id="startOefenBtn"><i class="fas fa-graduation-cap"></i> start herhaling</button>
        <button class="btn blauw" id="shuffleBtn"><i class="fas fa-random"></i> shuffle</button>
    </div>

    <div class="stats-row">
        <div class="stat-item"><span>📋</span> <span id="totaalCount">0</span> woorden</div>
        <div class="stat-item"><span>❗</span> <span id="moeilijkCount">0</span> lastig</div>
        <div class="stat-item"><span>🔄</span> <span id="gedraaidCount">0</span> bekeken</div>
    </div>

    <!-- Oefenzone voor moeilijke woorden -->
    <div class="practice-zone" id="practiceZone">
        <div class="practice-header">
            <span class="practice-title"><i class="fas fa-train-subway-tunnel"></i> herhaal‑sessie</span>
            <div class="practice-stats">
                <span><i class="fas fa-hourglass-half"></i> <span id="practiceOver">0</span> over</span>
                <span><i class="fas fa-check-circle" style="color:#208a3a;"></i> <span id="practiceGedaan">0</span></span>
            </div>
        </div>
        <div class="practice-card" id="practiceCard">
            <div class="practice-word" id="practiceWoord">—</div>
            <div class="practice-answer" id="practiceBetekenis">—</div>
        </div>
        <div class="practice-buttons">
            <button class="btn" id="toonAntwoordBtn"><i class="fas fa-eye"></i> toon betekenis</button>
            <button class="btn rood" id="nogMoeilijkBtn"><i class="fas fa-times-circle"></i> nog lastig</button>
            <button class="btn groen" id="nuMakkelijkBtn"><i class="fas fa-check-circle"></i> nu makkelijk</button>
            <button class="btn blauw" id="stopOefenBtn"><i class="fas fa-stop"></i> stop</button>
        </div>
    </div>

    <!-- Grid voor flitskaarten -->
    <div class="cards-grid" id="cardsGrid"></div>

    <div class="footer-tip">
        <i class="fas fa-lightbulb"></i> Kies richting bovenaan. Tik op een kaart om te draaien. Rode knop = lastig woord.
    </div>
</div>

<script>
(function() {
    // ========== WOORDENLIJST (Nederlands - Engels) ==========
    const woordData = [
        { nl: "te voet", eng: "on foot" },
        { nl: "perron", eng: "platform" },
        { nl: "snel", eng: "fast" },
        { nl: "treinstation", eng: "train station" },
        { nl: "tweede", eng: "second" },
        { nl: "langzaam", eng: "slow" },
        { nl: "het zuiden", eng: "the south" },
        { nl: "taxichauffeur", eng: "taxi driver" },
        { nl: "treinconducteur", eng: "train conductor" },
        { nl: "ticket", eng: "ticket" },
        { nl: "met de fiets", eng: "by bicycle" },
        { nl: "met de boot", eng: "by boat" },
        { nl: "met de bus", eng: "by bus" },
        { nl: "met de auto", eng: "by car" },
        { nl: "met de trein", eng: "by train" },
        { nl: "mensen", eng: "people" },
        { nl: "het oosten", eng: "the east" },
        { nl: "eerst", eng: "first" },
        { nl: "haast", eng: "hurry" },
        { nl: "laat", eng: "late" },
        { nl: "meter", eng: "meter" },
        { nl: "noord", eng: "north" },
        { nl: "direct", eng: "direct" },
        { nl: "het westen", eng: "the west" }
    ];

    // moeilijk-status: 0 = niet, 1 = moeilijk
    let moeilijkStatus = new Array(woordData.length).fill(0);
    let flippedCount = new Array(woordData.length).fill(false);
    let totaalGedraaid = 0;

    // filters
    let currentFilter = 'all';   // 'all' of 'difficult'
    let currentDirection = 'nl2eng'; // 'nl2eng' of 'eng2nl'

    // Oefen-sessie
    let practiceActief = false;
    let practiceLijst = [];
    let practiceIndex = 0;

    // DOM
    const grid = document.getElementById('cardsGrid');
    const totaalSpan = document.getElementById('totaalCount');
    const moeilijkSpan = document.getElementById('moeilijkCount');
    const gedraaidSpan = document.getElementById('gedraaidCount');
    const toonAlleBtn = document.getElementById('toonAlleBtn');
    const toonMoeilijkBtn = document.getElementById('toonMoeilijkBtn');
    const startOefenBtn = document.getElementById('startOefenBtn');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const practiceZone = document.getElementById('practiceZone');
    const practiceWoord = document.getElementById('practiceWoord');
    const practiceBetekenis = document.getElementById('practiceBetekenis');
    const toonAntwoordBtn = document.getElementById('toonAntwoordBtn');
    const nogMoeilijkBtn = document.getElementById('nogMoeilijkBtn');
    const nuMakkelijkBtn = document.getElementById('nuMakkelijkBtn');
    const stopOefenBtn = document.getElementById('stopOefenBtn');
    const practiceOver = document.getElementById('practiceOver');
    const practiceGedaan = document.getElementById('practiceGedaan');
    const dirNlToEng = document.getElementById('dirNlToEng');
    const dirEngToNl = document.getElementById('dirEngToNl');

    // Tel aantal moeilijke woorden
    function telMoeilijk() {
        return moeilijkStatus.filter(v => v === 1).length;
    }

    // Update statistieken
    function updateStats() {
        totaalGedraaid = flippedCount.filter(v => v).length;
        gedraaidSpan.textContent = totaalGedraaid;
        moeilijkSpan.textContent = telMoeilijk();
    }

    // Welke indices moeten getoond worden?
    function indicesOmTeTonen() {
        return woordData.reduce((acc, _, idx) => {
            if (currentFilter === 'difficult' && moeilijkStatus[idx] !== 1) return acc;
            acc.push(idx);
            return acc;
        }, []);
    }

    // Kaarten renderen met huidige richting
    function renderKaarten(indices) {
        grid.innerHTML = '';
        indices.forEach(idx => {
            const item = woordData[idx];
            const card = document.createElement('div');
            card.className = `flashcard ${moeilijkStatus[idx] === 1 ? 'difficult' : ''}`;
            card.dataset.index = idx;

            // moeilijk-knop (vink)
            const moeilijkDiv = document.createElement('div');
            moeilijkDiv.className = 'moeilijk-markeer';
            moeilijkDiv.innerHTML = '<i class="fas fa-exclamation"></i>';
            card.appendChild(moeilijkDiv);

            // flipper
            const flipper = document.createElement('div');
            flipper.className = 'flipper';

            // Afhankelijk van richting: voorkant toont vraagtaal, achterkant antwoordtaal
            let frontText, backText;
            if (currentDirection === 'nl2eng') {
                frontText = item.nl;
                backText = item.eng;
            } else {
                frontText = item.eng;
                backText = item.nl;
            }

            const front = document.createElement('div');
            front.className = 'front';
            front.innerHTML = `<div class="woord-flash">${frontText}</div><div style="margin-top:15px;"><i class="fas fa-hand-pointer"></i> tik om te draaien</div>`;

            const back = document.createElement('div');
            back.className = 'back';
            back.innerHTML = `<div class="woord-flash">${frontText}</div><div class="definitie-flash">${backText}</div>`;

            flipper.appendChild(front);
            flipper.appendChild(back);
            card.appendChild(flipper);

            // click: flip + tellen, maar niet op de vinkknop
            card.addEventListener('click', function(e) {
                if (e.target.classList.contains('moeilijk-markeer') || e.target.closest('.moeilijk-markeer')) {
                    e.stopPropagation();
                    const i = parseInt(this.dataset.index);
                    moeilijkStatus[i] = moeilijkStatus[i] === 1 ? 0 : 1;
                    this.classList.toggle('difficult', moeilijkStatus[i] === 1);
                    updateStats();
                    if (currentFilter === 'difficult' && moeilijkStatus[i] !== 1) {
                        if (indicesOmTeTonen().indexOf(i) === -1) {
                            this.style.display = 'none';
                        }
                    }
                    return;
                }
                // flip
                this.classList.toggle('flipped');
                const i = parseInt(this.dataset.index);
                if (!flippedCount[i] && this.classList.contains('flipped')) {
                    flippedCount[i] = true;
                    updateStats();
                }
            });

            grid.appendChild(card);
        });
        totaalSpan.textContent = indices.length;
    }

    // Ververs grid op basis van huidige filter en richting
    function verversGrid() {
        const indices = indicesOmTeTonen();
        renderKaarten(indices);
    }

    // ========== OEFENSESSIE ==========
    function startPractice() {
        const moeilijkeIndices = moeilijkStatus.reduce((acc, val, idx) => val === 1 ? acc.concat(idx) : acc, []);
        if (moeilijkeIndices.length === 0) {
            alert('Je hebt nog geen lastige woorden gemarkeerd! Tik op de rode knop op een kaart.');
            return;
        }
        practiceLijst = [...moeilijkeIndices];
        // shuffle
        for (let i = practiceLijst.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [practiceLijst[i], practiceLijst[j]] = [practiceLijst[j], practiceLijst[i]];
        }
        practiceIndex = 0;
        practiceActief = true;
        practiceZone.classList.add('active');
        grid.style.display = 'none';
        practiceBetekenis.classList.remove('show');
        toonVolgendePractice();
    }

    function toonVolgendePractice() {
        if (!practiceActief) return;
        if (practiceIndex >= practiceLijst.length) {
            alert('Goed gedaan! Je hebt alle lastige woorden geoefend.');
            stopPractice();
            return;
        }
        const idx = practiceLijst[practiceIndex];
        const item = woordData[idx];
        // in oefensessie gebruiken we de gekozen richting (vraag = huidige front-taal)
        if (currentDirection === 'nl2eng') {
            practiceWoord.textContent = item.nl;
            practiceBetekenis.textContent = item.eng;
        } else {
            practiceWoord.textContent = item.eng;
            practiceBetekenis.textContent = item.nl;
        }
        practiceBetekenis.classList.remove('show');
        practiceOver.textContent = practiceLijst.length - practiceIndex;
        practiceGedaan.textContent = practiceIndex;
    }

    function stopPractice() {
        practiceActief = false;
        practiceZone.classList.remove('active');
        grid.style.display = 'grid';
        verversGrid();
    }

    // ========== EVENT LISTENERS ==========
    toonAlleBtn.addEventListener('click', function() {
        currentFilter = 'all';
        toonAlleBtn.classList.add('active');
        toonMoeilijkBtn.classList.remove('active');
        verversGrid();
    });

    toonMoeilijkBtn.addEventListener('click', function() {
        currentFilter = 'difficult';
        toonMoeilijkBtn.classList.add('active');
        toonAlleBtn.classList.remove('active');
        verversGrid();
    });

    shuffleBtn.addEventListener('click', function() {
        const indices = indicesOmTeTonen();
        for (let i = indices.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [indices[i], indices[j]] = [indices[j], indices[i]];
        }
        renderKaarten(indices);
    });

    startOefenBtn.addEventListener('click', startPractice);

    toonAntwoordBtn.addEventListener('click', function() {
        practiceBetekenis.classList.add('show');
    });

    nogMoeilijkBtn.addEventListener('click', function() {
        if (!practiceActief) return;
        const idx = practiceLijst[practiceIndex];
        moeilijkStatus[idx] = 1;
        practiceIndex++;
        toonVolgendePractice();
        updateStats();
    });

    nuMakkelijkBtn.addEventListener('click', function() {
        if (!practiceActief) return;
        const idx = practiceLijst[practiceIndex];
        moeilijkStatus[idx] = 0;
        practiceIndex++;
        toonVolgendePractice();
        updateStats();
    });

    stopOefenBtn.addEventListener('click', stopPractice);

    // Richtingsknoppen
    dirNlToEng.addEventListener('click', function() {
        currentDirection = 'nl2eng';
        dirNlToEng.classList.add('active');
        dirEngToNl.classList.remove('active');
        verversGrid();
    });

    dirEngToNl.addEventListener('click', function() {
        currentDirection = 'eng2nl';
        dirEngToNl.classList.add('active');
        dirNlToEng.classList.remove('active');
        verversGrid();
    });

    // initialiseer
    verversGrid();
    updateStats();
})();
</script>
</body>
</html>
